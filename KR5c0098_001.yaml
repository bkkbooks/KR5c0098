front:
  text: 道德真經注疏卷之一信一
  hash: sha256:ebd7bf97e88f53bf9a3cd209b5f0f9d64db59479f91f6cb9c482096c58d2738e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0098_HFL_001-001a, image: hfl/0404/0404-004.png}
body:
  text: 吳郡徵士顧歡述注謂經術政教之道也非常道注非自然長生之道常道者當以無為養神無事安民含光藏暉滅迹匿端不可稱道也疏道以虛通為義常以湛寂得名所謂無極大道衆生正性也而言可道者即是名言謂可稱之法也雖復稱可道宜隨機愜當而有聲有說非真常凝寂之道也常道者不可以名言辨不可以思慮知妙絶希夷理窮恍惚故知言象之表方契凝常真寂之道可道可說者非常道也名可名注謂富貴尊榮高世之名也非常名注非自然常在之名也常名者當如嬰兒之未言雞子之未分明珠在蚌中美玉處石間內雖昭昭外如頑愚也疏名者教也前言可道盛明於理今言可名次顯於教真理既絶於言象至教亦超於聲說理既常道不可道教亦可名非常名欲明理教教理不一不異也然至道深玄不可涯量非無非有不斷不常而義有抑揚教存漸頓所以立常以破可故言可道非常道至論造極處無可無不可故玉京經云無可無不可思與希微通無名天地之始注無名者謂道也道無形故不可名始者道吐氣布化出於虛無為天地本始也王曰道雖無名要能吐氣布化出於虛無與天地萬物作於本始也疏始本也虛無至道陶甄萬物二儀三景何莫由斯故指此無名為物之本無名足可言說明矣有名萬物之母注有名謂天地天地有形位有陰陽有柔剛是其名也萬物母者天地含氣生萬物長大成熟如母之養子也疏母有名迹也重玄之道本自無名從本降迹稱謂斯起所以聖人因無名立有名寄有名詮無名者方欲子育衆生令其歸本慈悲鞠養有同母義顧曰有名謂陰陽無名謂常道常道無體故曰無名陰陽有分故曰有名始者取其無先母者取其有功無先則本不可尋有功則其理可說謂陰陽含氣禀生萬物長大成熟如母之養子故謂之母常無欲以觀其妙注妙要也言人常能無欲則可以觀大道之要要謂一也一出布化名道贊叙明是非也節解曰謂守虛無也疏妙精微也觀照察其己也言人常能無欲無為至虛至靜者即能近鑒己身之妙道遠鑒至理之精微也常有欲以觀其徼注徼歸也常有欲之人可以觀世俗之所歸趣也御曰人生而靜天之性感物而動性之欲也若常守清靜解心釋神反照正性則觀乎妙本矣疏言人不能無為恬淡觀妙守真妄起貪求肆情染滯者適見世境之有未體即有之空所以不察妙理之精微唯睹死生之歸趣前明無名有名之優劣此顯有欲無欲之勝負張曰上達之人取舍情夷清虛無欲神情照察得道之微妙也此兩者同出而異名注兩者謂有欲無欲也同出者同出人之心也異名者所名各異也無欲者長存有欲者亡身疏夫所觀之境唯一能觀之智有殊二觀既其不同徼妙所以名異同謂之玄注玄者天也言有欲之人與無欲之人同受氣於天也疏玄者深遠之義亦是不滯之名有無二心原乎一道同出異名異名一道謂之深逺深遠之玄理歸無滯既不滯有又不滯無二俱不滯故謂之玄玄之又玄注天中復有天也言禀氣有厚薄得中和滋液則生賢聖得錯亂濁厚則生貪淫也疏有欲之人唯滯於有無欲之士又滯於無故說一玄以遣雙執又恐行者滯於此玄今說又玄更祛後病既而非但不滯於滯亦乃不滯於不滯此則遣之又遣故曰玄之又玄顧曰雖同禀氣於天蓋人有高卑氣有清濁天彌高彌清地逾卑逾濁人禀得清氣者則為賢智禀得濁氣者則為凡愚賢智無欲觀見其妙凡愚有欲觀見其徼自然有此衆妙之門注能知天中復有天禀氣有厚薄人能除情去欲守於中和是謂知道之門也疏門法門也前以一中之玄遣二偏之雙執二偏之病既除一中之藥還遣唯藥與病一時俱消此乃妙極精微窮理盡性豈唯群聖之户牖抑亦衆妙之法門天下皆知美之為美注自揚己美使彰顯也斯惡已注有危亡也疏天下者世間之總名也美悅愛也上元經云諸天之下諸地之上其中人物名曰世間言一切蒼生莫不耽滯諸塵妄起美惡違其心者遂起憎嫌名之為惡順其意者必生愛染名之為美不知諸法即有即空美惡既空何憎何愛故莊子云毛嬙麗姬人之所美魚見之深入鳥見之高飛又云美者自美吾不知其美也惡者自惡吾不知其惡也以斯而驗豈有美惡哉故知世間執美為美者此即惡矣顧曰一切衆生皆知耽美前境五欲聲色等諸塵為美美之不息必以身為患斯惡已皆知善之為善注有功名也斯不善已注人所爭也疏凡鄙之流迷於真理非但耽淫聲色抑亦貪著名譽求名喪身利己害物不知名善舉體虛妄故下文云名與身孰親莊子云為善無近名又云其所矜惜無非名善是知矜名執善於理不臧唯當忘善惡而居中方會無為之致也羅曰人之受形皆智愛形而貪名其所貪惜無非名善此善無善不免諸苦名雖稱遂何益於己有無相生注見有而為無也疏有無二名相因而立推窮理性即體而空既知有無相生足明萬法無實王曰嗜欲為有心清虛為無心難易相成注見難而為易也疏空心慧觀無易無難分别執情有難有易是知難易二法相互而成王曰抑性為難從情則易抑易從難則善舍難從易則凶凶悖外顯故曰相成長短相形注見短而為長也疏以長形長則無長以短比短則無短故曰長短相形而有也王曰自是為長非物為短他亦自是而非彼高下相傾注見高而為下疏傾奪也夫有高即有下無下即無高何者夫以尺比寸尺即為高以丈比尺尺即為下向者之高今之成下故知高下竟無定相更相傾奪所以皆空也音聲相和注上唱下必和也疏夫宫商絲竹相和而成推求性相即體皆空以况萬有虛假亦然先後相隨注上行下必隨疏夫以今望昔所以有今以昔望今所以名昔而今自非今何能有昔昔自非昔豈有今哉既其無昔無今何先何後是知有先有後者三時相隨而竟無實體王曰終始相逐不相逺離如積善餘慶積惡餘殃善惡行於前吉凶追其後是以聖人治處無為之事注以道治也節解曰謂自然也疏聖人者體道契真之人也亦言聖者正也能自正己兼能正他故名為聖即此聖人慈悲救物持無為之妙法治有欲之蒼生所治近指上文能治屬在於下仍前以發故云是以聖人治又言聖人寂而動動而寂寂而動無為而能涉事動而寂處世不廢無為斯乃無為即為為即無為豈有市朝山谷之殊拱默當塗之隔耶故云處無為之事也行不言之教注以身帥導之疏妙體真源絶於言象雖復處寂而施化無方豈唯真不乖應抑亦語不妨默既出處語默其致一焉端拱寂然而言滿天下豈曰杜口而稱不言哉故莊子云言而足者則終日言而盡道言而不足者則終日言而盡物萬物作焉注各自動作而不辭注不辭謝而逆止也疏萬物者一切群生也作感動也始先也聖人無心有感斯應譬彼明鏡方兹虛谷感而後應不為物先故莊子云常和而不唱也生面不有注元氣生萬物而不有也為而不恃注道所施為不恃望其報也疏恃怙賴也大聖虛懷逗機利物自他平等物我兼忘雖有大功終不恃賴忘其功也功成弗居注功成事就退避不居其位疏覆載萬物功格天地照燭蒼生光逾日月而推功於物不處其德也夫唯不居注夫唯功成不居其位也是以不去注福德常在不去其身此言不行不可隨不言不可知疾上六句有高下長短君開一源下生百端百端之變無不動亂也疏夫者語端唯之言獨夫能造化天地亭毒含靈有大至功而推功於物者其唯聖人乎只為能忘其功而至功彌遠聖德斯在是以不去不尚賢注賢謂世俗之賢辨口明文離道行權去質為文也不尚者不貴之以祿不尊之以官御曰尚賢則有迹徇迹則爭興使民不爭注不爭功名返自然也疏非謂君王不尚賢人也直是人行撝謙先物後己不自貴上而賤人也而言不爭者若人人自貴而賤物則浮競互彰各各退己而先人則爭忿自息故不爭也不貴難得之貨注言人君不御珍好寶黃金棄於山珠玉捐於淵使民不為盜注上化清淨下無貪人節解曰謂邪氣不來盜賊不入行一握固則邪氣去也疏難得之貨謂趙珠荆璧等物也若使普天貴寶則盜賊斯生率土賤珍則濫竊不起故言不盜不見可欲注放鄭聲逺佞人節解曰謂無為也使心不亂注不邪淫也節解曰常存一也疏可欲者即世間色聲等事可貪求染愛之物也而言不見者非塗耳目以避之也妙體塵境虛幻竟無可欲之法推窮根塵不合故也既無可欲之境故恣耳目之見聞心恆虛寂故言不亂也故西升經云譬如鏡中影可見不可取又云欲視亦無所見欲聽亦無所聞前不爭不盜是别今不見可欲是總遣三業及一切法也獨顯聖人虛懷利物是以聖人治注說聖人治國與治身也節解曰謂治身也虛其心實其腹注除嗜欲去煩亂懷道抱一守五神也御曰心不為可欲所亂則虛矣節解曰虛其心無邪思也實其腹閉氣養精也郭曰其惡改盡諸善自生懷道抱一淳和內足實其腹也疏既外無可欲之境內無能欲之心心境兩忘故即心無心也前既境幻後又心虛雖復即心無心而實有靈照乃言妙體虛寂而赴感無差而德充於內故言實其腹也弱其志注和柔謙讓不處權强也御曰心虛則志自弱也疏既內懷實智而外弘接物處俗同塵柔弱退己也强其骨注愛精重氣髓滿骨堅也御曰腹實則自然骨强也顧曰骨以含精精散則骨弱保精愛氣則其骨自强疏言聖人雖復外示和光而內恆寂泊欲明動不傷寂應不離真故言强其骨也常使心無知無欲注反朴守淳也御曰無爭尚之知絶貪求之欲也疏知者分别之名欲者貪求之目言聖人常以空惠利益蒼生令倒置之徒息分别之心舍貪求之欲也使知者不敢為注思慮深不輕言為無為注不造作動因循也則無不治注德化淳百姓安疏前既舍欲得無欲復恐無欲之人滯於空見以無為道而言不敢為者即遣無欲也恐執此不為故繼以不敢也治正也行人但能先遣有欲後遣無欲者此則雙遣二邊妙體一道物我齊觀境智兩忘以斯為治理無不正也道沖而用之注沖中也道匿藏名譽其用在中也一家云道以沖和為用故言沖也節解曰沖者一也謂一在身中常行之也或不盈注或常也道常謙虛不盈滿也節解曰謂守自然也疏言聖人施化為用多端切當之言莫先中道故云道沖而用之此則以中為用也而言或不盈者向一中之道破二偏之執二偏既除一中還遣今恐執教之人住於中一自為滿盈言不盈者即是遣中之義淵兮似萬物之宗注道淵深不可知也似為萬物之宗祖也疏淵止水也以况聖人言止水能鑒於人聖智能照萬法故大匠取則於止水衆生宗極於聖人而言似者明無宗而宗宗不定宗也故莊子云人莫鑒於流水而必鑒於止水又云止水為澄為淵宗則大宗師之義挫其鋭注挫止也鋭進也人欲鋭情進取功名當挫止之法道不自見也解其忿注忿結恨也當念道無為以解釋之節解曰謂無恚怒也疏既重玄行足自利道員為物宗師故此下明利他也體知物境虛幻令進求之人息於貪競也而言解忿者忿嗔怒也解釋散也夫忿懟生乎違順違順起乎妄心聖人達違順之兩空體妄心之非有故能誘導蒼生令歸真實釋散其懷而無嗔癡也和其光注言雖有獨見之明當如暗昧不當以爚亂人也節解曰謂聖人為道常和神光也疏光智照也言聖人智慧光明與日月而齊照而韜光晦迹共凡智相和聖德潜被不耀於物故下文云光而不耀同其塵注當與衆庶同其垢塵不當自别殊也疏塵則色聲等六塵也猶如世間塵土能點穢净物聲色等法能污清行故名為塵也而言同者夫聖人降世晦迹應凡既韜彼智光亦混兹塵穢聲色無别眼耳固同處染不染所以為異也湛兮似或存吾不知誰之子象帝之先天地不仁以萬物為芻狗聖人不仁以百姓為芻狗天地之間其猶橐籥乎虛而不屈動而愈出多言數窮不如守中谷神不死是謂玄牝玄牝之門是謂天地根綿綿若存用之不勤天長地久天地所以能長且久者以其不自生故能長生是以聖人後其身而身先外其身而身存非以其無私邪故能成其私上善若水水善利萬物而不爭處衆人之所惡故幾於道居善地心善淵與善仁言善信政善治事善能動善時夫惟不爭故無尤矣持而盈之不如其已揣而鋭之不可長保金玉滿堂莫之能守富貴而驕自遺其咎功成名遂身退天之道載營魄抱一能無離乎缺注專氣致柔注專精閉氣使不散亂則形體能應之而柔順能如嬰兒乎注能如嬰兒內無思慮外無政事則精神不去也節解曰謂抱行元氣不勞也大道流布若嬰兒也御曰能如嬰兒者無所分别也專精沖和之氣所致張曰以為專精一也氣氣息也致得也柔和也嬰兒絶知見也夫氣聚而生氣散而死人當專精愛氣得柔和之道然後能內息分别外絶知道身不見身其身亦滅心不知心其心亦寂故曰能如嬰兒疏專精也氣道氣也致得也柔和也只為專精道氣致得柔和之理故如嬰兒之無欲也滌除玄覽注當洗其心使清潔也心居玄冥之處覽知萬事故謂之玄覽能無疵乎注不淫邪也疏滌洗也除遣也覽察也疵病也滌蕩六府除遣五情使神氣虛玄故能覽察妙理內外清夷而無疵病也然後身無所為心無所取不為有生不為無滅以此而用豈有疵病此明自利也愛民治國注治身者愛氣則神全治國者愛民則國安能無為乎注治身者呼吸精氣無令耳聞治國者布德施惠無令下知也疏前既自利道員此下應須接物接物之行莫先治國愛民知分别智也慈悲覆養是曰愛民布政行化名為治國夫治國者須是淳朴教以無為杜彼奸邪塞兹分别如此則擊壤之風斯及結繩之政可追下文云以智治國國之賊不以智治國國之德也明白四達注言道明白如日月四達滿於天下八極之外故曰視之不見聽之不聞彰布於十方焕焕煌煌也能無知乎注無有能知道滿於天下者節解曰四達為知八方也閉心杜念萬世常存子能行之通於上皇疏明以能照得名白以潔素受稱四者四方達者無礙言聖人空慧明白妙達玄理智無不照境無不通故略舉四方足明八極且寂而能應所以四達應不乖寂恆自無為也蔡曰識身命財為四達無知謂心無分别也天門開闔注天門謂北極紫微宫開闔謂終始五際也治身天門謂鼻孔開謂喘息也闔謂呼吸也王曰天有北極之星在紫微之內宫內有五德之帝迭王故門有開闔闔則為否開則為泰故春則青帝門開餘門皆闔三時皆然終始五際謂五德廢興交代之時時有開闔代有否泰聖人處之常能守雌靜則不為終始傾動治身天門謂鼻口之門開謂喘息闔謂呼吸修生行人氣息出入無令耳聞常能雌靜自得無為之道也能為雌乎注治身當如雌牝安靜柔弱治國應變和而不唱也疏河上公本作天地夫天地開闔謂劫運成壞也言聖人混迹二儀之中不為三灾所及雖劫有廢興而心恆虛靜故莊子云大浸稽天而不溺大旱金石流土山焦而不熱也生之畜之注道生萬物而畜養之生而不有注道生萬物無所取有郭曰氤氲合化庶物從生顯仁藏用即有為迹功不歸己故曰不有疏言聖人自利道員利他德滿故能生化群品畜養含靈故下文云道生之德畜之物形之雖復陶鑄萬物亭毒三才妙體真空故無蒼生之可化為而不恃注道所施為不恃望其報疏只為無蒼生之可化故施為利物亦無恩造之可恃也長而不宰注道長養萬物大不宰割以為器用疏宰主也聖人長養群生實為化主而忘功喪我故云不宰顧曰道則長而不宰聖則宰而不割成就一切實為化主而忘功喪我故云不宰是謂玄德注言道德玄冥不可得見欲使人心如道也張曰玄深遠也德上德也嘆此忘功聖人冥於造化可謂深遠上德也玄德亦天也為而不恃合天之德也疏玄言深遠德乃上德也嘆此忘功聖人冥於造化可謂深玄上德也三十幅共一轂注古者車三十輻法月之數也共一轂者轂中有孔故衆輻共凑之治身者當除情去欲使五藏空虛神乃歸之治國者寡能總衆弱以扶强也嚴顧等曰古有作車象月之數月有三十日車有三十輻夫月之懸天流行不息車之輾地亦運載無停是故古車以象月也共一轂者既三十日共一月亦三十輻共一轂欲明諸教雖多同歸一理一理雖少能總諸教治國論者衆必宗寡弱以扶强故以一轂之寡總諸輻之衆疏周禮考工記云三十輻象三十日以成一月也當其無者箱轂內空也故能運載蒼生也又車假名諸緣和合而成此車細拆推尋遍體虛幻况一切諸法亦復如是也當其無有車之用注無謂空虛轂中空虛輪得轉行輿中空虛人得載其上埏埴以為器注埏和也埴土也和土以為食飲之器也當其無有器之用注器中空虛故得有所盛受節解曰謂古人為土器不燒鍊得水則敗為不成器也子欲為道不入室依時鍊形者則為俗人必死也疏考工云埏和也埴粘也和水土燒以成器器中空無故得盛受况聖人心空故能容物張曰土有器性和之以為器人有道性修之以成道鑿户牖以為室注謂作屋室也當其無有室之用注言户牖空虛人得以出入觀視室中空虛人得以居處是其用也疏穿鑿户牖以為室屋室中空無故得居處况聖人心空故能容物穿鑿户牖通人往來况根竅虛通故能用而無滯車等三物其義相類所以重出者車則動而不靜室則靜而不動器則亦動亦靜有此三異故重出之故有之以為利注物利於形器中有物室中有人恐其屋破壞腹中有神畏其形消亡也節解曰謂有道也無之以為用注言虛空者可用盛受於物也故曰空虛無形而能制有形也道者空虛也節解曰謂聖人守一行自然無所用也疏無賴有以為利有藉無以為用二法相假故成車等也言聖人必須以有資空以空導有有無資導心不偏溺故成聖人之利用也顧曰利益也轂中有軸器中有食室中有人身中有神皆為物致益故曰有之以為利也然則神之利身無中之有有亦不可見故歸乎無物神為存生之利虛為致神之用明道非有非無無能致用有能利物利物在有致用在無無謂清虛有謂神明而俗學未達皆師老君全無為之道道若全無於物何益今明道之為利利在用形無之為用以虛容物故也道德真經注疏卷之一

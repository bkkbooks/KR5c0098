front:
  text: 道德眞經注䟽卷之三信三
  hash: sha256:a1cb3bbf458ea227bc8ac36f8b2402208702ee4131bcfda5f5dad3362a613271
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0098_HFL_003-001a, image: hfl/0404/0404-120.png}
body:
  text: 吴郡徵士顧歡述孔德之容注孔大也有大德之人無所不容能受垢濁處謙卑也唯道是從注唯獨也大德之人不隨世俗所行獨從於道也䟽孔大也甚也容貌也甚大之德容貌若何唯從於道即是其相又解容包容也大德妙契故能動心施爲獨從於道出處語默皆是道場道之爲物惟怳惟惚注道之於萬物獨怳惚往來於其所也御曰此明孔德所從之道不有不無證用難名故云怳惚䟽言至道之爲物也不有而有雖有不有不無而無雖無不無有無不定故言怳惚所以言物者欲明道不離物物不離道道外無物物外無道用即道物體即物道亦悟即物道迷即道物物道不一不異而異而一不一而物而道一而不一非道非物故一不一而物不一一也顧曰欲言定有而無色無聲言其定無而有情有信以其體不可定故云怳惚惚怳中有像注道雖惚怳無形其中獨爲萬物設法像也御曰惚無也怳有也兆見曰象自無而降有即萬物之象也怳惚中有物注道雖怳惚其中有一經營主化因氣立質䟽中有物即是神妙妙物爲名也雖復非無非有而有不測之物也中有象即是氣雖復非象非色而爲色爲象故是氣也言道種種變現故不物而物不象而象也窈冥中有精注道雖窈冥無形其中有精實神明相薄陰陽交會以立形神也節解曰謂腦中元氣化爲精也御曰惚怳有無窈冥不測生成之用精妙甚存䟽窈冥深遠也有精智也言道雖窈冥怳惚而甚有精靈智照無方神功不測也其精甚眞注言道精氣神妙甚眞非有飾也䟽言眞精無雜實非虚假於三一之中偏重舉精者欲明精是氣色神用之本也顧曰言至道之精靈至眞無假其中有信注道匿功藏名其信在中也節解曰謂精也精不化血不藏則爲眞人一行形中其中有信䟽言道無心有感斯應信若四時必無差爽自古及今其名不去注自從也從古至今道常在不去也節解曰名者謂道也聖人不死其名常存䟽時乃有古有今而道竟無來無去既名不去足顯不來文略故也以閲衆甫注閲禀也甫始也言道能禀與萬物始生從道受氣也䟽閲覽也甫始也至道雖復無來無去亦而去而來故能覽察古今應夫終始也吾何以知衆甫之然哉注我何以知萬物從道受氣以此注此今也以今萬物皆得道精氣而生人動作起居非道不然也䟽假設問也老君云我何以知終始之事乎只用此眞精純信之道怳惚窈冥之法故知之也曲則全注曲己從衆不自專則全也䟽屈曲隨順不忤物情柔弱謙和全我生道故莊子云吾行郄曲無傷吾足此一句忘違順也枉則直注枉屈也屈己而伸人乆乆自得直也䟽枉濫也體知枉濫不二故能受於毁謗而不伸其怨枉翻獲正眞也此一句忘毁譽窪則盈注地窪下水流之人謙下德歸之弊則新注自受弊薄後己先人天下敬之乆乆自新䟽窪下也謙卑遜讓退己處下不與物競而故德行盈滿也此一句忘高弊辱也能處鄙惡弊辱而不貪榮寵即其德日新此又忘榮辱也少則得注自取少則得多天道祐謙神明托虚多則惑注財多者惑於守身學多者惑於所聞節解曰謂俗人多思念多所欲行無可信故惑也䟽少者謂前曲全等行不見高下處一中也多謂滯於違順等法不離二偏也體一中則得滯二偏故惑也是以聖人抱一爲天下式注抱守也式法也聖人守一乃知萬事故能爲天下法式也節解曰謂念一行道守身中也䟽是以仍上辭也抱守持也式法則也言聖人持此一中之道軌轍群生故爲天下修學之楷模也不自見故明注聖人不以其視目千里之外乃因天下之目以視之故能明達也䟽物我皆空不見有我身相故智慧明照也不自是故彰注聖人不自以爲是而非人故能彰顯於世也䟽自他平等不是己而非物故其德行顯著不自伐故有功注伐取也聖人德化流行不自取其美故有功於天下也䟽雖復亭毒群生而芻狗百姓推功於物故有大功也不自矜故長注矜大也聖人不自貴大故能長乆不危也䟽只爲推功於物不自矜夸故德行長逺也夫唯不爭故天下莫能與之爭注此言天下賢與不肖無能與不爭者爭也䟽此則嘆美四德之人妙達違順謙以自牧不與物爭故天下群品無能與不爭者爭也古之所謂曲則全者豈虚言哉注傳古言曲從則全身此言非虚妄也䟽昔人所謂屈曲柔順以全其道此語有實果非虚言但能依教修行不與物爭則大成全德物歸於己也故誠全而歸之注誠實也能行曲從者實全其肌體歸之於父母無有傷害也希言自然注希言謂愛言也愛言者自然之道也䟽希簡少也希言忘言也自然者重玄之極道欲明至道絶言言即乖理唯當忘言遣教適可契會虚玄顧曰希少也人能愛氣少言則行合自然王曰希言靜默則合自然之道飄風不終朝驟雨不日注飄風疾風也驟雨暴雨也言疾不能長暴不能乆也䟽飄疾之風驟暴之雨曾不崇朝何能竟日譬滯言之士執教生迷妄爲躁行以求速報既心理不乆不長故取譬飄風方之驟雨日是朝之總朝是日之别别則譬念念之新總則喻百年之壽通是無常也王曰山澤相通爲於飄風陰氣噴擊作於驟雨陰陽失節則驚風驟雨人失中和則爲暴疾殘身喪實不可常行驚暴非恒自然難乆故曰不終朝也蔡曰夫天以陽氣下降散而爲風地以陰氣上騰蒸而爲雨顧曰天健地順神氣獨絶爲此暴疾猶不能竟日終朝何况凡夫朝生夕死多言害物其可乆乎盧曰形之大者莫過乎天地氣之廣者莫極乎陰陽陰陽相擊天地交錯風驚雨驟猶不能乆而况人之細小處天地之間爲於多言速滅可知孰爲此者天地也注孰誰也誰爲此飄風暴雨者乎天地所爲也天地尚不能久注不能終於朝暮而况於人乎注天地至神合爲飄風暴雨尚不能終朝至暮何况於人欲爲暴卒乎䟽孰誰也此假問誰爲此風雨答云是天地二儀生化有大神力飄風驟雨尚不能乆况凡夫而爲躁行其可乆乎故從事於道者注從爲也人爲事當如道安靜不當如飄風暴雨也御曰故從事於道之人當不執滯言教道者同於道注道者謂奸道之人也同於道者所爲與道同也御曰體道者悟道忘言即同於道也䟽從道隨順也事世物也言至德之人即事即理即道即物故隨順世事恒自虚通此猶是孔德唯道是從之義蔡曰若舉事皆從於道道則得之則同道之用也王曰順教反俗所爲從於道兼忘衆累與空虚合體謂之同道道則應之道得之注只爲即事即理所以境智兩冥能使相會䟽道得之猶得道也同於德者德亦得之注德謂好德之人也同於德者所爲與德同也䟽道既是常道德即是上德體教忘言爲行同於上德上德亦自然符應而相會也道是德之體德是道之用就體言道就用言德故有二文也失者同於失注失謂任己而失人也同於失者所爲與失同也同於道者道亦樂得之注與道同者道亦樂得之䟽有爲躁競執教生迷既而爲行同於失理之人所以不能虚心冥會而言道失者猶失道也故西昇經云宿世不學問今復與失鄰同於德者德亦樂得之注與德同者德亦樂得之同於失者失亦樂失之注與失同者失亦樂失之信不足注君信不足於下下則應之以不信有不信注此言物類相歸同聲相應同氣相求雲從龍風從虎水流濕火就燥自然之數也御曰執言滯教不能悟了是於信不足也自同於失失亦樂求是有不信䟽不能忘言而執言求理雖名信道於理未足所以執言滯教未達眞源故於重玄之境有不信之心也跂者不立注跂進也謂貪權慕名進取功榮則不可乆立身行道跨者不行注自以爲貴而跨於人衆共弊之使不得行也自見者不明注人自見其形容以爲好自見其行以爲應道殊不知其形醜操行之鄙也御曰露才揚己動而見尤故不明也䟽不能忘我故也自是者不彰注自以爲是而非人衆共弊之使不得彰明也䟽物共弊之故其德不顯也自伐者無功注所爲輒自伐取其功美即失有功於人䟽凡有所爲輒自伐取其功物皆不與故無功勣自矜者不長注好自矜大者不可以乆長䟽矜夸自高驕慢凌物此乃愚短其德豈長其於道曰餘食贅行注贅貪也使此自矜伐之人在治國之道日賦斂餘禄食以爲貪行也䟽餘食殘食也贅附生之肉也莊子云附贅懸疣也言矜夸自是之人其在道行也猶如殘食贅病其可厭賤也物或惡之注此人在位動欲傷害故物無不畏惡之䟽贅是無用之肉夸是無用之行世間人物感惡見之故懷道之士豈處心於夸企之行乎故有道者不處注言有道之人不居其國也有物混成先天地生注謂道也道無形混沌而成萬物乃在天地之前也䟽有物者道也道非有而有非物而物混沌不分而能生成庶品亦明不混而混雖混而成故莊子云神鬼神帝生天生地又云在天地之先而不爲老寂兮寥兮獨立不改注寂者無音聲寥者空無形獨立者無匹雙不改者化有常也䟽寂無聲寥無形獨立無待對也不改無遷變也言道體窈冥形聲斯絶既無因待亦不改變此乃獨獨非待獨也周行不殆注道遍行天地無所不入在陽不焦托陰不腐無不貫穿不危不殆也節解曰謂聖人行一於身周流四支百節九竅百脉之中故曰周行不殆也可以爲天下母注道養育萬物精氣亦如母之養子節解曰謂守道含一爲天下母䟽道無不在名曰周行所在皆通故無危殆也開化陰陽安立天地亭毒群品子育含靈生之畜之故可爲母吾不知其名字之曰道注我不見道之形容不知當何以名之見萬物皆從道所生故字之曰道䟽道本不可以智知道名即初章云無名天地始也取其通生之德故字曰道强爲之名曰大注不知其名强名曰大大者高而無上羅而無外無不包容故曰大也䟽體無涯際故名爲大不大爲大故稱爲强夫名以召體字以表德道即是用大即是體故名大而字道也人皆先名後字今乃先字後名者欲表道與俗反也大曰逝注其爲大非若天常在上非若地常在下乃復逝去無常處也䟽逝往也有大力用能運致衆生至聖境也逝曰遠注言遠者窮於無窮布氣天地無所不通䟽超陵三界逺達三清也遠曰返注言其逺不超絶乃復返在人身䟽返還也既自利道圓遠之聖境故能返還界内慈救蒼生又解迷時以三清爲三界悟則三界是三清故返在塵俗之中即是大羅天上故道大天大地大王亦大注道大者包羅天地無所不容天大者無不蓋也地大者無不載也王大者無不制也域中有四大而王居其一焉注八極之内有四大王居其一也御曰王者人靈之主萬物系其興亡將欲申其鑒戒故云王居其一也䟽境域之中有此四大王有化被之德故繼二儀而居一數也莊子云夫道未始有封而言域中者欲明不域而域雖域不域不域而域議說域中雖域不域包羅無外也節解曰謂肺大心大肝大脾大腎水生一也而王處一即脾氣主布四方行一也人法地注人君當法地安靜和柔也種之得五穀掘之得甘泉勞而無怨有功而不置也地法天注天湛然不動施而不求報生長萬物無所收取天法道注道法清靜不言陰行精氣萬物不化自成道法自然注道性自然無所法也䟽人王也必須法地安靜爲行定能生慧也故下章云躁則失君既靜如地次須法天清虚覆育無私也又天有三光喻其慧照地是定門天是慧門既能如天次須法道虚通包容萬物也既能如道次須法道自然之妙理所謂重玄之域也道是迹自然是本以本收迹故義言法也又解道性自然更無所法體絶修學故言道法自然重爲輕根注人君不重則不尊治身不重則失神草木之花葉輕故零落根重故能長存䟽此戒行人勿得輕躁故書云君子不重則不威靜爲躁君注人君不靜則失威治身不靜則身危龍靜故能變化虎躁故致夭虧䟽靜則無爲躁則有欲有欲生死無爲長存靜能制動故爲君也是以聖人終日行不離輜重注輜靜也聖人終日行道不離靜與重也䟽言君子達人終日行化同塵處世而不離重靜此則動而寂也雖有榮觀燕處超然注榮觀謂宫闕燕舍后妃所居也超然遠避而不處也䟽言重靜之人雖有榮華之宫觀燕寢之處所而游心虚淡超然物外不以爲娱處染不染也奈何萬乘之主注奈何者疾時主傷痛之辭也萬乘之主謂王也御曰奈何者傷嘆之詞也天下者大寳之位也言人君奈何以身縱欲輕用氣命亡其位乎䟽奈何猶如何也王畿千里戎車萬乘之君應須重靜乃恣情淫教厚賦繁徭禽荒色荒輕忽寓内哀歎之甚故云如何而以身輕天下注王者至尊而以其身行輕躁乎疾時王奢恣輕淫失其精也節解曰謂輕死也雖貴爲天子當守一長生見而不學故爲輕身然後没命雖有玉玾金鏤何益於身輕則失臣注王者輕淫則失其臣治身輕淫則失其精躁則失君注王者行躁疾則失其君位治身躁疾則失其精神節解曰謂思慮煩躁之士不得長生䟽恣情放欲輕躁日甚外則亡國内則危身忠良竄匿失臣也宗廟傾覆失君也善行無轍迹注善行道者求之於身不下堂不出門故無轍迹䟽以無行爲行行無行相故云善行妙契所修境智冥會故無轍迹之可見此明身業净善言無瑕謫注善言謂擇言而出之則無瑕疵謫過於天下也御曰能了言教不爲滯執遺象求意理詮言忘故於言教之中而無瑕疵之過䟽不言之言言而不言終日言未嘗言亦未嘗不言故謂之善言也莊子云言而足者則終日言而盡道也瑕疵疾也謫過責也語默不異故無口過之責謂聖人之言既無的當無所之諸此明口業净善計不用籌筭注善以道計事者守一不移所計雖多不用籌筭而可知也䟽妙悟諸法同一虚假不舍虚假即假體眞無勞筭計劃然明了此明意業净善閉無關楗不可開注善以道閉情欲守精神者不如門户有關楗可得而開也節解曰謂閉氣握固上閉天牝下閉地牡故曰無關楗御曰兼忘言行不入異門心無逐境之迷境無起心之累雖無關楗豈可開乎䟽外無可欲之境内無能欲之心欲根起用用而無染斯則不閉而閉雖閉不閉無勞關楗故不可開善結無繩約不可以解注善以道結事者乃結其心不如繩索可得解也御曰體了眞相本以虚忘若能虚忘則心與道合雖無繩索其可解乎䟽上士達人先物後己發大弘願化度衆生誓心堅固結契無爽既非世之繩索約束故不可解也然誓心多端要不過五一者發心二者伏心三者知眞心四者出離心五者無上心第一發心者謂發自然道意入我法門第二伏心者謂伏諸障惑也第三知眞心者有九品即生彼九宫第四出離心者有三品即生三清所謂仙眞聖也第五無上心者謂直登道果乃至大羅也善結者結此五種心終始無替也明結願堅固也節解曰謂結持魂魄也聖人抱魂持魄故曰不可解也是以聖人常善救人注聖人所以常教人忠孝者欲以救人性命䟽聖人即是三業清净六根解脱之人也爲能發弘誓願救度衆生故常在世間有感斯應慈善平等終不遺棄也而無棄人注使貴賤各得其所也常善救物注聖人所以常教民順四時以救萬物之傷殘也故無棄物注聖人不賤石而貴玉視之如一䟽失舉聖人者表恩被有情後舉物示仁覃無識亦言救人直據黔首救物爰及四生也是謂襲明注聖人善救萬物是謂襲明天道䟽襲承也用也即結嘆常善聖人利物無棄可謂承用聖明之道也善人不善人之師注人之行善者聖人即以爲人師䟽善人即向襲明之人也此人恒懷大心先物後己引導衆生允當宗匠不善人者善人之資注資用也人行不善聖人猶教導使爲善得以給用也䟽言聖人恒在有中化導群品即用不善之類而爲福田以彼衆生益成我德故也不貴其師注獨無輔也不愛其資注無所使也御曰若存師資未爲致極今明所以貴師者爲存學相學相既空自然無貴所以愛資者爲存教相於教忘教故不愛資貴愛兩忘而道自化雖知大迷注雖自以爲知言此人乃大迷惑也䟽無所化也前以聖導凡勸令修學今明凡聖平等以遣師資斯則從淺至深漸階衆妙也是謂要妙注能通此意是謂能知微妙要道也䟽師資兩忘聖凡一揆俗智分别雖知大迷據理而言實成要妙知其雄守其雌爲天下谿注雄以喻尊雌以喻卑人雖自知其尊顯當復守之以卑微去雄之强梁就雌之柔和如是則天下歸之如水之流深谿也䟽谿徑也雄陽是剛躁之名雌陰是柔靜之義知雄躁剛猛適歸死滅雌柔靜退必致長生故棄雄而守雌可爲天下之要徑也節解曰雄者魂也雌者魄也謂神岀入在身故行一之士法守自然握固閉氣抱持魂魄也常德不離注人能謙下如深谿則德恒在不復離己也復歸於嬰兒注當復歸志如嬰兒泰然而無知節解曰谿者口也謂行一閉氣湛然無爲子則不老復還嬰兒也䟽離散也嬰兒譬無分别智也言人常能守靜則其德不散故能復於本性歸無分别智也知其白守其黑爲天下式注白以喻昭昭黑以喻默默人雖自知昭昭明達當復守之以默默如暗昩無所見如是則可爲天下法式則其德常在也䟽白昭明也黑闇昩也式法也自顯明白炫燿於人人必挫之良非智者韜光晦迹退守闇昩不忤於物故是德人能知白黑利害者可爲修學者之鴻範也爲天下式常德不忒注人能爲天下法式則其德常在於己不復差忒也節解曰謂道行一以仙爲天下式復歸於無極注德不差忒則長生乆壽歸身於無窮極節解曰謂常守生行一無極也䟽忒差也無極道也常能棄明守暗其德不差忒復我清虚歸於至道知其榮守其辱爲天下谷注榮以喻尊貴辱以喻污濁人知己之有榮貴當復守之以污濁如是則天下歸之如水流入深谷䟽榮寵貴也辱卑賤也處於榮貴遂起驕奢而福善禍淫忽然凋落比之榮寵翻爲禍基若知倚伏不常貴爲禍始應須自戒勿爲放逸處於榮華恒如卑賤故貴以賤爲本高以下爲基是以知榮辱天下歸凑譬彼百川包納虚谷也爲天下谷常德乃足注足止也人能爲天下谷德乃止於己也復歸於樸注復當歸身於質樸不復爲文飾也節解曰謂守自然也䟽樸眞本也始自知雄終乎守辱三種修學爲道之要又如虚谷聲無不容所以常道之德於是乃足故能復於眞空歸於妙本樸散爲器注器用也萬物之樸散則爲器用若道散則爲神明流爲日月分爲五行聖人用之則爲官長注聖人升用則爲百官之元長御曰含德内融則復歸於樸常德應用則散而爲器既涉形器必有精粗故聖人用則爲群才官長矣䟽散布分也器用也官君主也長師宗也既能反樸還淳歸於妙本須從本降迹以救蒼生布此淳和而爲化用故西升經云道遂散布分既而爲君以御世爲師以導俗聖人即用斯樸散而爲御導之方故大制無割注聖人用之則以大道制御天下無所傷害治身則以大道制情欲不害精神也䟽至聖神力不可思議三界内外無不制伏主領弘普故稱大制而亭毒群品陶鑄生靈推功於物不爲宰主故云不割割宰斷也將欲取天下注欲爲天下主也而爲之注欲以有爲治民吾見其不得已注我見其不得天道人心已明矣天道惡煩濁人心惡多欲䟽方將欲攝取天下蒼生而爲化主者必須虚心忘欲若以有爲取之纔欲攝化而不得之狀已彰也天下神器不可爲也注器物也人乃天下之神物也神物好安靜不可以有爲而治之也䟽含識之類悉有精爽并堪受道故名神器神器是帝位也若無爲安靜即品物咸亨必有爲治之擾動即群生失性故不可爲也爲者敗之注以有爲治之則敗其質樸執者失之注强執教之則失其情實生於詐僞䟽滯溺有爲則敗亡身命執心貪欲則失國喪邦故物或行或隨注上所行下必隨之也䟽夫物萬物也或不定也行由己也隨從他也言物或先時由己後即從他此明權勢不定也或嘘或吹注嘘温也吹寒也有所温必有所寒䟽温喻富貴也寒喻貧賤也言物有先貴後賤先富後貧猶如朱夏赫曦玄冬凛冽天即爽凉不定人亦貴賤何常或强或羸注有所强大必有所羸弱䟽夫强盛不乆當衰故下章云物壯則老西昇經云盛者必衰此則盛衰不定也或載或隳注載安也隳危也有所安必有所危明人君不可以有爲治國與治身也䟽河上本或載作或接夫接者連續也隳廢敗也連接續謂之成廢敗謂之壞此明安危不定故莊子云其成也毁也舉此八法者不定以表萬物無常故治國治身者不可以有爲封執而取之也是以聖人去甚去奢去泰注甚謂貪淫聲色奢謂車服飲食泰謂宫室臺榭去此三者處中和行無爲則天下自化䟽懷道聖人妙體虚假故不執上八法而能行下之三事甚則美其聲色奢則麗其服翫泰則廣其宫室去此三惑處於中一治國則祚曆遐延治身則長生乆視以道佐人主者注謂人主能以道自輔佐也不以兵强於天下注以道自佐人主不以兵革順道任德敵人自服節解曰謂口爲兵也口言失則兵革至精神踴躍魂魄相加神明怳惚則去其身矣䟽以用也佐輔也人主君王也言用正道輔佐君王者當偃武修文導之以德不可以盛用强兵騁暴天下内解身心者即是三業六根兵也其事好還注其舉事奸還自責不怨於人也節解曰謂安心定意行一乃還其身也䟽還返也報也言外用兵刃内有怨敵之仇内用三毒即有三塗之報此事必爾故言好還師之所處荆棘生注農事廢田不修䟽師軍也言兵馬所行之處害人損物但有荆棘穢草不生禾稼也亦猶欲心馳騁之處唯增惡業不生善惠大軍之後必有凶年注天應之以惡氣則害五穀五穀盡則傷人善者果而已注行善者當果敢而已即休止也䟽果决定也已止也言修道善人决定止此暴心而不同兵也不敢以取强注不敢以果敢取强大之名也果而勿矜注當果敢謙卑勿自矜大果而勿伐注當果敢推讓勿自伐取其美果而勿驕注驕欺也果敢勿以驕欺人也果而不得已注當果敢至誠不得逼迫不得己䟽驕謂慢上矜謂夸下修道之夫撝謙遜讓不用自取强暴驕慢於人亦須决定雌柔不用矜夸於物伐取也推功於物不自取也不得已者如堯攻藂支禹攻有扈事不得已非樂兵伐勿强者結繩已前决定不用兵之行也是果面勿强注果敢勿以爲强兵堅甲以侵凌人也御曰前敵來侵不得已故用兵止之如是則果於應敵非果已取强也物壯則老注草木壯極則枯落人壯極則衰老也言强者不可以乆䟽炎極則凉理之恒數物壯則老其義必然是謂不道注枯老者坐不行道也不道早已注不行道者早已已死也䟽物壯則老兵强則衰既不謙柔故非眞道應須止息而勿行也夫佳兵者不祥之器注祥善也兵者驚精神濁和氣不善之器不當修飾也節解曰謂輕言者皆不活其身身危則亡其器此爲不祥之器也䟽佳麗也祥善也雖霜戈曜日寳劍暉天此乃凶荒之具非太平之器也内即三毒六根之兵若磨鋭諸根而貪取塵境者不善之行也物或惡之注兵動則有所害故萬物無有不惡之者故有道者不居注有道之人不處其國君子居則貴左注貴柔弱也用兵則貴右注貴剛强也此言兵道與君子道反所貴者異䟽有君子人物之德爲君子左陽也主吉主生右陰也主凶主殺言君子平居之世則貴左用文荒亂之時則貴右用武喻行人實智則貴長生權智有時而殺故經云千千截首萬萬剪形也兵者不祥之器注兵革者不善之器非君子之器注非君子所貴重之器也御曰君子以道德爲才器不貴兵謀節解曰謂口致兵革之言也陰强則殺身之斧也故曰不祥之器也不得已而用之注謂遭衰逢亂禍欲加萬民乃用之以自守䟽非君子善人之器必須夷凶拯難不得止而用之權智亦爾恬淡爲上注不貪土地不利民財寳勝而不美注雖得勝不以美爲利䟽恬淡無爲也君子心尚無爲故用兵不以爲美也喻行人雖用權智而以實道爲上應不離眞若美之者是樂殺人注美得勝者是謂喜樂殺人䟽若以佳兵爲美是即愛樂干戈則殺人也夫樂殺人者不可得志於天下注爲人君樂殺人此不可使得志於天下爲人主必專制人命不可妄行刑罰䟽樂殺之夫天下共疾讎閲既多不可得意也故吉事尚左注左主生位也凶事尚右注陰道主殺偏將軍處左注偏將軍卑而居陽位者以其不專殺故也一家疏云將軍本一動靜異名靜則侍居故稱偏也上將軍處右注上將軍尊居右者以其主殺也王曰動用威刑閫外專殺自任之道故言爲上以殺主陰雖上而居右言以喪禮處之注上將軍居右喪禮尚右死人貴陰也䟽左是吉位右是喪位今偏小將軍居於左邊上大將軍處其右者欲明雖復專命即以死喪之禮而安處之殺人衆多以悲哀泣之注傷己德薄不能以道化人而害無辜之人御曰以生靈之貴而交戰殺之有惻隱之心故以悲哀傷泣之爾䟽兵伐行處屠害必多故上將軍悲哀愍其傷殺既非用道恐濫無辜一羊口殺謂敵人衆謂士卒傷己德薄而不能以道化人而害無辜則心爲悲愍而泣之明非所樂也王曰一夫呼嗟王道爲之傾覆一里違和陰陽爲之改度鄒衍降霜杞妻城毁匹夫釐婦猶感天地而况横尸巨野散骨長源肉飼鳥鳶血流絳草愍彼殘傷曷得不喪戰勝則以喪禮處之注古者戰勝將軍居喪主禮之位素服而哭之明君子貴德而賤兵不得已而誅不祥心不樂之比於喪也知後世用兵不已故悲痛之御曰勇士雄入戰而獲勝勝則受爵居於右位尚右非吉是以喪禮處之但以爲不祥之器亦何必縞素爲資䟽君子善人貴能用道事不獲已方以喪禮葬之既其武不及文足明權不及實治國則不得已而用武應化則不得已而行權以此格量故知權劣實勝也道常無名注道能陰能陽能弛能張能存能亡故無常名御曰道以應用爲常常能應物其應非人故云道常無名䟽虚通之理常湛凝然非色非聲無名無字寂寥獨立超四句之端怳惚希夷離百非之外豈獨得以言象求安可以心智測故下文云天地始又云吾不知其名也樸雖小天下莫敢臣注道樸雖小微妙無形天下不敢有臣使道者御曰樸妙本精一故云小而應用匠成則至大故無敢以道爲臣也䟽樸淳素也小微妙也言淳樸之道其自細微而能開化陰陽亭毒群品百姓日用而不知亦未敢自臣我有道者也又云物無貴賤道在則尊故巢父許由王倪齧缺此之數子皆以窮爲匹夫而天子不得臣諸侯不得友即其事也侯王若能守萬物將自賔注侯王若能守道無爲萬物將自賔服從於德化䟽言君王若能修守至道殊方異域自來賔伏而歸化也天地相合以降甘露注侯王動作能與天地更相應合則天降下甘露善瑞䟽夫與天地合其德陰陽合其序者故致四時玉燭七曜無愆靈瑞嘉祥芝英甘露國無虚用不亦宜乎民莫之令而自均注天降善瑞則萬物莫有教令之者皆自均調若一也䟽均平也莫無也德合二儀明齊三景百姓無待教令而自太平道力不可思議守之致有此益也始制有名注始道也有名萬物也道無名能制於有名無形能制於有形也䟽因無名以立有名寄有名以明無名方欲引導群迷令其悟解也名亦既有注既盡也有名之物盡有情欲叛道離德故身毁辱天亦將知止注人能法道行德天亦將自知止䟽道無稱謂降迹立名意在引物向方歸根反本既知寄言詮理應須止名求實不可滯執筌蹄失於魚兔知止所以不殆注夫知止則神靈祐助不復危殆䟽筌蹄既忘妙理斯得止名會實故無危殆譬道之在天下猶川谷之於江海注譬言道之在天下與人相應和如川谷與江海流行相通䟽江海善下爲百川之所共凑聖道虚容爲衆生之所歸往故下文云江海所以能爲百川王者以其善下也知人者智注能知人好惡是智也䟽謂照達前境鑒人機性大少淺深無不悉知此是他心智自知者明注人能自知賢與不肖是爲反聽無聲内視無形故爲明也御曰智者役用以知物明者融照以鑒微智則有所不知明則無所不照䟽自知己身宿命善惡三世報應無不明了此是宿命智勝人者有力注能勝人者不過以威力也䟽智力勝人威能制物所以降伏天魔剪除異道此是降魔智願曰才干勝人不過有力有力之人必有其敵有其敵者則强弱未定今以性制情謂之自勝自勝之人無敵於己無敵於己者可謂强矣自勝者强注人能自勝己情欲則天下無有能與己爭者故爲强也御曰能制勝人者適所謂有力能自勝其心使柔弱者方可以全其强爾䟽自能克服己心制諸累欲累欲不起智慧日强此是斷惑智知足者富注人能知足之爲足則長保福禄故爲富也䟽守分知足無復貪求非直財賄不貧亦乃道德豐富又解並鑒有無則萬境俱照智無不足故受富名此是知足智强行者有志注人能强力行善則爲有志於道道亦有志於人節解曰謂晝夜行道而不休息也御曰知止足者無貪求可謂富矣强力行者不懈怠可謂有志節矣䟽志節操也志力既强即發弘誓願務在先人後己外身濟物至乎道場終無退轉不失其所者乆注人能自節養不失其所愛愛天之精氣則可以長乆節解曰謂不失其一也䟽應機赴感隨病與藥咸使得宜不失其所以斯接物乆而强固死而不亡者壽注目不妄視耳不妄聽口不妄言則無怨惡於天下故能長壽也節解曰謂人尸解者死而後生也䟽行願俱足内外道員理當不死不生無夭無壽而今言死而不亡壽者欲明死而不死不壽而壽也應身遷謝名之爲死聖體常在義說爲壽御曰死者分理之終亡者天枉之數壽者一期之盡夫知人勝人必招殃咎知足强力動得天常死而不亡者是一期之盡可謂壽矣大道汎兮注言道汎汎若浮若沉若有若無視之不見說之難殊御曰大道汎兮無系而能應物左右無所偏名其可左右注道可左可右無所不宜䟽汎汎無系也亦普遍之名言大道虚玄汎然無著慈悲普遍感而遂通雖復非陰非陽而應乎左右欲明方圓任物罄無不宜故莊子云有左有右有義有倫萬物恃之以生注恃待也萬物皆待道而生而不辭注道不辭謝而逆止也䟽一切萬物恃頼至道而得生成慈救善誘終不辭憚也又云物亦不謝生於自然成功不名有注有道不名其有成功也御曰言萬物恃頼沖和用而生化而道不辭以爲勞功用備成不名有也䟽生化萬品至功潜被而歸功於物故不有功名衣被萬物不爲主注道雖愛養萬物不如人主有所收取可名於小注道匿德藏名怕然無爲似若微小御曰衣被猶覆育也䟽衣被萬物陶鑄生靈而神功潜被不爲主宰既俯就於物宜其稱小此不小而小也萬物歸焉不爲主注萬物皆歸道受氣道非如人主有所禁止也可名爲大矣注萬物横來横去各使自在可名於大䟽大海虚谷百川競凑至道寥廓萬物歸之不主之義已如前釋物既仰歸於道宜受大名此即不大而大也是以聖人終不爲大注聖人法道匿德藏名不爲滿大故能成其大注聖人以身師道不言而化萬物修治故成其大御曰聖人法道忘功終不自爲光大故能成其大也䟽體道聖人忘我存物靜退謙柔終不爲大只爲先物後己忘功忘大故爲衆生之長獨居三界之尊而成其大執大象天下往注執守也象道也聖人守大道則天下萬民移心歸往也治身則天降神明往來於己也䟽執持也此不執而執執無所執大象猶大道之法象也即前忘大聖人持無形之大象常善救物爲天下歸往也莊子云王駘立不教坐不義虚而往實而歸宣尼引天下歸之是也往而不害安平泰注萬物歸往而不傷害則國安家寧而太平矣治身不害神明則身安而大壽御曰物往而不傷害則安於太平疏太大也言蒼生歸至聖所皆獲利益而無損害所獲之利即是安平等之法也不害則明其拔苦安平則語其與樂樂與餌過客止注餌美也過客一也人能樂美於道則一留止也一者去盈而處虚忽忽如過客也䟽樂絲竹宫商也餌飲食滋味也樂有聲可悦餌有味可餐可悦可餐故蹔過之客逢必止住耽愛也道出言淡乎無味注道出入於口淡泊非如五味有酸鹹甘苦辛也䟽至道虚寂其體希夷所以出言淡然無味非如可翫可悦故音樂有聲行者爲之止住道言無味學者罕見留心嗟乎世人迷妄之甚但能淫聽有聲之聲詎能咀嚼無味之味耶深嘆愚徒故有斯譬視之不足見注足得也道無形非若五色之有青黄赤白黑可得見也䟽至道窈冥妙絶形色非如餚饌等法故不可以眼識求聽之不足聞注道非若五音有宫商角徵羽可得聽聞也䟽大音希聲非體商角豈如鐘鼔可以耳聞聖道出言其例亦爾用之不可既注用道治國則國富民昌治身則壽命延長無有既盡之時也御曰以道靜鎮初無言教故視不足見聽不足聞淳風大行萬物殷厚歲計有餘故用不可既既盡也䟽至道之言淡然虚遠非聲非色絶視絶聽若鏡之心物來斯照如聖之智感而遂通是知無用之用其用難盡將欲翕之必固張之注先開張之者欲極其奢淫䟽翕合也斂也將欲行權攝化群品令其翕斂不爲貪染者必先開張縱任極其奢淫然後翕之昔老君西入罽賔化道之日初恣其兇勃然後化之以道是也將欲弱之必固强之注先强大之者欲使遇禍害也䟽欲令歸道柔弱必先極其强大然後示之以雌柔將欲廢之必固興之注先興之者欲使其驕奢至危也䟽欲廢其殘獷者必固恣其凶暴凶暴既極可以廢之也將欲奪之必固與之注先與之者欲極其貪心䟽先恣其惡名爲與之後令歸道歸善名爲奪之故老君先示凡迷所以恣其剛戾後見神通於是惡人降伏方得奪其凶惡令歸善道此四對義勢相似只言初淺後深耳上機之人聞實即悟下機之人要假於權此則增治陳也是謂微明注此四事者其道微其效明御曰經云正言若反易云巽以行權權反經而合義者也故君子行權貴於合義小人用之則爲詐譎孔子曰可與立未可與權信矣故老君前章示執大象斯謂之實此章繼以翕張是謂之權欲量衆生根性故示以權實覆却相明令必致性命之域而惑者乃云非道德之意何其迷而不悟哉將欲翕斂衆生情欲則先開張極其侈心令自困於愛欲則當翕斂之矣强弱等義略與此同此道甚微而效明著故云是謂微明也䟽上來權道雖復微密而甚有明驗也柔弱勝剛强注柔弱者乆長剛强者生亡䟽柔弱實智也剛强權智也欲教化衆生故須權智確論二智實智勝也魚不可脱於淵注魚脱於淵爲去剛得柔不可復制國之利器不可以示人注利器者謂權道也治國權者不可以示執事之臣也治身道者不可以示非其人也䟽脱失也利器權柄也魚藏於水權隱於心故物莫之害也魚失水爲物所擒權示人即爲人所制故不可以示人道德眞經注䟽卷之三

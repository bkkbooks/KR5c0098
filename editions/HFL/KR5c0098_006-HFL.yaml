front:
  text: 道德眞經注䟽卷之六信六
  hash: sha256:f554e6fd3d45c0eb363665af6ec51a497bb378ff18805830cdf945a49c8f086e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0098_HFL_006-001a, image: hfl/0406/0406-004.png}
body:
  text: 吴郡徵士顧歡述知者不言注知者貴行不貴言䟽知道之士達於妙理知理無言說所以不言故莊子云道無問問無應無爲謂是也節解曰謂一不可說也言者不知注駟不及舌多言多患䟽封執名言執言求理理超言象所以不知故莊子云有問道而應之者不知道也知與黄帝是也節解曰謂說者不知一也塞其兊閉其門注塞閉之者欲絶其源御曰了悟者於法無愛染於言無執滯故云塞其兊既無愛染則嗜欲之門閉矣䟽塞者息言論閉者制六情也節解曰謂閉塞九竅固精守氣也挫其鋭注人情欲有所鋭爲者當念道無爲以挫止之䟽止貪競也解其紛注紛結恨不休者當念道淡泊以解釋之䟽釋恚怒也和其光注雖有獨見之明當和之使闇昩不使耀亂人也䟽接愚俗也同其塵注不當自别殊也䟽混世事也上來數句前已具釋今略帖文不復詳辯所以重言者明此數句於學門切當故重出之也是謂玄同注玄天也人能行此上事是謂與天同道也䟽前既斷伏身心次則和光晦迹所以行圓德滿故與玄理符同裴曰光智也塵愚也衆生飾智以耀人縱愚以染患聖人和光不耀同其塵也故不可得而親注不以榮譽爲樂獨立爲哀御曰玄同無私故不可得而親也故不可得而疏注志靜無欲與人無怨御曰汎然和衆不可得而疏䟽道契重玄境智雙絶既兩忘於物我亦一觀乎親疏不可得而利注身不欲富貴口不欲五味御曰無欲故不可得而利亦不可得而害注不與貪爭利不與勇爭氣御曰無欲可爭故不可得而害䟽夫利害者與乎存亡死生無變於己况利害之間乎故莊子云不就利不違害不可得而貴注不爲亂世主不處闇君位御曰體道自然而然故不可得而貴亦不可得而賤注不以乘權而驕不以失志故屈御曰洗然無瑕滓故不可得而賤䟽夫富貴者興乎榮辱也故毁譽不動寵辱莫驚故不可以貴以貴賤語其心也故爲天下貴注其德如此天子不得臣諸侯不得屈與世沉浮容身避害故爲天下貴也御曰體了無滯言忘理暢鋭紛盡解光塵亦同既難親疏不可貴賤故爲天下貴䟽既遣蕩乎親疏又虚忘於利害毁譽不關其慮貴賤莫届乎懷故蒼生荷戴而不辭群品樂推而不厭是以天下人間尊而貴之以正理國注以至也天使正身之使至有國也䟽以用也政謂名教法律也治輯理也夫聖人馭世接物隨機運權道以行兵用實智以理國此則偃武修文之時也以奇用兵注奇詐也天使詐僞之人令其用兵也䟽奇竊詐也尅定禍亂應須用兵兵不厭詐必資奇譎此則偃文修武之世也節解曰謂治身者正於心不以口兵自傷也國身也以無事取天下注以無事無爲之人使取天下爲之主御曰在宥天下貴乎無爲若以政教理國奇詐用兵斯皆不合於道唯無事無爲可以取天下䟽文武之道應物隨時譬彼蘧廬方兹芻狗執而不遣更增其弊未若無爲無事凝神姑射之中不武不文垂拱廟堂之上以斯化物物無疵癘用此治民民歌擊壤攝取之妙其在兹乎吾何以知天下其然哉以此注此今也老子言我何以知天意然哉以今曰所見知之御曰以此下文知之也䟽教主假設我何以知攝化天下必須無事乎用此下文則知之也天下多忌諱而民彌貧注天下謂人主也忌諱謂防禁也令煩則姦生禁多則下詐共相欺紿故貧也節解曰謂有爲也䟽刑法嚴舉罹罪者衆民不安業所以彌貧治身者不能率性任眞而篤於禁忌内無道德故貧也一句解以政民多利器國家滋昬注利器者權也民多權則視者眩於目聽者惑於耳上下不親故國家昏亂矣御曰利器謂權謀人主以權謀爲多不能返實下則應之以譎詐故令國家滋益昏亂人多伎巧奇物滋起注人謂人君百里諸侯也多知伎巧刻畫宫宇雕琢章服奇物滋起下則化上飾金鏤玉文綉綵色日以滋起䟽知巧謂機心也奇物謂戰具也言在上好武下必順之故各起異端競獻知巧野戰攻城機械非一多呈奇物以取洪勛治身者多知巧許貪取前境分别之心日益其弊此一句重釋用兵也法令滋彰盜賊多有注法奸也珍奸之物滋生彰著則農事廢饑寒并至故盜賊多有也御曰無爲既失法令益明竊法爲奸盡成盜賊豈非多有乎榮曰珍奸之物爲法物也多貴金玉盜賊斯起也亦言法所以息盜盜更多禮所以整亂作陳曰亦自然之理也多忌諱則失取舍之和也多利器則權在下也多伎巧則蕩心之所生也滋法令則弊倖之興不可革也故聖人云我無爲而民自化注故聖人云謂下事也我無爲而民自化聖人言我修道承天無所改作而民自化成也節解曰謂守自然則元氣流行也䟽主上虚淡無爲下民自化改惡從善言老君自是聖人托撝謙之聖化故莊子云寓言十九也我無事而民自富注我無徭役徵召之事民安其業故皆自富也節解曰謂人無事則形氣精神血脉充溢也䟽心既無爲迹又無事四民居業六合同歡輕徭薄賦不富如何我好靜而民自正注聖人言我好靜不言不教民皆自忠正也節解曰謂人虚心不邪念則氣存形中也䟽在上好靜不擾於民民禀淳風自歸正道我無欲而民自樸注我常無欲去華文微服飾民隨我以爲質樸節解曰謂人無情欲守一堅固則精氣淳厚不衰耗也䟽君上寡欲少私清廉潔素則百姓知足守分歸於淳樸也自聖人已下數句并釋無事取天下之義也其政悶悶注其政教寬大悶悶昩昩似若不明其民醇醇注政教寬大故民醇醇富厚相親睦也䟽悶悶寬裕也淳質樸也言君上無爲布政寬裕下民從化皆多淳樸也其政察察注其政教急疾言决於口聽决於耳也其民缺缺注政教急疾民不聊生故缺缺日以疏薄䟽察察嚴速也缺缺零落也上好有爲爲政迫遽民遭其暴故多零落也夫治身亦宜虚忘寬簡不得執心急速也禍兮福之所倚注倚因也夫禍因福而生也人遭禍而能悔過責己修善行道則福來禍去福兮禍之所伏注福伏匿於禍中人得福而爲驕恣則福去禍來䟽倚因也匿伏也言悶悶則致福察察則招禍此之三事近由一心福則在於禍中禍則伏在福内其則不遠也孰知其極注禍福更相生誰知其窮極時也其無正注無不也謂人君不正其身無國也䟽孰誰也福禍之徵起乎善惡業既不定報亦隨之所以輪轉三塗迴還六道千變萬化誰知其極乎上士達人志我濟物體兹正道悟彼重玄不爲禍福之因故無禍福之報故莊子云禍亦不至福亦不來禍福無有惡有人灾今所以輪轉無極者爲其不懷正道故也正復爲奇注奇詐也人君不正下雖正復化上爲詐也䟽奇虚詐也假使有心學於正道者則執正爲正未能忘遣不與實相應故爲虚詐也善復爲祅注善人皆復化止爲祅祥也䟽縱爲善者猶執名言既乖正理適爲妖孽故莊子云爲聲爲名爲妖孽也顧曰設欲爲善乃爲妖孽名聲之善也節解曰爲人得道之福不能守一輒有驕盈邪意復生也民之迷其日固乆御曰言人君迷惑失正已來其日固乆矣節解曰謂世之人不能守其一惑於邪僞失福得禍從來乆逺非獨今日也䟽言凡鄙之人所以爲妖爲奇者以其愚痴迷惑其日固乆故抑乃無始豈曰今生故西升經云如是迷來乆是以聖人方而不割注聖人行方正者欲以率下不以割截人也節解曰方謂一之正道也守之當堅行之當乆無復以邪自傷割也䟽聖人體道方正軌則蒼生隨機引誘因循任物終不宰割使從己也此則舉聖戒凡令其修學廉而不害注聖人行廉清欲以化民不以傷害民也今則不然正己以害人也䟽妙體物境空幻無可貪取非關卓爾清廉避世之穢害也斯則净穢雙遣貪廉兩忘不廉而廉不穢而穢故莊子云大廉不慊又云廉清不信節解曰廉謂氣之清也不可以穢濁妨道行也直而不肆注肆申也聖人雖曲己從人不自申也䟽肆申也素質雅正體無邪諂而曲從於物不由己直故前章云大直若屈也節解曰謂一之功平隨心委曲不可以繩墨爲正光而不耀注聖人雖有獨見之明常如暗昩不以耀亂人也御曰聖人善化不割彼而爲方不穢彼而爲廉不申彼而爲直不耀彼而爲光但修之於身而天下自化肆申也節解曰光謂神明流通内潤形中不須火燭爲耀也䟽智慧光明無幽不照而韜光晦迹不炫耀於物忘其照也故莊子云滑疑之耀聖人圖而域之治人注謂人君欲治理人民也事天注事用也當用天道順四時也莫如嗇注嗇愛惜也治國當愛民財不爲奢泰治身當愛精氣不放逸也䟽天自然也式法也莫若猶無過也言上合天道下化黎元者無過用無爲至法也夫唯嗇是以早服注早先也服得也夫儉愛民財則人安愛惜精氣則能先得天道也御曰何以聚人曰財故能儉愛四方之人襁負而至早服事其君矣服事也䟽嘆此無爲之法獨能自利利他用之治身則制伏魔試用之治國則逺荒歸伏早服謂之重積德注先得天道是謂重積德於己也䟽重深重也積累積也言欲内制魔試外伏遐藩必須積行累功其德深重方可逺伏也御曰聖人積德四海歸仁則無有不能制伏者矣克能也節解曰謂奸邪伏匿者皆由重一而積氣也重積德則無不克注克勝也積德於己則無不勝也䟽克勝也亦得也言累功行其德深重自利利他無所喪失内外制伏無不獲勝也節解曰謂重一氣積邪除病愈故無不克勝也無不克則莫知其極注無不克勝則莫知己德之窮極也䟽能知相應理無不契道深功遠莫能知其窮極者也節解曰謂一行身中除邪愈病莫知盡極則其命長存莫知其極可以有國注莫知已德有極則可以有社稷爲民致福䟽既理無不契則深遠無極故以有國莅民爲王侯化主也有國之母可以長乆注國身同也母道也人能保身中之道使精氣不勞五神不苦則可以長乆䟽既爲帝王國主慈育蒼生視物如子故云之母德行雖高功成不處無爲虚淡故可長乆矣是謂深根固蒂注人能以炁爲根以精爲蒂如樹木根不深則拔蒂不堅則落言當深藏其氣固守其精無使泄漏也長生乆視之道注深根堅蒂者乃長生乆視之道也䟽根本也蒂迹也根能生蒂以譬本能生迹迹而本曰深根本而迹曰固蒂夫根不深則傾危蒂不固則零落只爲根深所以長生蒂固所以乆視此明有國聖人本迹俱妙故結云長生乆視之道視照也治大國若烹小觧注鮮魚也烹小魚者不去腸不削鱗不敢撓恐其糜也治國煩則下亂治身煩則精散䟽烹煮也鮮魚也言煮小魚撓之則糜爛任置即自全喻理國無爲即大平躁動則荒亂以道莅天下其鬼不神注以道德居位治天下則鬼神不敢見其精神以犯人也䟽莅臨也言用正道以臨天下者使邪魅之鬼不敢爲妖孽之患也顧曰神者靈效之謂也以道居位臨理天下則太平太平之代鬼魅不敢神以道修身則眞照得一得一之士尸魄不靈非其鬼不神其神不傷人注其鬼非無精神也邪不入正不能傷自然之人也御曰上言其鬼不神非謂鬼歇滅而無神也但其不敢見怪以傷人矣䟽神靈驗也非此鬼不靈驗也但以福祐於人不損傷於物治身者鬼以諂魅爲義即是擾動邪淫之心也言以正道理身諂魅之心不能傷於正行縱使心動即其眞照故不能傷行也節解曰非謂鬼無神也道在人身故神不傷人也非其神不傷人聖人亦不傷人注非其鬼神不能傷害人以聖人在位不傷害人故鬼不敢干也御曰鬼見神怪傷人者由聖人有爲失道故也今鬼所以不見怪傷人者蓋以聖人行無爲清淨故爾疏諸本作亦字張系及陸先生本作之字然之亦二字相似故作亦字今用之爲是言非此鬼不傷物但爲聖人以道莅位能制伏邪惡故鬼不傷害於人力在聖理故云亦不傷人也治身者言非但動心不能傷行以爲聖智制伏故雖動而不能傷寂也節解曰謂人行治道與神明相合内無陰過故鬼不能傷也外無陽罪故聖人不能刑也人之行一天神在外衛身在里護形元氣混沌皆共治身己之所行上法於天頭戴日月光明星辰列宿皆在身中精神呼吸食玉英也夫兩不相傷注鬼與聖人兩俱不相傷也故德交歸注夫不相傷者則人得治於陽鬼得治於陰人得全其性命鬼得保其精神故德交歸焉䟽兩謂鬼處於陰人處於陽幽顯得所不相傷害而守其分兩無讎閲遂乃人施德於鬼鬼恩惠於人恩德往來故交相親附也理身者攝動歸寂以成己行既即動即寂何所攝耶今明不攝而攝不應而應非應之而應者也大國者下流注治大國當如江海居下流不逆於細微也天下之交注大國者天下士民之所交會也節解曰泥丸爲大國口爲小國口承上下灌丹田丹田則地郊也䟽大國則萬乘之邦郊郭外也之往也言大國虚容譬於江海江海處衆流之下故百川競注大國用道謙柔故萬邦歸往朝宗慕義滿於郊郭也本亦作交字大國行謙故與小國交會也天下之交牝牝常以靜故勝牡注牝者陰類也柔謙和而不唱女所以能屈於男者陰勝陽也以其安靜不先求也䟽天下之郊迭前文以生後句也牝雌靜也牡雄躁也言大國所以能令諸國款咐而交會者常用謙和雌靜故能勝雄躁也若用剛躁則不能致也是知治身治國莫不以柔順爲先也以靜爲下注陰道以安靜爲謙下也故大國以下小國則取小國注能謙下者則常取之䟽以用也下謙遜也取攝化也言聖人君臨大國善用謙柔故能攝化萬邦遐邇款附重譯來貢不亦宜乎小國以下大國則聚大國注此言國無小大能執謙畜人則無過失御曰大取小以爲臣妾小取大以爲援助也節解曰謂泥丸居上爲大國丹田處下爲小國行一之道閉氣嚥液下流丹田液化爲血血化爲精精化爲氣胎息引之還補其腦推而引之雲布四海故上取下聚也小國自知卑下守分雌柔聚於大國之中欽風慕義也故或下而取或下而聚注下者謂大國以下小國小國以下大國更以義相取也䟽或不定言小國用柔故聚於大國之中大國用下故取得萬國之懽心用下則同聚取斯别故言或也夫大國不過欲兼畜人小國不過欲入事人注大國不失下則兼并小國而取畜之使爲臣僕也䟽大國所以用謙者更無餘意也不過欲兼愛小國小國用柔者餘心不過欲入大國之中慕德接事也夫兩者各得其所欲故大者宜爲下注大國小國各欲得其所大國又宜爲謙下也御曰一求臣妾二求援事是兩者各求得其所欲然大國者常戒於盈滿故云大者宜爲其下䟽兩者謂大小二國兼畜入事各遂其心雖復大小俱用柔和而大宜偏行謙下何者夫物必以大輕小未嘗以小陵大故陵大者宜爲下此則高者抑之義也節解曰兩者謂泥丸丹田也泥丸欲氣升丹田欲氣降共成一神也道者萬物之奥注奥藏也道爲萬物之藏無所不容也䟽道者虚通之妙理衆生之正性也奥深密也亦藏府也言道生成萬有囊括百靈大無不包故爲萬物藏府也善人之寳注善人以道爲身寳故不敢違失也御曰善人知守道者昌失道者亡故寳而行之而無患累也䟽修道善人達見眞性得玄珠於赤水故能寳而貴之不善人之所保注道者不善人之所保倚也謂遭患逢急猶知自悔卑下也䟽保守持也流俗之耽滯物境性情浮競豈能守持也美言可以市注美言者獨可於市耳大市交易而退不相宜善美言美語求者欲疾得賣者欲疾售也尊行可以加人注加别也人有尊貴之行可以自别異於凡人未足以尊道也御曰甘美其言可以求市尊高之行可以加人以况聖人以甘善法味之言尊高清淨之行以化不善之人亦如市賈之售相率而從善矣䟽不善之人心行澆薄言多佞美奸爲飾詞猶如市井更相覓利又不能守弱撝謙後身先物方自尊高己行加凌於人不善之徒言行如是其於道也不亦遠乎人之不善奚棄之有注人雖不善當以道化之蓋三皇之時無有棄民德化淳也御曰不善之人亦在德化而已何棄遺之有乎䟽奚何也言聖道冥通救物弘普縱使衆生不善何有棄心慈救覆被接濟無遺故立天子置三公注欲使教化不善人也䟽既接濟無遺宜設世之法故立天子以統萬機置三公而論道調治陰陽輯熙治政意在舟航庶品亭毒群生自開闢已來眞君出世體道權應而爲帝王上以象三清而置僚署也雖有拱璧以先駟馬不如坐進此道注雖有美璧先駟馬而至故不如坐進此道也䟽拱璧抱璧也謂圓全大璧也駟馬一乘車也古者召士必先齎拱璧後遣駟馬之車言縱有高蓋全璧富貴榮華亦不如無爲坐忘修進此道何者夫修道可以長生富貴適爲大患故廣成子云人生處世如雲翔空氛藹俄爾以此格量不如遠矣顧曰皎潔修名謂之尊行自尊於行者可以加勝於人殊非至也孫曰美言可以奪衆貨之價尊行可以加衆人之上夫道之出言淡乎無味聖人處無爲之事行不言之教豈華詞以悦百姓之耳飾行以耀萬物之目哉古之所以貴此道者何不日求以得注古之所以貴此道者不日日遠行求索近得之於身也顧曰無假遠索曰日求之但行積於身得之於心玄悟在我也有罪以免耶注有罪謂遭亂世闇君妄行刑誅修道可以解怨免於衆邪也羅什等曰迴向善道以免諸惡故爲天下貴注道德洞達無不覆濟全身治國恬然無爲故可爲天下貴也御曰道在悟不在求不如財帛可日日求而得之故云不日求以得既悟自無罪累豈待有罪方求免耶故可爲天下貴也䟽言曩昔聖人所以珍貴此道者何耶只爲不經一日求之則得此言悟者目撃道存迷者累劫不會假使無始以來生死罪譴一得還源可以頓免有此神力不可思議故爲天下人間之所尊貴也爲無爲注因循而成故無所造作䟽妙契心源不失眞照照達有爲即無爲是也故無爲即爲爲即無爲也節解曰謂爲一者不爲身也事無事注不預設備除煩省事也䟽事者色聲物境一切諸事也妙體眞空照不乖寂雖涉事而無事也節解曰謂事一者不事人也味無味注深思逺慮味道之意也䟽味者染著之謂也根塵兩空色味雙寂雖復取咮而無滯也大小多少注陳其戒令也欲大反小欲多反少自然之道也報怨以德注行善修道絶禍於未生也御曰於爲無爲於事無事於味無味者假令大之與小多之與少既不越分則無與爲怨若逐境生心違分傷性則無大無小皆爲怨懟今既守分全和是故能報怨以德也䟽怨懟也報償也言無始以來大小之罪多少之業今欲减除頓償使了者必須用前爲事味等三種德心觀之則三世皆空萬法虚靜物我冥一何懟之有故前章云有罪以免耶斯之謂也圖難於易注欲圖難事當於易時未及成也疏圖謀度也難罪報也易初心也言欲謀度遣却惡道之難者必須觀察初心既無作則無報也爲大於細注欲爲大事必作於小禍亂從小來也御曰肆情縱欲者於爲無不難於事無不大今欲圖度其難營爲其大當須與性未散而分未越則是於其易細也䟽細小也爲巨釁者本乎微小此明欲滅惡果先須遣因天下難事必作於易天下大事必作於細注明上文所預圖是以聖人終不爲大注處謙虚也䟽作起也夫天下艱難罪報必起自易心言一念初心造業甚易也故重考大殃必起於小從微至著漸成巨釁所以欲除惡報先制初心故能成其大注天下共歸之也夫輕諾必寡信注不重言也節解曰謂人輕諾者失自矜之實也䟽此起喻也諾然許也寡少也夫輕易許諾於人者必少信實後則貽於寡信之責多易必多難注不慎患也御曰輕諾許人必寡於信動作於易後必多難䟽此合喻也夫輕易許諾則致寡信之責亦猶輕易爲罪必招八難之重殃故修道之士應須凝重不可輕率也是以聖人猶難之注聖人動作舉事猶進退重難之欲塞其源也故終無難注聖人終身無患難之事由避害深也䟽猶尚也體道聖人實無難易而尚難而不爲故無艱難之責况在凡俗而縱情乎此舉聖戒凡也故郭注莊子云聖人雖入火不熱而未曾蹈火又云逺火非逃熱即斯義也其安易持注治身治國安靜者易守持也䟽安靜也持守也言聖人靈府寂泊未起攀縁如此之時甚易修守也其未兆易謀注情欲禍患未有形兆之時易謀止也䟽兆狀也謀圖也其次雖起心縁取而於境未有形狀即宜攝心歸靜於業未成故易謀慮也其脆易破注禍亂未動於朝夕情欲未見於形色如脆弱易破除也其微易散注其事未彰著微小易散去也䟽脆虚軟也猶如果瓜結實未堅虚脆易破初心起染亦復如是結業微淺故易除也爲之於未有注欲有所爲當於未有萌芽之時塞其端也一疏爲學也言聖人修守常在未有縁染之時此解其安易持也治之於未亂注治身治國於未亂之時當預閉其門也䟽亂者謂結業以成爲業所牽精神昏亂也今萌心雖起染於境未見當爾之時易爲治理此解其未兆易謀也合抱之木生於毫末注從小成大也䟽夫百圍之木生於毫微喻三塗重釁原乎一念而以木爲喻者言木從小至大遂能蔭蔽日光譬染心從微至著亦能覆蓋眞性若推此樹起自虚無即空而至樹亦非有四塵所成故也煩惱爲義起自虚無即空而言亦非有也九層之臺起於累土注從卑立高也䟽層猶級也言九級之臺起於一簣之土喻九夜之禍起乎一念染心勖諸學者深宜戒慎千里之行始於足下注從近至逺䟽河上本作千里此言百仞且七尺曰仞夫陟百仞之高岑發自初歩履八門之苦難起自染心前寄九重明結業已成此托百仞况方造未息爲者敗之注有爲於事廢於自然有爲於義廢於慈仁有爲於色廢於精神也執者失之注執利遇患執敵失身堅持不得推讓返還也御曰凡情迷執不能忘遣動成執著執者求得理必失之䟽至道虚空無爲無執凡情顛倒有執有爲爲即危亡故言敗之執乖實當故言失之是以聖人無爲故無敗注聖人不爲華文不爲利色不爲殘害故無敗壞無執故無失注聖人有德以教愚有財以與貧無所執藏故無所失於人也民之從事常於幾成而敗之注從爲也民之爲事常於功德幾成而貪位好名奢泰盈滿而自敗之䟽幾近也凡人從於有爲之務執心躁競分别取舍曾無逺見每欲近成有始無卒故多敗也書云靡不有初鮮克有終慎終如始則無敗事注終當如始不終懈怠䟽此戒慎學人令道心堅固終始如一豈有敗乎六度之中終當第四也是以聖人欲不欲注聖人欲人所不欲者人欲彰顯聖人欲韜光人欲文飾聖人欲質樸衆人欲於財色聖人欲於道德不貴難得之貨注聖人不眩晃爲服玩不賤石而貴玉學不學注聖人學人所不能學者人學智詐聖人學自然人學治世聖人學治身守道眞也復衆人之所過注衆人學問反也過本爲末過實爲華復之者使反本實也御曰聖人不求過分之學也䟽聖人靈照自天不同凡智了知諸境空幻不見可欲之物故於欲中即不見欲相既於欲不欲何玉帛之可貴乎又達眞假無差故能無學學即不學不學即學不見學異不學異學故西升經云吾學無所學乃能明自然河上本作復諸家作備備防也衆人執滯有爲不能忘學故執學者以防衆生之禍患也以輔萬物之自然注教人反本實者欲以輔助萬物自然之性而不敢爲注言聖人動作因循不敢有所造爲恐離本也䟽輔助也導也言一切衆生皆禀自然正性迷惑妄執喪道乖眞今聖人欲持學不學之方引導令其歸本但聖人窮理盡性亦無爲無不爲也今言聖人不爲者亦欲輔導群生復被自然之理故言不敢爲也道德眞經注疏卷之六

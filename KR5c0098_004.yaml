body:
  text: 吴郡徵士顧歡述道常無爲而無不爲注道以無爲爲常䟽凝寂之道寂爾無爲從體起用應物施化故曰而無不爲前句是本後句是迹此明本迹迹本寂動動寂之義也蔡曰道體凝寂眞際不動故曰無爲應物而動物無不用故曰而無不爲侯王若能守萬物將自化注侯王而能守道萬物將自化效於己也御曰妙本清淨故常無爲物恃以生而無不爲也侯王若能守道無爲則萬物自化君之無爲而天下純樸䟽萬乘之主五等之君若能守持此道八荒萬國自然從化行人亦爾所以偏舉侯王者明君王爲化利物弘多也杜曰德能伏物道在則尊皇王守道不令自均公侯懷德不嚴而化羅什内解曰心得一空資用不失萬神從化伏邪歸正化而欲作吾將鎮之以無名之朴注吾身也無名之樸道也萬物以化效於己復欲作巧僞者侯王當以身鎮撫之以道德也御曰言人既從君上之化無爲清淨而復欲動作有爲者吾將以無名之樸而鎮靜之無名之樸道也䟽作起修也樸道也言衆生初起修者必有心欲於果報也既起斯欲即須以無名樸素之道安鎮其心令不染有此以空遣有也顧曰作謂僞生也言侯王守道物皆從化忽有人從安化中欲生詐僞之心者老君言我將以道鎮之又曰混沌其心令無分别也又曰無名之樸者教戒是也無名之樸亦將不欲不欲以靜注言侯王鎮撫以道德民亦將不欲故當以清淨導化之䟽非但不得欲於有法亦不得欲於此無名之樸也前以無遣有此則以無遣無有無雙遣離一中道也天下將自正注能如是者天下將自正安定也䟽靜息也前以無名遣有次以不欲遣無有無既遣不欲還息不欲既除一中斯泯此則遣之又遣玄之又玄所謂探微索隱窮理盡性者也既而一切諸法無非正眞稊稗瓦甓悉皆至道故云天下自正此一句結衆妙之門也御曰無名之樸亦將不欲者言人君既以無名之樸鎮靜之蒼生不可執此無名而令有迹將恐尋迹喪本復入有爲故於此無名之樸亦將兼忘不欲於欲無欲亦忘泊然清净天下自正也又曰道常無欲樂清淨故令天地常正天地者道之臣也君王法道行戒臣下之心悉皆自正矣上德不德是以有德注上德謂大古無名號之君德大無名故言上德也不德者言其不以德教民因循自然養人性命其德不見故言不德也言其德合於天地和氣流行民得以全也䟽上者高昇是超出之名德者得也以尅獲爲義言上德之人妙契道境境智冥會得失兼忘得失兼忘故言不德境智冥會故言有德有德則遣其失不德則遣其得也下德不失德是以無德注下德謂有號謚之君德不及上德故言下德也不失德者其德可見其功可稱以有名號及其身故無德也上德無爲而無以爲注言法道安靜無所施爲故無以名號爲也䟽以用也上德無爲至本凝寂而無以爲迹用虚妙此名無爲而爲爲即無爲也下德爲之而有以爲注言爲教令施政事皆以爲己取名號也䟽心不忘德故稱爲之亦仍有事故言有爲也上仁爲之而無以爲注上仁爲行仁之君其仁無上故言上仁也爲之者爲仁恩也功成事立無以執爲也䟽仁慈悲也有心覆育故言爲之不貴恩報故言無以爲確論上仁不及下德對義仁勝故稱無以爲三寳之中以慈爲首故五德之内亦以仁爲先者也上義爲之而有以爲注爲義以斷割也動作以爲己殺人以成威賦下以自奉也䟽義主正惡裁非即經中戒律是也然戒律之本被下機士涉有爲未階虚妙故言爲之有以也上禮爲之而莫之應注謂上禮之君其禮無上也爲之者言爲禮制度序威儀也言禮華盛實衰飾偽煩多動則離道不可得應也䟽禮尚威儀即經中教齋威儀等是也且至道沖寂大象無形今乃賤素貴華重文輕質不崇恬淡唯尚威儀雖爲漸教法門而未能與理相應非但内乖於道而乃外亦不能應物故言莫之應盧曰玉帛之禮以爲行聘之端故曰上爵命有度故曰爲之禮節煩多玉帛斯竭下不供上故曰而莫之應以不應故刑罰行焉則攘臂而仍之注言禮煩多不可應則上下忿爭故攘臂相仍引之也御曰禮尚往來不來非禮行禮於彼而彼不應則攘臂而怒相仍引也䟽仍因也禮尚往來更相責望因其禮薄即攘臂怒之欲明上禮爲教之弊故莊子云魯酒薄而邯鄲圍即其事也故失道而後德注言道衰而德化生也䟽德上德也衆生感衰道化斯隱應物隨時下德方見失德而後仁注言德衰而仁愛見也䟽德化漸替仁恩繼之失仁而後義注言仁衰而分義明䟽仁慈不行厥義方起失義而後禮注言義衰則禮施聘行玉帛御曰失道者失上德也上德合道故云失道夫道德仁義者時俗夷險之名也故道衰而德見德失而仁存仁亡則義立義喪而禮救斯皆適時之用故論禮於淳樸之代非狂則悖忘禮於澆醨之世非愚則誣若能解而更張者當退禮而行義退義而行仁退仁而行德忘德而合道人反淳樸則上德之無以爲之者也䟽自道喪澆醨於斯爲極不能止惡方事節文雖復强作威儀而浮偽以甚夫禮者忠信之薄注言禮廢本治末忠信日以衰薄而亂之首注禮者賤質而貴文故正直日以少邪亂日以生䟽徒日外彰文飾未是情發於中既非信實之厚適足忠誠之薄不懲淫勃之原更資昏亂之首前識者道之華注不知而言知是前識此人失道之實得道之華也而愚之始注言前識之人愚闇之倡始御曰禮以救亂而貴固知而失禮意者則將矜其玉帛貴其拜跪如此之人故爲愚昧之始也䟽不知强知曰前識識在知前也言此前識之人於修道行中甚爲華僞既非大智慧源乃是愚癡之始也顧曰前識者謂不待研求也夫清淨虚妙則深不可識無色無象其道自眞若夫辭說辯贍儀形焕炳相奸森羅在前可識此非至眞之實乃是大道之華而愚之始夫愚人始化未見眞實故以前識引其愚道華化其始也序家云此釋最爲勝是以大丈夫處其厚注大丈夫謂道德之君也處身於淳樸也不處其薄注不處身違道爲世煩亂也䟽丈長也夫扶也謂有勇猛慈救之智堪爲群品之長以扶護蒼生也其志弘普故稱大丈夫大丈夫當懷道德之厚豈處禮義之薄耶處其實注處忠信也不處其華注不尚言華也御曰有爲者道之薄禮義者德之華故聖人處無爲之事其厚也䟽達道之夫方外之士當留情於道德之實豈處心於前識之華故去彼取此注去彼華薄取此實厚䟽去彼華薄則是絶仁去義取此實厚則是返樸還淳且上德聖人體無分别豈有心於彼此情系於去取者乎蓋明不去而去雖去不去亦不取而取雖取不取非去之而去取之而取者也去取既爾彼此亦然也昔之得一者注昔往也一無爲也道之子也御曰一者沖和之妙氣也䟽昔古也言曩劫初得道之者所得之狀具列於下文斯則御今而引古也天得一以清注言天得一故能垂象清明節解曰謂泥丸在人頭中清氣下灌故曰以清䟽禀得道之氣故積陽成天清浮在上也地得一以寧注言地得一故能安靜不動摇也䟽同禀一道故凝陰成地寧靜於下節解曰謂丹田不淫不亂精神居其身故曰寧也神得一以靈注言神得一故能變化無形節解曰神謂心也心爲神靈五藏之主故曰以靈䟽神道處陰幽冥難測由其得一故靈智無方故莊子云神鬼神帝生天生地也谷得一以盈注言谷得一故能滿盈而不絶節解曰谷謂口也口爲華池宫能致醴泉故曰以盈䟽谷川谷也言谷得一故能泉源流潤溪壑盈滿萬物得一以生注言萬物皆須道以生成也䟽有識有情通號萬物同禀一道故得生成節解曰謂萬物異形皆共得一以生故曰以生侯王得一以爲天下正注言侯王得一故能爲天下平正節解曰謂脾也位處中黄以一制化四方故曰以正䟽帝王公侯莫不禀道爲化只以無爲得一故能布政天下放勛文命是也其致之注言致誡也謂下六事也御曰物得道用因用立名道存則名立用失則實喪故天清地寧神靈谷盈皆資妙用以致之故云其致之䟽致得也通結前六事咸得一道也内解云通是一人而有六種行門也節解曰謂天地人神靈水泉萬物各共一以成故曰其致之也天無以清將恐裂注言天當有陰陽弛張晝夜更用事不可但欲清明無已時將恐分裂不爲天也節解曰謂泥丸不得一則腦枯頭白齒落故曰裂地無以寧將恐發注言地當有高下剛柔節氣五行不可但欲安靜氣無已時將恐發泄不爲地也䟽發變動也言地不能用道寧靜則恐有崩淪之灾昔岐山崩三川震是也節解曰謂丹田不得一則精氣發泄故曰恐發也神無以靈將恐歇注言神當有王相死囚休廢不可但欲靈變無已時恐虚歇不爲神也節解曰謂心亂不守一則身空早老故曰恐歇䟽歇廢也神不依道則智用愚怠既無靈驗將恐歇滅也谷無以盈將恐竭注言谷當有盈縮虚實不可但欲盈滿無已時將恐枯竭不爲谷也節解曰謂口失其一則華池不津液故曰竭也䟽竭塞也言川谷乖一灾否斯起致泉源枯竭流注不通也萬物無以生將恐滅注言萬物生長收藏當隨時死生不可但欲長生無已時將恐滅亡不爲物也䟽一切萬物得一而生若喪道乖眞則死滅俄頃侯王無以貴高將恐蹶注言侯王當屈己下人汲汲求賢不可但欲高貴於人無已時將恐顛蹶失其位也御曰夫得一者不可以矜其用聖人垂教本爲生靈雖逺舉天地清寧而會歸只在侯王謙和守於雌靜之道則無蹶滅等事䟽蹶敗也君王不能用道守貴乖理勃德將恐神器顛覆社稷傾危夏桀殷紂即其人也故貴必以賤爲本注言必欲尊貴者當以薄賤爲本若禹稷躬耕舜陶河濱周公下白屋也節解日謂人求長生當以元氣爲母故曰本也䟽貴尊高也賤卑下也得一之君故能謙下失道之主必致驕矜故知驕矜是下賤之基謙卑是尊高之本校量得失故有斯戒高必以下爲基注言必欲尊貴當以下爲本基猶築墻造功因卑成高下不堅固後必傾危也節解曰謂道人養精補腦當用丹田爲主故爲基也顧曰夫言高以下爲基者貴非自貴由乎賤者所崇高非自高縁於下者所載然則貴因賤立得不以賤爲本乎是以智者務本故居謙而不危愚者殉末故窮高而自墜是以侯王自謂孤寡不轂注言孤寡者喻孤獨也不轂喻不能如車轂爲衆輻所凑也王侯至尊貴能以孤寡自稱此非以賤爲本乎以曉示於人也䟽不轂猶不善也王侯貴人智慧聰達體知傲是喪身之本謙是貴盛之基故撫接下凡以卑自牧乃稱孤寡不轂顧曰所以言不轂者不善也謂德非物宗不能總衆之辭凡上三者皆人之所惡而侯王自以爲稱豈非以賤爲本乎此其以賤爲本也非乎注言非乎者蓋是嗟嘆假問之辭云耳節解曰非謂其道是元一歟故致數車無車注致就也人就車數之爲輻爲輪爲轂爲衡爲轅爲軸無有名爲車者故成爲車以喻侯王不以尊號自名故能成其貴䟽箱輹轂輞假合而成徒有車名數即無實五物四大爲幻亦然所以身既浮虚貴將安寄是以處貴應須謙下蔡曰所言譽者毁譽也言有道王侯卑以自牧既忘貴賤亦一毁譽故人數數譽揚言其有德亦不以爲貴數數毁敗言其無道亦不以爲賤顧曰言行人君子善以道德功行建立身心無德可彰無迹可顯則深根固蒂不爲是非欲惡之所抽拔也不欲琭琭如玉落落如石御曰琭琭玉貌落落石貌以賤爲本也反者道之動注此明權也反者取其反經合義反經合義者是聖人行權行權者是道之運動故云反者道之動弱者道之用也注此明實也弱者取其柔弱雌靜雌靜者是聖人處實處實者是道之常用故云弱者道之用也天下萬物生於有注天下萬物皆從天地生天地有形位故言生於有有生於無注天地神明蜎飛蠕動皆從道生道無形象故言生於無也此言本勝於華弱勝於强謙虚勝盈滿也御曰夫實之於權猶無之生有故行權者貴反於實用有者必資於無然至道沖寂離於名稱諸法性空不相因待若能兩忘權實雙泯有無則數輿無輿可謂超出矣䟽有應道也所謂無一之氣也元一妙本所謂冥寂之地言天地萬物皆從應道有法而生即此應從妙本而起妙本即至無也上士聞道勤而行之注上士聞道勤苦竭力而行之䟽上機之人智慧聰達一聞至道即悟萬法皆空所以勤苦修學遂無疑怠中士聞道若存若亡注中士聞道治身以長生治國以太平欣然而存之退見財色榮譽惑於情欲而復亡之御曰中士可上可下故疑惑則若存若亡䟽中機智暗照理不明雖復聞道未能妙悟若斂情歸定即時得虚心纔涉世塵則滯於有境與奪不定故云存亡下士聞道大笑之注下士貪狠多欲見道柔弱謂之恐懼見道質樸謂之鄙陋故大笑䟽下機之人機性愚鈍聞眞道玄遠至言弘博心既不悟謂之虚誕遂生誹謗撫掌大笑也不笑不足以爲道注不爲下士所笑者不足名之爲道䟽不爲凡人所笑不足稱爲聖道是以建言有之注建設之道也設言已有道當如下六句䟽建立也言上士所行之道建在下文有之則明道若昩等是也明道若昧注明道之人若闇昩無所見知也䟽昩暗也照達眞道之人昩迹同俗不顯其明若愚昩也進道若退注進取道者若退不及也䟽大學之人不見其迹内雖進修外若衰退夷道若類注夷平也大道之人不自别殊若多比類也上德若谷注上德之人若深谷不耻濁溽也䟽勝尚道德之人與太虚等量故能包容萬物若彼空谷也本欲有作俗字者言能忘德不異囂俗也大白若辱注大潔白之人若污辱不自彰顯也䟽白潔净也辱污辱也言大潔白高行之人和光同塵不耀於物故能混迹揚波若污辱也故東方生潔其道而穢其迹即斯義也廣德若不足注德行廣大之人若頑愚不足也御曰大成而執謙也䟽言懷大德之士體道虚忘故内至有餘而外若不足老子傳云良賈深藏若虚盛德容貌若愚也建德若偷注建設道德之人若可偷引使空虚也䟽偷盜也言建立大德之人藏名匿迹如彼偷竊不用人知故上經云猶若畏四鄰也質眞若渝注質樸之人若五色有淺不明也御曰淳一而和光也䟽質實也渝變也言素質體眞之士寂而動眞而應變見無常故若渝也大方無隅注大方正之人無委曲廉隅也䟽隅角也言體道大方之人因循順物不守節操不立小隅角所謂上達無節也大器晩成注大器之人若九鼎瑚璉不可倉卒而成也䟽瑚璉九鼎非一朝可成喻大學之人豈近心能證必須累劫修守方致虚極即任公子釣鰲是也節解曰謂守一不殆老則得道大音希聲注大音猶雷霆待時而動喻當愛氣希言䟽希猶無也至道至虚大音寂乎無響自妙本降迹無聲也師曠聽而不聞其聲也瓊音振於宇宙欲明是迹即本故言大音希聲大象無形注大法象之人質樸無形容䟽大道之象象而無形也離婁視之而莫見其形也色像遍乎虚空欲明即有而無故云大象無形也道隱無名注道潜隱使人無能指名也䟽至道妙本幽隱窈冥非形器之所測量豈名言之能詮辯也夫唯道善貸且成注成就也言道善禀貸人精氣且成就之也䟽貸借也獨此無名之道有大慈悲故能俯救衆生借其善力亭毒群品生化三才種種方便趣令成就道生一一生二二生三三生萬物注道生一道始所生者一也一生二一生陰陽也二生三陰陽生和清濁三氣分爲天地人也三生萬物天地人共生萬物也天施地化人長養之榮曰道生一虚中動氣故曰道生元氣未分故言一也一生二清濁分陰陽著也二生三運二氣三才三生萬物圓天覆於上方地載於下人主統於中何物不生也萬物負陰而抱陽注萬物無不負陰而向陽回心而就日也陳曰陰陽道之妙用也負則在外抱則在内沖氣以爲和注萬物之中皆有元氣得以和柔若胸中有藏骨中有髓草木中有空虚和氣潜通故得長生榮曰陽氣熱孤亦不能生物陰氣寒單亦不足成形因大道以通之借沖氣以和之所以得生也人之所惡唯孤寡不穀而王公以爲稱注孤寡不者穀不祥之名而王公以爲稱者處謙卑法空虚和柔也䟽孤獨鰥寡乃不善之事以此爲惡人之常情而王公貴人用斯自牧足明貴以賤爲本高以下爲基以勸修行之人必須處心謙順故物或損之而益注引之不得推讓心還文子曰爭則不足讓則有餘讓則禮義生爭則暴亂起益之而損注夫增高者致崩貪富者致患御曰自損者人益之自益者人損之故朝宗者善於下謙弱者德之柄孤寡爲稱不亦宜乎御疏曰故者仍上之辭也損貶毁也言王公稱孤寡以自毁損則爲百姓樂推尊敬而事之而致益也或益之而損者若王公貴寵其身居上而驕則下人離散而致損也書曰滿招損謙受益斯之謂也成䟽謙卑柔弱損己濟物物必歸之故生道獲全矜夸傲誕益己凌物物必挫之故致危敗危敗是損全生是益損益之驗其義盡然故言損之而益益之而損也人之所教注謂衆人所教我去弱爲强去柔爲剛我亦義教之注言我教衆人使去强爲弱去剛爲柔御曰老君云人君欲立教教人者當以吾此柔弱謙虚之義以教之也䟽言俗人儒教亦尚謙柔我之法門本崇靜退貴在虚忘所以爲異强梁者不得其死注强梁者謂不信玄妙背叛道德不從經教尚勢任力也不得其死者爲天命所絶兵刃所伐王法所殺不得以壽終而死也吾將以爲教父注父始也老君以强梁之人以爲教戒之始也御曰吾見强梁者亡柔弱者全故以此柔弱之教爲衆教之父䟽强梁猶剛躁也父始也言强梁之人必當夭折不得依於天命壽終而死也老君雖復演法多端教門匪一而每說柔弱爲善剛强爲惡以此切當將爲學道之先父亦本也顧曰言此强梁之士既不得其死我即爲其立教說斯無爲道德作其戰學之本父也天下之至柔馳騁天下之至堅注至柔者水也至堅者金石也水能貫堅入剛無所不通也䟽至柔水也至堅金也馳騁貫穿之義也言水至柔能攻金石之堅喻無爲至柔能破有爲之累故下文云天下柔弱莫過於水攻堅强者莫之能先也無有入無間注無有謂道也道無形質故能出入無間通神明濟群生也御曰無有者不染塵境也心中無所有也無間者道性自然清淨妙體混成一無間隙夫不爲可欲所亂令心境俱靜一無所有則心與道合契出入無間䟽間隙也言顛倒之流見空爲有達觀之士即有而空故言無有也入契會也有爲粗疏故有隙無爲微密故無間也而即有即無故能入無間之理也車曰言水之與風本無質相金石骨髓亦無間隙風之與水已能縱入行之所攻至妙之道本自無形煩惱結陋又無間竅道之妙惠早已入訖原其結縛之由要其頑執之本投其悟解之藥開其正性之機此即無有入無間也吾是以知無爲有益注吾見道無爲而萬物自化成是以知無爲之有益於人也不言之教注道法不言師之以身無爲之益注法道無爲治身有益精神治國則有益於人不煩勞也孫曰柔能破剛無能遣有以是知無爲之教大益於人天下希及之注天下者人主也希能有及道之無爲治身治國也䟽所謂不言非關杜口在理即有即無在教亦即言即默即言即默故名不言之教即有即無故名無爲之益益既不益而益教豈教而教哉斯乃窮理盡性蓋世之談世間名教罕能及者故言天下希及之顧曰則天玄默而風俗自移故曰不言之教法道無爲人物自化故言無爲之益名與身孰親注名遂則身退也御曰名者實之賔世人徇名以亡身故設問誰親欲令去功與名而全其眞䟽身内也實也名外也賔也孰誰也世人皆求外喪内貪名喪實何者夫令譽芳名本爲身也身既爲名身死名竟何施老君愍兹顛倒故覆云名之與身誰是汝親乎而汝貪名忘身耶以斯格量親疏可見故莊子云伯夷死名於首陽之下也身與貨孰多注財多則害身御曰徇多將以求財財得而亡身故設問孰多欲令擲玉毁珠以全其身䟽夫資貨者本爲我身迷惑之徒喪身徇貨故老君責言汝去貨存身利多爲聚貨喪身利多耶故莊子云盜跖死利於東陵之上得與亡孰病注好得利則病於行也䟽夫多貪得財必喪己少欲亡貨則存身然則得是喪己之徵亡是存身之驗喪己可以爲病存身可以爲樂世人翻以得爲適以亡爲病者不亦謬乎故教主言得與亡定誰是病甚愛必大費注甚愛色費精神甚愛財遇禍患所愛甚少所亡者多故言大費䟽費損也爲是義故甚愛名譽之人必勞形怵心費神損智此一句解名也多藏必厚亡注生多藏於府庫死多藏於丘墓生有攻劫之憂死有掘塜剖棺之患䟽夫多藏賄貨於府庫者必有劫盜之患非但喪失財物亦乃害及己身其爲敗亡禍必深厚故書云匹夫無罪懷璧其罪莊云大儒臚傳曰青青之麥生於陵陂生不布施死何含珠爲於是以金鎚控其頤徐别其頰無傷口中珠是也此一句解貨知足不辱注知足之人絶利去欲不辱其身䟽體知財賄虚假守分不貪清廉知足故無耻辱此一句解貨知止不殆注知可止則止財利不累於身心聲色不亂於耳目終身不危殆也䟽既悟名譽非眞所以止而不著全身遠害故無危殆上經云名亦既有夫亦將知止此一句結名可以長乆注人能知止足則福禄常在於己治身則神不勞治國則民不擾故可長乆䟽知止於名知足於貨忘名忘利則可長可乆此一句總結名道德眞經注䟽卷之四

front:
  text: 道德真經注疏卷之四信四
  hash: sha256:be8ce9acc8db74b2c6773d6300627c199624b7970d613131845b455a065143dc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0098_HFL_004-001a, image: hfl/0405/0405-004.png}
body:
  text: 吳郡徵士顧歡述道常無為而無不為注道以無為為常疏凝寂之道寂爾無為從體起用應物施化故曰而無不為前句是本後句是迹此明本迹迹本寂動動寂之義也蔡曰道體凝寂真際不動故曰無為應物而動物無不用故曰而無不為侯王若能守萬物將自化注侯王而能守道萬物將自化效於己也御曰妙本清淨故常無為物恃以生而無不為也侯王若能守道無為則萬物自化君之無為而天下純朴疏萬乘之主五等之君若能守持此道八荒萬國自然從化行人亦爾所以偏舉侯王者明君王為化利物弘多也杜曰德能伏物道在則尊皇王守道不令自均公侯懷德不嚴而化羅什內解曰心得一空資用不失萬神從化伏邪歸正化而欲作吾將鎮之以無名之朴注吾身也無名之朴道也萬物以化效於己復欲作巧僞者侯王當以身鎮撫之以道德也御曰言人既從君上之化無為清淨而復欲動作有為者吾將以無名之朴而鎮靜之無名之朴道也疏作起修也朴道也言衆生初起修者必有心欲於果報也既起斯欲即須以無名朴素之道安鎮其心令不染有此以空遣有也顧曰作謂僞生也言侯王守道物皆從化忽有人從安化中欲生詐僞之心者老君言我將以道鎮之又曰混沌其心令無分别也又曰無名之朴者教戒是也無名之朴亦將不欲不欲以靜注言侯王鎮撫以道德民亦將不欲故當以清淨導化之疏非但不得欲於有法亦不得欲於此無名之朴也前以無遣有此則以無遣無有無雙遣離一中道也天下將自正注能如是者天下將自正安定也疏靜息也前以無名遣有次以不欲遣無有無既遣不欲還息不欲既除一中斯泯此則遣之又遣玄之又玄所謂探微索隱窮理盡性者也既而一切諸法無非正真稊稗瓦甓悉皆至道故云天下自正此一句結衆妙之門也御曰無名之朴亦將不欲者言人君既以無名之朴鎮靜之蒼生不可執此無名而令有迹將恐尋迹喪本復入有為故於此無名之朴亦將兼忘不欲於欲無欲亦忘泊然清净天下自正也又曰道常無欲樂清淨故令天地常正天地者道之臣也君王法道行戒臣下之心悉皆自正矣上德不德是以有德注上德謂大古無名號之君德大無名故言上德也不德者言其不以德教民因循自然養人性命其德不見故言不德也言其德合於天地和氣流行民得以全也疏上者高升是超出之名德者得也以尅獲為義言上德之人妙契道境境智冥會得失兼忘得失兼忘故言不德境智冥會故言有德有德則遣其失不德則遣其得也下德不失德是以無德注下德謂有號諡之君德不及上德故言下德也不失德者其德可見其功可稱以有名號及其身故無德也上德無為而無以為注言法道安靜無所施為故無以名號為也疏以用也上德無為至本凝寂而無以為迹用虛妙此名無為而為為即無為也下德為之而有以為注言為教令施政事皆以為己取名號也疏心不忘德故稱為之亦仍有事故言有為也上仁為之而無以為注上仁為行仁之君其仁無上故言上仁也為之者為仁恩也功成事立無以執為也疏仁慈悲也有心覆育故言為之不貴恩報故言無以為確論上仁不及下德對義仁勝故稱無以為三寶之中以慈為首故五德之內亦以仁為先者也上義為之而有以為注為義以斷割也動作以為己殺人以成威賦下以自奉也疏義主正惡裁非即經中戒律是也然戒律之本被下機士涉有為未階虛妙故言為之有以也上禮為之而莫之應注謂上禮之君其禮無上也為之者言為禮制度序威儀也言禮華盛實衰飾僞煩多動則離道不可得應也疏禮尚威儀即經中教齊威儀等是也且至道沖寂大象無形今乃賤素貴華重文輕質不崇恬淡唯尚威儀雖為漸教法門而未能與理相應非但內乖於道而乃外亦不能應物故言莫之應盧曰玉帛之禮以為行聘之端故曰上爵命有度故曰為之禮節煩多玉帛斯竭下不供上故曰而莫之應以不應故刑罰行焉則攘臂而仍之注言禮煩多不可應則上下忿爭故攘臂相仍引之也御曰禮尚往來不來非禮行禮於彼而彼不應則攘臂而怒相仍引也疏仍因也禮尚往來更相責望因其禮薄即攘臂怒之欲明上禮為教之弊故莊子云魯酒薄而邯鄲圍即其事也故失道而後德注言道衰而德化生也疏德上德也衆生感衰道化斯隱應物隨時下德方見失德而後仁注言德衰而仁愛見也疏德化漸替仁恩繼之失仁而後義注言仁衰而分義明疏仁慈不行厥義方起失義而後禮注言義衰則禮施聘行玉帛御曰失道者失上德也上德合道故云失道夫道德仁義者時俗夷險之名也故道衰而德見德失而仁存仁亡則義立義喪而禮救斯皆適時之用故論禮於淳朴之代非狂則悖忘禮於澆醨之世非愚則誣若能解而更張者當退禮而行義退義而行仁退仁而行德忘德而合道人反淳朴則上德之無以為之者也疏自道喪澆醨於斯為極不能止惡方事節文雖復强作威儀而浮僞以甚夫禮者忠信之薄注言禮廢本治末忠信日以衰薄而亂之首注禮者賤質而貴文故正直日以少邪亂日以生疏徒日外彰文飾未是情發於中既非信實之厚適足忠誠之薄不懲淫勃之原更資昏亂之首前識者道之華注不知而言知是前識此人失道之實得道之華也而愚之始注言前識之人愚暗之倡始御曰禮以救亂而貴固知而失禮意者則將矜其玉帛貴其拜跪如此之人故為愚昧之始也疏不知强知曰前識識在知前也言此前識之人於修道行中甚為華僞既非大智慧源乃是愚癡之始也顧曰前識者謂不待研求也夫清淨虛妙則深不可識無色無象其道自真若夫辭說辨贍儀形焕炳相奸森羅在前可識此非至真之實乃是大道之華而愚之始夫愚人始化未見真實故以前識引其愚道華化其始也序家云此釋最為勝是以大丈夫處其厚注大丈夫謂道德之君也處身於淳朴也不處其薄注不處身違道為世煩亂也疏丈長也夫扶也謂有勇猛慈救之智堪為群品之長以扶護蒼生也其志弘普故稱大丈夫大丈夫當懷道德之厚豈處禮義之薄耶處其實注處忠信也不處其華注不尚言華也御曰有為者道之薄禮義者德之華故聖人處無為之事其厚也疏達道之夫方外之士當留情於道德之實豈處心於前識之華故去彼取此注去彼華薄取此實厚疏去彼華薄則是絶仁去義取此實厚則是返朴還淳且上德聖人體無分别豈有心於彼此情系於去取者乎蓋明不去而去雖去不去亦不取而取雖取不取非去之而去取之而取者也去取既爾彼此亦然也昔之得一者注昔往也一無為也道之子也御曰一者沖和之妙氣也疏昔古也言曩劫初得道之者所得之狀具列於下文斯則御今而引古也天得一以清注言天得一故能垂象清明節解曰謂泥丸在人頭中清氣下灌故曰以清疏禀得道之氣故積陽成天清浮在上也地得一以寧注言地得一故能安靜不動搖也疏同禀一道故凝陰成地寧靜於下節解曰謂丹田不淫不亂精神居其身故曰寧也神得一以靈注言神得一故能變化無形節解曰神謂心也心為神靈五藏之主故曰以靈疏神道處陰幽冥難測由其得一故靈智無方故莊子云神鬼神帝生天生地也谷得一以盈注言谷得一故能滿盈而不絶節解曰谷謂口也口為華池宫能致醴泉故曰以盈疏谷川谷也言谷得一故能泉源流潤溪壑盈滿萬物得一以生注言萬物皆須道以生成也疏有識有情通號萬物同禀一道故得生成節解曰謂萬物異形皆共得一以生故曰以生侯王得一以為天下正注言侯王得一故能為天下平正節解曰謂脾也位處中黃以一制化四方故曰以正疏帝王公侯莫不禀道為化只以無為得一故能布政天下放勛文命是也其致之注言致誡也謂下六事也御曰物得道用因用立名道存則名立用失則實喪故天清地寧神靈谷盈皆資妙用以致之故云其致之疏致得也通結前六事咸得一道也內解云通是一人而有六種行門也節解曰謂天地人神靈水泉萬物各共一以成故曰其致之也天無以清將恐裂注言天當有陰陽弛張晝夜更用事不可但欲清明無已時將恐分裂不為天也節解曰謂泥丸不得一則腦枯頭白齒落故曰裂地無以寧將恐發注言地當有高下剛柔節氣五行不可但欲安靜氣無已時將恐發泄不為地也疏發變動也言地不能用道寧靜則恐有崩淪之灾昔岐山崩三川震是也節解曰謂丹田不得一則精氣發泄故曰恐發也神無以靈將恐歇注言神當有王相死囚休廢不可但欲靈變無已時恐虛歇不為神也節解曰謂心亂不守一則身空早老故曰恐歇疏歇廢也神不依道則智用愚怠既無靈驗將恐歇滅也谷無以盈將恐竭注言谷當有盈縮虛實不可但欲盈滿無已時將恐枯竭不為谷也節解曰謂口失其一則華池不津液故曰竭也疏竭塞也言川谷乖一灾否斯起致泉源枯竭流注不通也萬物無以生將恐滅注言萬物生長收藏當隨時死生不可但欲長生無已時將恐滅亡不為物也疏一切萬物得一而生若喪道乖真則死滅俄頃侯王無以貴高將恐蹶注言侯王當屈己下人汲汲求賢不可但欲高貴於人無已時將恐顛蹶失其位也御曰夫得一者不可以矜其用聖人垂教本為生靈雖逺舉天地清寧而會歸只在侯王謙和守於雌靜之道則無蹶滅等事疏蹶敗也君王不能用道守貴乖理勃德將恐神器顛覆社稷傾危夏桀殷紂即其人也故貴必以賤為本注言必欲尊貴者當以薄賤為本若禹稷躬耕舜陶河濱周公下白屋也節解日謂人求長生當以元氣為母故曰本也疏貴尊高也賤卑下也得一之君故能謙下失道之主必致驕矜故知驕矜是下賤之基謙卑是尊高之本校量得失故有斯戒高必以下為基注言必欲尊貴當以下為本基猶築墻造功因卑成高下不堅固後必傾危也節解曰謂道人養精補腦當用丹田為主故為基也顧曰夫言高以下為基者貴非自貴由乎賤者所崇高非自高緣於下者所載然則貴因賤立得不以賤為本乎是以智者務本故居謙而不危愚者殉末故窮高而自墜是以侯王自謂孤寡不轂注言孤寡者喻孤獨也不轂喻不能如車轂為衆輻所凑也王侯至尊貴能以孤寡自稱此非以賤為本乎以曉示於人也疏不轂猶不善也王侯貴人智慧聰達體知傲是喪身之本謙是貴盛之基故撫接下凡以卑自牧乃稱孤寡不轂顧曰所以言不轂者不善也謂德非物宗不能總衆之辭凡上三者皆人之所惡而侯王自以為稱豈非以賤為本乎此其以賤為本也非乎注言非乎者蓋是嗟嘆假問之辭云耳節解曰非謂其道是元一歟故致數車無車注致就也人就車數之為輻為輪為轂為衡為轅為軸無有名為車者故成為車以喻侯王不以尊號自名故能成其貴疏箱輹轂輞假合而成徒有車名數即無實五物四大為幻亦然所以身既浮虛貴將安寄是以處貴應須謙下蔡曰所言譽者毁譽也言有道王侯卑以自牧既忘貴賤亦一毁譽故人數數譽揚言其有德亦不以為貴數數毁敗言其無道亦不以為賤顧曰言行人君子善以道德功行建立身心無德可彰無迹可顯則深根固蒂不為是非欲惡之所抽拔也不欲琭琭如玉落落如石御曰琭琭玉貌落落石貌以賤為本也反者道之動注此明權也反者取其反經合義反經合義者是聖人行權行權者是道之運動故云反者道之動弱者道之用也注此明實也弱者取其柔弱雌靜雌靜者是聖人處實處實者是道之常用故云弱者道之用也天下萬物生於有注天下萬物皆從天地生天地有形位故言生於有有生於無注天地神明蜎飛蠕動皆從道生道無形象故言生於無也此言本勝於華弱勝於强謙虛勝盈滿也御曰夫實之於權猶無之生有故行權者貴反於實用有者必資於無然至道沖寂離於名稱諸法性空不相因待若能兩忘權實雙泯有無則數輿無輿可謂超出矣疏有應道也所謂無一之氣也元一妙本所謂冥寂之地言天地萬物皆從應道有法而生即此應從妙本而起妙本即至無也上士聞道勤而行之注上士聞道勤苦竭力而行之疏上機之人智慧聰達一聞至道即悟萬法皆空所以勤苦修學遂無疑怠中士聞道若存若亡注中士聞道治身以長生治國以太平欣然而存之退見財色榮譽惑於情欲而復亡之御曰中士可上可下故疑惑則若存若亡疏中機智暗照理不明雖復聞道未能妙悟若斂情歸定即時得虛心才涉世塵則滯於有境與奪不定故云存亡下士聞道大笑之注下士貪狠多欲見道柔弱謂之恐懼見道質朴謂之鄙陋故大笑疏下機之人機性愚鈍聞真道玄遠至言弘博心既不悟謂之虛誕遂生誹謗撫掌大笑也不笑不足以為道注不為下士所笑者不足名之為道疏不為凡人所笑不足稱為聖道是以建言有之注建設之道也設言已有道當如下六句疏建立也言上士所行之道建在下文有之則明道若昧等是也明道若昧注明道之人若暗昧無所見知也疏昧暗也照達真道之人昧迹同俗不顯其明若愚昧也進道若退注進取道者若退不及也疏大學之人不見其迹內雖進修外若衰退夷道若類注夷平也大道之人不自别殊若多比類也上德若谷注上德之人若深谷不耻濁溽也疏勝尚道德之人與太虛等量故能包容萬物若彼空谷也本欲有作俗字者言能忘德不異囂俗也大白若辱注大潔白之人若污辱不自彰顯也疏白潔净也辱污辱也言大潔白高行之人和光同塵不耀於物故能混迹揚波若污辱也故東方生潔其道而穢其迹即斯義也廣德若不足注德行廣大之人若頑愚不足也御曰大成而執謙也疏言懷大德之士體道虛忘故內至有餘而外若不足老子傳云良賈深藏若虛盛德容貌若愚也建德若偷注建設道德之人若可偷引使空虛也疏偷盜也言建立大德之人藏名匿迹如彼偷竊不用人知故上經云猶若畏四鄰也質真若渝注質朴之人若五色有淺不明也御曰淳一而和光也疏質實也渝變也言素質體真之士寂而動真而應變見無常故若渝也大方無隅注大方正之人無委曲廉隅也疏隅角也言體道大方之人因循順物不守節操不立小隅角所謂上達無節也大器晚成注大器之人若九鼎瑚璉不可倉卒而成也疏瑚璉九鼎非一朝可成喻大學之人豈近心能證必須纍劫修守方致虛極即任公子釣鰲是也節解曰謂守一不殆老則得道大音希聲注大音猶雷霆待時而動喻當愛氣希言疏希猶無也至道至虛大音寂乎無響自妙本降迹無聲也師曠聽而不聞其聲也瓊音振於宇宙欲明是迹即本故言大音希聲大象無形注大法象之人質朴無形容疏大道之象象而無形也離婁視之而莫見其形也色像遍乎虛空欲明即有而無故云大象無形也道隱無名注道潜隱使人無能指名也疏至道妙本幽隱窈冥非形器之所測量豈名言之能詮辨也夫唯道善貸且成注成就也言道善禀貸人精氣且成就之也疏貸借也獨此無名之道有大慈悲故能俯救衆生借其善力亭毒群品生化三才種種方便趣令成就道生一一生二二生三三生萬物注道生一道始所生者一也一生二一生陰陽也二生三陰陽生和清濁三氣分為天地人也三生萬物天地人共生萬物也天施地化人長養之榮曰道生一虛中動氣故曰道生元氣未分故言一也一生二清濁分陰陽著也二生三運二氣三才三生萬物圓天覆於上方地載於下人主統於中何物不生也萬物負陰而抱陽注萬物無不負陰而向陽回心而就日也陳曰陰陽道之妙用也負則在外抱則在內沖氣以為和注萬物之中皆有元氣得以和柔若胸中有藏骨中有髓草木中有空虛和氣潜通故得長生榮曰陽氣熱孤亦不能生物陰氣寒單亦不足成形因大道以通之借沖氣以和之所以得生也人之所惡唯孤寡不穀而王公以為稱注孤寡不者穀不祥之名而王公以為稱者處謙卑法空虛和柔也疏孤獨鰥寡乃不善之事以此為惡人之常情而王公貴人用斯自牧足明貴以賤為本高以下為基以勸修行之人必須處心謙順故物或損之而益注引之不得推讓心還文子曰爭則不足讓則有餘讓則禮義生爭則暴亂起益之而損注夫增高者致崩貪富者致患御曰自損者人益之自益者人損之故朝宗者善於下謙弱者德之柄孤寡為稱不亦宜乎御疏曰故者仍上之辭也損貶毁也言王公稱孤寡以自毁損則為百姓樂推尊敬而事之而致益也或益之而損者若王公貴寵其身居上而驕則下人離散而致損也書曰滿招損謙受益斯之謂也成疏謙卑柔弱損己濟物物必歸之故生道獲全矜夸傲誕益己凌物物必挫之故致危敗危敗是損全生是益損益之驗其義盡然故言損之而益益之而損也人之所教注謂衆人所教我去弱為强去柔為剛我亦義教之注言我教衆人使去强為弱去剛為柔御曰老君云人君欲立教教人者當以吾此柔弱謙虛之義以教之也疏言俗人儒教亦尚謙柔我之法門本崇靜退貴在虛忘所以為異强梁者不得其死注强梁者謂不信玄妙背叛道德不從經教尚勢任力也不得其死者為天命所絶兵刃所伐王法所殺不得以壽終而死也吾將以為教父注父始也老君以强梁之人以為教戒之始也御曰吾見强梁者亡柔弱者全故以此柔弱之教為衆教之父疏强梁猶剛躁也父始也言强梁之人必當夭折不得依於天命壽終而死也老君雖復演法多端教門匪一而每說柔弱為善剛强為惡以此切當將為學道之先父亦本也顧曰言此强梁之士既不得其死我即為其立教說斯無為道德作其戰學之本父也天下之至柔馳騁天下之至堅注至柔者水也至堅者金石也水能貫堅入剛無所不通也疏至柔水也至堅金也馳騁貫穿之義也言水至柔能攻金石之堅喻無為至柔能破有為之纍故下文云天下柔弱莫過於水攻堅强者莫之能先也無有入無間注無有謂道也道無形質故能出入無間通神明濟群生也御曰無有者不染塵境也心中無所有也無間者道性自然清淨妙體混成一無間隙夫不為可欲所亂令心境俱靜一無所有則心與道合契出入無間疏間隙也言顛倒之流見空為有達觀之士即有而空故言無有也入契會也有為粗疏故有隙無為微密故無間也而即有即無故能入無間之理也車曰言水之與風本無質相金石骨髓亦無間隙風之與水已能縱入行之所攻至妙之道本自無形煩惱結陋又無間竅道之妙惠早已入訖原其結縛之由要其頑執之本投其悟解之藥開其正性之機此即無有入無間也吾是以知無為有益注吾見道無為而萬物自化成是以知無為之有益於人也不言之教注道法不言師之以身無為之益注法道無為治身有益精神治國則有益於人不煩勞也孫曰柔能破剛無能遣有以是知無為之教大益於人天下希及之注天下者人主也希能有及道之無為治身治國也疏所謂不言非關杜口在理即有即無在教亦即言即默即言即默故名不言之教即有即無故名無為之益益既不益而益教豈教而教哉斯乃窮理盡性蓋世之談世間名教罕能及者故言天下希及之顧曰則天玄默而風俗自移故曰不言之教法道無為人物自化故言無為之益名與身孰親注名遂則身退也御曰名者實之賔世人徇名以亡身故設問誰親欲令去功與名而全其真疏身內也實也名外也賔也孰誰也世人皆求外喪內貪名喪實何者夫令譽芳名本為身也身既為名身死名竟何施老君愍兹顛倒故覆云名之與身誰是汝親乎而汝貪名忘身耶以斯格量親疏可見故莊子云伯夷死名於首陽之下也身與貨孰多注財多則害身御曰徇多將以求財財得而亡身故設問孰多欲令擲玉毁珠以全其身疏夫資貨者本為我身迷惑之徒喪身徇貨故老君責言汝去貨存身利多為聚貨喪身利多耶故莊子云盜跖死利於東陵之上得與亡孰病注好得利則病於行也疏夫多貪得財必喪己少欲亡貨則存身然則得是喪己之徵亡是存身之驗喪己可以為病存身可以為樂世人翻以得為適以亡為病者不亦謬乎故教主言得與亡定誰是病甚愛必大費注甚愛色費精神甚愛財遇禍患所愛甚少所亡者多故言大費疏費損也為是義故甚愛名譽之人必勞形怵心費神損智此一句解名也多藏必厚亡注生多藏於府庫死多藏於丘墓生有攻劫之憂死有掘塜剖棺之患疏夫多藏賄貨於府庫者必有劫盜之患非但喪失財物亦乃害及己身其為敗亡禍必深厚故書云匹夫無罪懷璧其罪莊云大儒臚傳曰青青之麥生於陵陂生不布施死何含珠為於是以金鎚控其頤徐别其頰無傷口中珠是也此一句解貨知足不辱注知足之人絶利去欲不辱其身疏體知財賄虛假守分不貪清廉知足故無耻辱此一句解貨知止不殆注知可止則止財利不纍於身心聲色不亂於耳目終身不危殆也疏既悟名譽非真所以止而不著全身遠害故無危殆上經云名亦既有夫亦將知止此一句結名可以長久注人能知止足則福祿常在於己治身則神不勞治國則民不擾故可長久疏知止於名知足於貨忘名忘利則可長可久此一句總結名道德真經注疏卷之四

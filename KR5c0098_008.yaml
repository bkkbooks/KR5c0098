front:
  text: 道德真經注疏卷之八信八
  hash: sha256:56db602e7193cbfc1503f5800750d388c5847eb51016f3a4788bc8a000a84d1b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0098_HFL_008-001a, image: hfl/0406/0406-106.png}
body:
  text: 吳郡徵士顧歡迷民不畏威則大威至注威害也人不畏小害則大害至大害謂死亡也畏之者當保精養神順地承天也疏威謂威刑即諸經戒科目是也大威即三塗惡趣北都羅酆之刑法也言凡夫不憚經戒妄造諸惡者則風刀大刑必將至也無狹其所居注謂心居神常當寬柔不當急狹也節解曰謂無狹健在俗間深山廣澤可養性也御曰無狹者除情去欲使虛室生白也無厭其所生注人所以生者以有精神精神托於空虛喜於清淨若飲食不節忽道念色邪辟滿腹為伐命散神也節解曰謂厭生死者故行一愛氣惜精為生之寶御曰身所生者神也無厭者少私寡欲使不勞倦也盧曰所生謂神也心靜而神安心躁而神去疏厭舍也狹局也居安處也所生心也言修行道人必須處心無系不得域情狹劣厭離所生何者夫身雖虛幻而是受道之器不用耽愛亦不可厭憎故耽愛則滯於有為厭憎則溺於空見不耽不染處中而忘中是真學道者也夫唯不厭是以不厭注夫唯獨不厭精神之人洗心垢濁淡泊無欲即精神居之不厭也疏唯彼所修之境非空非有故能修之智亦不愛不憎境智相符是以不厭也是以聖人自知注自知己之得失不自見注不自顯見德美於外藏之於內疏智符道境了達真源故自知也四大假合坐忘墮體故不自見自愛注自愛其身以保精氣不自貴注不自高貴榮名於世疏保養真性不輕染故自愛也謙卑靜退先物後己不自貴也故去彼取此注去彼自見自貴取此自知自愛疏去彼自見自貴取此自知自愛欲示物鑒戒故寄去取而為言也勇於敢則殺注勇敢有為則殺身矣節解曰謂貪為交接陰陽欲得快心生往死還此曰勇也輕道慢神則致身夭此曰敢也二者皆自殺也勇於不敢則活注勇於不敢有為則活其身也疏勇猛進也敢果决也殺滅死也活長生也言進心果决貪於世事則死滅若進心虛淡不敢貪染即長生也此兩者注謂敢與不敢也或利或害注活身為利殺身為害疏或不定也兩謂敢與不敢也言進心不敢則長生故利進身貪染則歸於死滅故害也天之所惡注惡有為也孰知其故注誰能知天意天故不敢犯也疏天然之理福善禍淫推窮報應莫知其宰是以聖人猶難之注言聖人之明德猶難於勇敢况無聖人之德而敢行之乎節解曰謂天常惡其勇敢愛其怯弱含生愛氣誰知天意也天之道不爭而善勝注天不與人爭貴賤而人自畏之節解曰天道貴和也疏自然之道但不與物爭而謙退卑己者必獲勝善報也不言而善應注天不言而萬物自動以應時也御曰天何言哉福善禍淫曾無差忒故云善應疏禍福之報其猶影響不待言辭而善惡必應不召而自來注天不呼召萬物萬物皆負陰而向陽也御曰天道不召萬物使從已然物不能違自來順天命爾疏善惡報應隨其行業不待呼召而必自來繟然而善謀注繟然寬大也天道雖寬博善謀慮人事修善行惡各蒙其報疏謀計數也言幽途之理無勞言說而善能計算功過毫分無失也天網恢恢疏而不失注天所羅網恢恢甚大雖則疏遠若司察人善惡無有所失疏恢恢寬大也網憲法也言天尊自然之網甚自寬大疏逺而業無大小功過酬報無差失也孫曰所謂不言而善應者天道不言而善自應也明夫善應者不在多言也盧曰寂寞無聲故曰不言有感則報故曰善應民常不畏死注治國者刑罰深酷民不聊生故不畏死也治身者嗜欲傷神貪財殺身而民不知畏也奈何以死懼之注人君不寬其刑罰教人去其情欲奈何設刑法以死懼之乎疏此斥凡情迷執深重貪逐前境不憚死生雖復經戒嚴明曾無恐懼故發奈何之嘆深哀痛之節解曰謂人不求生快意於情欲聞善不修知惡不改何識益乎若使民常畏死注當除己之所殘尅而教人去其利欲之心也而為奇者吾得執而殺之孰敢矣注以道教化而民不從反為奇巧詐僞乃應王法執而殺之孰敢有犯者老子傷時主不先道德化之而先刑罰也御曰若使世人皆從清净之化不敢溺情縱欲常畏於死而獨為奇詐者假令吾勢得執殺此奇詐之人孰敢即殺故下文云疏貪欲之心日生奇詐堅執顛倒遂以為常者冥司捕獲執而殺之風刀考楚經文明證若有性識之夫誰復造罪耶常有司殺者殺注司殺者天居高臨下司察人之過天網恢恢疏而不失者是也御曰如此奇詐之人天網不失是常有天之司殺者殺之節解曰謂口也在口左為司陰口右為司殺人有陰過則司陰白之於上天考人魂魄人有惡言則司殺白之於司命司命記之罪滿則殺之也疏此刑網自有宰牧即三官九署百二十曹北都羅酆泉曲之府八難五苦各有司存夫代司殺者是謂代大匠斫注天道至明司察有常猶春生夏長秋成冬藏斗柄運移以節度行之人君欲代殺之是猶拙夫代大匠斫木乃勞而無功也節解曰謂天道賞善罰惡治人之身若大匠作器善者則成惡者則敗也夫代大匠斫希有不傷其手乎注人君行刑罰猶拙夫代大匠斫木也方圓不得其理還自傷其手代天殺者失其紀綱不得其紀綱則反受其殃也御曰人君任刑代彼司殺豈唯殘害百姓抑亦自喪天和疏衆生造業各招其報刑罰苦楚自有冥司無識之人師心專輒强代冥司而行誅戮者何異庸拙之士運斤夫拙士運斤工非其任豈唯所作不成抑亦反傷其手强代司殺其義亦然非徒濫職翻獲其釁也節解曰謂人治身各有優劣若工匠斫器而有巧拙巧者則器成形拙者則少不自害也民之饑以其上食稅之多注民之所以饑寒者以其君上食稅下大多也疏饑謂內無道德也上心也心為五藏百行之主也故稱為上稅聚斂也食滋味也言行人所以不懷道德者為心緣前境多貪滋味故也節解曰饑謂氣不足氣所以不足者坐口嗜美味也食多謂實畜積為僻故防御百端也是以饑注是以民皆化上為貪叛道違德故饑也疏結前義也民之難治以其上有為注民之不可治者以其君上多欲奸有為也疏所以百行馳騖紛然難理者只為心貪有為故也心若無為則諸行易治也是知萬境唯在一心是以難治注是以其民化上有為情僞難治也節解曰百姓謂百脉也所以盈縮不和平由口不含一唇干液竭故脉失精泄也人之輕死以其求生之厚注人民所以輕犯死者以其求活之事太厚貪利以自危也疏行人所以不終天年而輕入死地者以其迷順顛倒未能悟達不知物我俱幻即生即死生既多貪六塵厚資四大故也節解曰謂人所以不顧其死者由養形太厚恣其口腹失其生道故死也是以輕死注以其求生大厚故輕入死地也夫唯無以生為者是賢於貴生注夫唯獨無以生為務者爵祿不干於意財利不入於心天子不得臣諸侯不得友則賢於貴生也疏賢善也玄悟之士非色滅空嗒焉坐忘而生無生相是以羶臊榮利厭穢風塵故獨不以生為者善能攝衛貴生之人也節解曰謂夫獨能憂生於未生憂形於未形但念無為舍自然者此乃為賢貴道安其生也人之生也柔弱注人生含和氣抱精神故柔弱也其死也堅强注人死和氣竭精神亡故堅强也萬物草木之生也柔脆注和氣存也其死也枯槁注和氣去也疏言人生存有命則諸節柔弱及其死也則骨肉堅强草木之類生時軟脆及其死也條柯枯槁所以生而柔軟者和氣存也死而堅强者和氣離也舉此有識為辨其勝劣者也夫堅强者死之徒柔弱者生之徒注以其上二事觀之則知堅强者死柔弱者生也疏徒類也是知行剛强者乖於和理故與死為徒行柔弱者順於和氣故與生為徒此合喻也是以兵强則不勝注雖强大之兵輕戰樂殺毒流怨結衆弱為一强故不勝也節解曰兵謂口也口强為人所窮陰强為女所侵也御曰生之柔弱和氣全也死之堅强和氣散也欲明守柔弱者全生保年為强梁者亡身失生也木强則共注木强大則枝葉共生其上疏兵謂三業六根也言人縱恣六情强暴前境而貪取無厭者必遭重殃大禍故不勝也譬樹木粗强故枝條共壓其上亦猶梁棟宏壯故椽瓦壓其上也强大處下柔弱處上注興物造功大木處下小物處上天道抑强扶弱自然之效也節解曰謂髮以柔弱為人所戴體骨堅强為人所勞疏堅强之木居下柔弱之條處上故堅强之人居九幽之下柔弱之士處三清之上天之道其猶張弓乎注天道杳邈舉物類以為喻也御曰天道玄逺非喻不明故舉張弓以彰其用高者抑之下者舉之有餘者損之不足者與之注言張弓和調之義如是乃可用耳天抑高舉下損强益弱天之道也疏舉下使高抑高令下高下調適方可運箭傲慢有餘者必招損敗和不足者與其福善天道如是故似張弓天之道損有餘補不足注天道損有餘而益謙言天道常以中和為上疏福善禍淫自然之理仍前生後重出此文人之道則不然注人道與天道反損不足奉有餘注世俗之人損貧以奉富奪弱以益强御曰天道平施裒多益寡人則違天翻損不足者也疏人間世道奸行浮僞趨勢競利違天背理割損貧賤之不足供奉富貴之有餘孰能有餘以奉天下唯有道者注言誰能居有餘之位自省爵祿以奉天下不足者乎唯有道之君能行之也疏孰誰也言誰能有餘財德以施天下蒼生乎唯當體道之人獨能濟物故下文云聖人不積而言奉者示謙也是以聖人為而不恃注聖人為德施惠不恃望其報功成不處注功成事就不處其位御曰推功於物不處其成其不欲示賢注不欲使人知己之賢匿功不居其榮名畏天損有餘也御曰聖人所以推功不處者蓋不欲令物見其賢也疏體道聖人常善救物雖復財德兩施而不恃其勞有大至功而功成不處者意在撝謙退己推功於物韜光晦迹不欲示己之賢能天下柔弱莫過於水注言水柔弱圓中則圓方中則方壅之則止决之則行張曰以為天下萬事凡事不同以柔弱言之莫過於水以喻道行謙柔和綽隨物通生浸潤如水也而攻堅强者莫之能勝注水能壞山推陵磨鐵消銅莫能勝水而成功也疏物性柔弱莫過於水天下堅强莫先金石然水雖柔弱利用無窮攻擊堅强莫在先者無為破有其義亦然節解曰水者內即口中津液也漱而咽之則能攻邪破惡徹於骨髓若麴糵之消米方藥無復能先也其無以易之注夫攻堅强者無以易於水也御曰以堅攻强二堅俱損以柔制强則强損柔全故用攻堅强無以易於水也疏言水能攻堅百王不易之事無為破有萬代不刊之術故柔勝剛弱勝强注水能滅火陰能銷陽舌柔齒剛齒先舌亡天下莫能知注知柔弱者久長剛强者折傷莫能行注耻卑謙奸强梁節解曰謂人含精飲氣統御血脉百姓日用而不知疏水能攻於金石故知柔弱勝於剛强此乃愚智同知而舉世無人能依而行者也故聖人言注謂下事也受國之垢是謂社稷主注人君能受國之垢濁者若江海不逆細流即能長保社稷為一國之君主也御曰引萬方之罪是受國之垢濁稱孤寡不穀是受國之不祥其德如此則社稷有奉故天下之人歸往也疏國邦域也垢辱也言體道之士處於人世謙退柔弱達於違從身受屈辱不與物爭故堪為社稷之主以牧蒼生也節解曰謂人形以左魂為社右魄為稷御一氣以為君主也受國不祥是謂天下王注人君能引過自與代民受不祥之殃則可以王天下也節解曰國謂形也言一出入脾中化滓變液去故受新以養五神故王於藏府者也疏不祥猶不善也言聖鑒虛通達於善惡若有不祥之事輒自責躬引過歸己此可為天下君王也昔成湯自翦千里來雲即其事也前言社稷可寄諸侯後舉天下宜屬天子正言若反注此乃正直之言世人不知以為反言也節解曰謂俗人所欲者以鮮潔為尊香美為上而道以受垢為主處下為王言一與人反也疏當理正言似如反俗何者俗皆奸美好榮而今乃受垢不祥故若反也而言若者欲明不反而反雖反不反恆順於俗不反而反順俗而真欲示反不定反故加若也上文云玄德深遠與物反然後乃至大順即其義也和大怨注殺人者死傷人者刑以相和報也御曰與身為怨懟之大者情欲也和調和也此言人君欲以言教調和百姓使無情欲故曰和大怨也必有餘怨注任刑者失人之情必有餘怨及於良民也御曰立教化人不能無迹斯迹之弊還與為怨故曰必有餘怨疏怨懟也即是有無美惡等一切待對之法也言行人雖舍有無得非有無和二邊為中一而猶是執玄未體於玄理也此雖無待未能無不待此是待獨未能獨獨故有餘對安可以為善注言一人呼嗟則失天心安可以和怨為善御曰既有餘怨則不可為善疏安何也言雖遣二邊未忘中一故何可盡善也節解曰謂口也言唱必有和人能行道道來應之唱人以善善人和之則無有餘怨也今時之人奸行邪想邪想從之呼召邪鬼鬼來應之唱人以惡惡人和之安能得為善也是以聖人執左契注古者聖人執左契合符信也無文書法律刻契合符以為信也而不責於人注但刻契為信不責人以他事也御曰左契者心也心為陽藏與前境契合故謂之左契聖人知立教則必有迹有迹則是餘怨故執持此心使令清淨下化於人則無情欲不煩誅責自契無為疏契信也合也左陽也言體道聖人境智冥符能使俱會出兹四句離彼百非故得久視長生義言執左契此則不執而執也猶如帝王握於左契所以徵攝萬機聖人妙契環中故能匡御億兆而言不責者雖復匡御衆生而忘其德芻狗百姓故不責其恩節解曰左契陽德也言聖人不和大怨但自修德不行責過於人故有德司契注有德之君司察契信而已無德司徹注無德之君背其契信司民所失疏司主也徹迹也妙契不執名言無德之君猶滯筌蹄未能洞遣迹既不泯故言司徹也節解曰謂人行道德司命賜算人行其惡同殺徹其籍此之謂也天道無親常與善人注天道無有親疏唯與善人則與司契同也疏天真之理何有親疏上善之人自然符會即向執左契而不責於人也小國寡民注聖人雖治大國猶以為小示以儉約不為奢泰人民雖衆猶若寡乏不敢勞役也使有什伯注使民各有部曲什百貧富貴賤不相侵犯也民之器而不用注器謂農人之器也而不用者不徵召奪民良時也御曰什伍也伯長也此章明人含淳和無所求及適有人材器堪為什伍伯長者亦無所用也疏國域也心住空故言小國即小乘寡欲之行器即什惡兵器也根雖有六用乃不窮言什伯者舉其大數而不用者言靜息諸根不染塵境也節解曰小國謂形中什伯謂五藏心與腎為什肝與肺為伯閉口行氣則什伯氣盛而無不用使民重死注人君能為民興利除害各得其所則民重死而貴生而不遠徙注政令不煩則民各安其業故不逺遷徙離其常處也御曰少思寡欲不輕用其生敦本無求故不逺遷徙也疏諸行重靜知足守分故得終其天年而不遠遂前境也雖有舟輿無所乘之注清淨無為不作繁華不好出入游娛也疏舟輿謂三乘教法也舟在於水能濟渡喻教能舟航萬物度於生死海也故西升經云久曠生死海隔絶貪愛流輿處於陸能輪轉喻教能轉凡成聖得理忘言故能遣教而不用也雖有甲兵無所陳之注無怨惡於天下也疏雖有身心兵甲隳體坐忘物境既空何所陳說此一句覆釋前什伯之器而不用也使民復結繩而用之注棄文反質信不欺也御曰舟輿所以利遷徙甲兵所以徇攻戰兩者無欲故無所乘陳反朴還淳歸於三皇結繩之用也節解曰謂人有道氣自流行為形中之用如結繩之信也疏曰既虛心證理舍教忘筌故寄結繩示其反本此一句復結前雖有舟輿無所乘之也甘其食注甘其蔬餐不漁食百姓疏味至道也美其服注美其惡衣不貴五色也疏德瑩身也節解曰謂甘食其氣美服其道也安其居注安其茅茨之居不好文飾之屋疏所在皆安動而寂也樂其俗注樂其質朴之俗不轉移也疏和光人世寂而動也節解曰謂安形樂神抱腹而歌吟也鄰國相望雞狗之聲相聞注相去近也疏雞以司晨狗以警夜譬一切言教警長昏之夜思智慧之晨此之言教近證一心故言相聞也民至老不相往來注其無情欲也節解曰鄰國者兩耳也兩耳相望保其安也使神氣各有所守不來往相干故至老常能聰明也疏會理體真即俗即道不從生死而來亦無道境可往二域既一故不相往來二際無際也信言不美注信言者實言也不美者朴且質也御曰信言聖教也信實之言不韵於俗故不美也美言不信注美言者滋美之華辭不信者飾僞多空虛御曰美言者世教也甘美之言動合於俗故不信也疏信實也美浮艷也言上德之人冥真契道所說言教實而不華浮艷之言俗中小說既乖至理所以不信故莊云犬不以善吠為良人不以善言為賢也節解曰謂信道言者則不美於俗事美俗事者則不信於道言也知者不博注知者謂知道之士不博者守一元也博者不知注博者多見聞也不知者失真要也御曰知者了悟也博者多聞也疏知道之人忘言絶學所以不博博學之士耽滯名教所以不知故西升經云世人徒知有天地萬物不知己之所由生也是大不知又云子能知一萬事畢莊子云文滅質博溺心善者不辨注善者以道修身也不辨者不文彩也辨者不善注辨者謂巧言不善者舌致患也土有玉掘其山水有珠濁其泉辨口多言亡其身疏辨别也善體至道之人指罵天地故無可分别也且儒墨是非堅執分别者良由未證善道故也聖人不積注聖人積德不積財有德以教愚有財以施貧御曰積者執滯言教有所積聚也聖人了言忘言悟教遣教一無執滯故云不積也疏積聚也言聖人有財惠物有德教人故不積也既以為人己愈有既以與人己愈多注既以財賄布施與人而財益多如日月之光無有盡時也疏既盡也為施化也言己所有道德盡持教人心無鄙吝德彌高遠故言愈有此德施也己所有財寶盡持施散而果報彌多故云愈多此財施也天之道利而不害注天生萬物愛育之令長大無所傷害其生也疏天然之道生成萬物利益弘多有何損害聖人之道為而不爭注聖人法天無所施為化成事就不與天下爭功名故能全其聖功也疏聖人上德法道虛通施為至教化被群品謙以自牧成功不居推功於物故云不爭張曰所言有舟輿無所乘之者且無為之世山無蹊𨆏澤無舟梁本絶往來何所乘用又曰雖有甲兵無所陳之顧曰兵以討逆武以靜亂上既行道下乃好德自然從化何事陳兵道德真經注疏卷之八

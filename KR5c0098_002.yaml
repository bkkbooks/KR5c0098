body:
  text: 吳郡徵士顧歡述五色令人目盲注貪淫好色則傷精失明不能視無色之色節解曰非謂人之目盲欲自有所見但見玄黃之色神明出入乘朱玉之輦五色光耀子則不見是故目盲也疏五色者謂青黃赤白黑也言人不能內照真源而外逐塵境雖見異空之色乃曰非盲不睹即色之空與盲何别五音令人耳聾注好聽五音則和氣去心不能聽無聲之聲也節解曰非謂人之耳聾欲自有所聞但聞鐘鼓之音不聞神明之聲故曰耳襲也疏五音者宫商角徵羽也心耽絲竹耳滯宫商不能反聽希聲故曰聾也莊子云非唯形體有聾盲夫智亦有之也王曰若滯者淫聲即傷神敗正既有惡聲啼吟即是聾也顧什等曰但聞嘈瓚在耳乃曰不聾不知聲相即空與聾何異五味令人口爽注爽亡也嗜於五味則口妄言失於道也疏五味甘苦辛酸鹹也爽差失也耽貪醪醴咀嚼膻腥不能味道談玄故言口爽也馳騁田獵令人心發狂注人精神姦安靜若馳聘呼吸精神散亡故發狂也節解曰謂人死歸土家室相送婚姻馳走恍惚悲泣藏於塜壙之中送於野田之上親者狂疏者哀故曰若狂御曰馳騁世務耽著有為如彼田獵之夫唯求殺獲日以心鬬逐境奔馳靜而思之是發狂病疏馳騁猶走驟也言田獵之夫貪逐禽獸快心放蕩有類狂人倒置之徒欲心逐境速如騁馳狂如田獵也故莊子云失性有五一曰五色亂目使目不明等是也難得之貨令人行妨注妨傷也難得之貨謂趙璧隋珠珍貴金銀珠玉等物心貪意欲不知厭足則行傷身辱也疏佳麗之物貪著愛玩為生死之因於修道行中大為妨礙是以聖人為腹注守五性去六情節志氣養神明不為目注目不妄視妄視則泄精於外也疏是以仍上文也聖人即舉聖戒凡腹內也目外也懷道抱德充滿於內故為腹也內視無色反聽無聲諸根空淨不染塵境故不為目也故去彼取此注去彼目之妄視取此腹之養神疏去彼耳目之盲聾取此為腹之實智寵辱若驚注身寵亦驚身辱亦驚御曰操之則栗舍之則悲未忘寵辱故皆驚也疏寵是榮愛之名辱是戮耻之稱若如也驚恐也言人得寵則逸豫喜歡遭辱則怵惕憂恚故得寵心驚喜遭辱心驚怖喜怖雖異為驚即同故言若驚然喜怖之情皆非真性是以達者譬窮通於寒暑比榮辱於儻來死生不撓於神有何貴賤之能驚也貴大患若身注貴畏也若至也畏大患至身故驚疏貴謂爵位也亦是自貴忘身也謂煩惱老病等也言凡夫但知矜貴此身而惡大患不知大患即是我身多求資養終歸滅壞故貴身即是貴患惡患即是惡身為貴與大患俱以身為本也蔡曰有身者執著我身不能忘遣為身愁苦憂其勤勞念其飢寒即大患故知執有生纍存身患起貴我身者與貴大患不殊故西升經云身為惱本痛癢寒溫大患之本起乎存身何謂寵辱注問何為寵何為辱寵者尊榮辱者耻及身還自間者以曉示於人也寵為下注寵辱為下賤得之若驚注得寵榮驚者處高位如臨危也貴不敢驕富不敢奢也失之若驚注失者失寵處辱驚者恐禍重來節解曰謂得道則萬神皆來鳴於腹中與子相見言語知身五神元氣流馳故曰得之若驚失之若驚者謂失氣亡精神不行而失一則頭白齒落而死衆人所哭上屋呼魂驚於天神故曰失之若驚也疏世情顛倒以寵為上慧心觀照足為鄙下何者為得寵心驚喜失寵心驚怖此兩驚本由一寵故足為下是謂寵辱若驚注解上得之若驚失之若驚御曰寵辱循環寵為辱本凡情惑滯驚辱而不驚寵何謂貴大患若身注復還自問何故畏大患至身吾所以有大患為吾有身注吾所以有大患者生吾有身有身則憂其勤勞念其飢寒觸情縱欲則遇禍患也疏此答前問也執著我身不能忘遣為身愁毒即為大患故知貴我身者與貴患不殊也故西升經云身為惱本痛癢寒溫吾拘於身知為大患即其事也及吾無身吾有何患注使吾無有身體得道自然輕舉升雲出入無間與道通神當有何患御曰能知天地委和皆非我有離形去智了身非身同於大通夫有何患節解曰忘身而養神謂之無身疏所言無者坐忘喪我隳體離形即身無身非是滅壞而稱無也故貴以身為天下者若可寄於天下矣注言人君自貴其身而賤人欲為天下主者則可寄立不可以長久疏不知身是大患矜而貴之自貴其身恆欲凌物如此之人適可暫寓於世間不得久視於天下愛以身為天下者乃可托於天下矣注言人君能愛其身非為己也乃欲為萬民之父母以此德為天下主者乃可以托其身於萬民之上長無咎也疏寄是暫時寄寓托謂永相付托言能保愛己身不輕馳騖謙以自牧雌而順物者則可以托付化於天下故德經云自愛不自貴也視之不見名曰夷注無色曰夷言一無彩色不可得視而見之也疏夷平也言至道微妙非五色不可以眼識求故視之不見也若其有色色則參差只為無色夷然平等也聽之不聞名曰希注無聲曰希言一無音聲不可得聽而聞之也疏希簡少也體非宫商不可以耳根聽故曰希也摶之不得名曰微注無形曰微言一無形體不可摶持而得之也御曰摶執持也微妙也道無形象故執持不得以其無形之中而能形焉故謂之曰微疏摶觸也微妙也言體非形質不可摶觸而得之故曰微也臧曰夫言希夷微者謂精神氣也精者靈智之名神者不測之用氣者形相之目總此三法為一聖人若不見是精不聞是神不得是氣既不見不聞不得即應云無色無聲無形何為乃言希夷微耶明至道雖言無色不遂絶無若絶無者豈同太虛即成斷見今明不色而色不聲而聲不形而形故云夷希微也所謂三一者也此三者不可致詰注三者謂夷希微也不可致詰者謂無色無聲無形口不能言書不能傳當受之以靜求之以神不可強詰問而得之故混而為一注混合也故合於三名而為一也疏真而應即散一以為三應而真即混三以歸一一三三一不異故不可詰也又解此真應兩身作三乘義釋具在開題卷中其上不皎注言一在天上不皎皎光明也其下不昧注言一在天下不昧昧有所暗冥明道上下無窮極也疏言至道幽微非愚非智升三清之上不益其明墜九幽之下不加其暗所謂不增不減其在兹乎繩繩不可名注繩繩者動行無窮極也不可名者非一色也不可以青黃赤白黑别之非一聲也不可以宫商角徵羽聽之非一形也不可以長短大小度之也節解曰謂道入皮膚骨節之中故曰繩繩不可名也復歸於無物注物質也復當歸之於無質疏繩繩正直也猶繩墨之義言聖人既能自正復能正他故繩繩不可執名求理故不可名也又解繩繩運動之貌言至道運轉天地陶鑄生靈而視聽莫尋故不可名也復歸者還源也無物者妙本也夫應機降迹即可見可聞復本歸根即無名無相故言復歸於無物是謂無狀之狀注言一無形狀而能為萬物作形狀無物之象注言一無形質而能為萬物設形象也疏妙本希夷故稱無狀無物迹能生貸故云之狀之象是謂惚恍注言一惚惚恍恍若存若亡不可狀也御曰無形之形無狀之狀不可名有不可名無無有難名故謂之惚恍疏不定貌也妙本非有應迹非無非有非無而無而有有無不定故言惚恍迎之不見其首注一無端末可預待也除情去欲一自歸己矣疏王曰象者形而非也謂儀貌可道雖無物而應物有象欲言有也不見其形欲言無也物由之以生成顧曰其來未兆倏爾不見故言迎之不見其首疏道非古無始也隨之不見其後注言一無影迹不可得而見也御曰道無始故迎之不見其首道無終故隨之不見其後疏道非今無終也顧曰其去無迹混然無際執古之道以御今之有注聖人執守古道生一以御萬物知今當有一也御曰執古無為之道以御今有為之事則還反淳朴矣疏執持也言聖人持太古無名之道調御今之後生王曰古今雖異其道恆存執之者方能御物能知古始是謂道紀也注人能知上古本始有一是謂知道綱紀也疏古始即無名之道也若知無始無終而終而始不古不今而古而今用期古道以御今世者可謂至道之綱紀也王曰守古無為之道制御今之有為之世鎮此躁動之俗反古淳素之始陶鍊變化是得道綱紀也古之善為士者注謂得道之君也疏古昔也善者智德也為修學也前章明執古御今此即御今引古故援昔善修道之士以軌則聖人微妙玄通注玄天也言其志節玄妙精與天通深不可識注道德深遠不可識知內視若盲反聽若聾莫知所長也御曰士事也言古之善以道為事者於彼微言妙道無不玄鑒通照而德容深邃不可識知也疏微妙是能修之智玄通是所修之境境智相會能使俱深不可以心識知故嘆之也夫唯不可識故強為之容注謂下句也御曰夫唯德量難識故強為容狀以明之疏容者形貌也獨此不可識之聖智甚堪軌物方欲引接群品故於無形之理而強為修學之容豫若冬涉川注舉事輒加重慎豫兮若冬涉川心難之也想爾曰豫猶豫行止之貌常當畏敬也冬涉川者恐懼也畏四鄰不敢為非恐鄰里知之此遵道奉戒之人謙謹如此也疏猶豫怖懼也言修道行人懼於世境如冬涉川冰心地惶怖恐陷溺也此明意業淨猶若畏四鄰注其進退猶猶拘制若人犯法畏四鄰知之也疏又畏塵境如人犯罪慎密恐畏四鄰閭里知聞也此明口業淨王曰四鄰謂生死老病也亦是四魔人不持戒姦犯非法為四魔所録是以小心猶當慎密間靜似畏人知也儼若客注如客對主人儼然無所造作也疏儼矜莊之貌禮記云儼若思言聖人應斂勵身心勿得放縱由如賔客對主人不可輕躁此明身業淨顧曰恭斂之貌也言聖人恭斂無為無事若為客對主人不敢輕躁常和而不唱涣若冰將釋注涣者解散釋者消亡謂除情去欲日以空虛也御曰雖則儼然若客無所造為而不凝滯於物故涣然若春冰之釋散也疏如前修學智慧增明惑染消散如彼冬冰之逢春也松靈曰外雖矜莊若衆內恆和暢放散無復滯著涣然如凝冰消散也敦若朴注敦者質厚朴者形未分內守精神外無文彩也疏敦者淳厚朴者質素前既三業清淨惑纍消除故能德行淳和去華歸實也曠若谷注曠者寬大也谷者空虛不有德名無所不包容也疏塵纍斯盡心靈虛白故道寬曠包容如谷渾兮若濁注渾者守本真濁者不昭然與衆合同不自尊也御曰和光渾迹若濁而清疏渾合也和雜也濁有為也雖復心靈潔素障纍久消而渾沌有為之中與塵濁不異也濁以靜之徐清注靜止也水濁止而靜之徐徐自清也疏徐緩也雖處有欲之中同事利物而在染不染心恆安靜間放而清虛也前則雖清而能渾濁此則處濁不廢清間明動而寂也顧曰濁者昏昧之貌謂其昧智韜明不任聽察如水之濁無所鑒見也王曰藏精匿照外不異物渾同波塵故曰若濁凡上七事皆人君之德傳曰人君含垢天之道也得道之君其斯之謂若就行人論者渾謂和雜也濁謂有為也雖心潔素而渾沌有為之中與塵不異也所言濁以靜之徐清者喻於水水濁止而靜之徐徐自清也心亂息緣漸漸而清正也安以久動之徐生注誰能安靜以久徐徐以長生也疏雖復安靜即靜而動雖復應物而動心恆間放而化群品也此文明寂而動也王曰渾波則濁徐靜則清危躁則死安靜則生志人知濁之可清故同波而後化體危之可安故徐動以教生非體道善化誰能如此故曰孰能生化微妙非速疾可成必須心專行密積勤纍代不日求以得故曰徐生保此道者不欲盈注保此徐生之道不欲奢泰盈溢也疏保持也言持此動寂不殊一中道者不欲住中而盈滿此遣中也夫唯不盈故能弊不新成注夫唯不盈滿之人能守弊不為新成弊者匿光榮也新成者功貴名盛也疏獨此遣中聖人於有為弊濁之內復能慈救蒼生成大功德此重結成也盧曰此猶解前徐清之義和俗而後靜徐以守其清安身而後動徐以全其生致虛極注致至也道人捐情去欲五內清靜至於虛極也疏夫道沖虛德歸清淨心能志虛則得道之極行能守靜則含德之厚盧曰除情慮致虛極也而心恆寂守靜篤也守靜篤注守清淨行篤厚疏虛極道果也篤中也言人欲得虛玄極妙之果者必須靜心守一中之道則可得之也萬物并作注作生也萬物并作生也吾以觀其復注吾言以觀見萬物無不皆歸其本言人當念重其本也疏作動用也言一切衆生并皆云為取舍貪逐前境以老君聖智觀之悉復在妙本雖動而寂也顧曰夫靜觀其反真王曰生生之體性本湛然但受納有形六情外動言行云為妄作招禍至人觀其本性知可化而復故云觀其復夫物藝藝注藝藝者華葉盛也各歸其根注言萬物無不枯落各復反歸其根而更生也疏藝藝衆多貌也言衆生所以不能同於聖人雖動不動用而無心者只為藝藝馳競不息也若能反本歸根即同於聖照此勸之也歸根曰靜注靜謂根也安靜柔弱謙卑處下故不復死也疏但能反本還源馳競之心自息也顧曰草木零落歸根則靜人物變化反真則安是謂復命注言安靜者是為復還性命使不死乃道之常也疏命者真性慧命也既屏息囂塵心神凝寂故復於真性反於慧命復命曰常注復命使不死乃道之所常行也疏反於性命嶷然凝湛不復生死因之曰常何晏曰復命當使不死是道之所常盧曰能知復命常理者則是見道之明者也知常曰明注能知道之所常行者則為明也御曰守靜復命可謂有常知守常者更益明了也疏既知反會真常之理者則智慧照明無幽不燭王曰常道難知故知之曰明不知常妄作凶注不知道之所常行妄作巧詐則失其神明故凶也疏不知性修反德而會於真常之道者則恆起妄心隨境造業動之死地所作皆凶顧曰不知道言知謂之妄作妄作之人失道故凶孫曰不能守靜則天命失常是其凶也知常容注能知道之所常行則能去情欲無所不包容也御曰知守真常之道則必竟虛靜如彼空谷無不含容也疏體知凝常一中之道悟違順之兩空故能容物也容乃公注無不包容則公正無私衆邪莫當也御曰含容應物應物無私既無私邪故為公正疏公平正也既能包容庶物所以公正無私也公乃王注公正無私則可為天下王治身正則形一神萬共湊己身也御曰人能公正無私則為物所歸往也疏王往也只為包容萬物公正無私所以作大法王為蒼生之所歸往也王乃天注王德合神明乃與天通也疏既作法王化主為物所歸復能蔭覆含靈同於旻昊也天乃道注德與天通則與道合同也疏既類上天覆物平等又同大道生化無窮道乃久注與道合同乃能長久疏量等太虛無來無去心冥至道不滅不生既與此理相符故義説為久沒身不殆注能公能王通天合道四者純備道德弘遠無殃無咎與天地俱沒終不危殆也疏沒滅也殆危也匿端滅迹謂之殁身應感赴機謂之不殆又解迹有興廢故言沒身本無生滅故言不殆也太上下知有之注大上謂太古無名之君也下知有之者下知上有君不見臣事之迹質朴淳厚御曰太上者淳古之君也下知者臣下知上有君尊之如天而無施教有為之迹故人無德而稱焉疏太上即是今玄天教主太上大道君也言道君在玉京之上金闕之中凝神遐想為常應之處利根之人機性明敏悟妙本凝寂體絶形名從本降迹故有位號不執相生解故下知有之知有太上名號之所由也其次親之譽之注其德可見恩惠可稱故親愛而譽之御曰淳德下衰君行善教仁見故親之功高故譽之疏中根之人機神稍暗不能忘言證理必須執相修學所以耽著經教親愛筌蹄依文生解共相譽贊顧曰此中古也去道漸遠封言著相其德可見親愛生上則親信於下下則稱譽於上其功可言則康歌載路其次畏之注設形法以治之其次侮之注禁多則令煩不可歸誠故欺侮之御曰德又下衰君多弊政人不堪命則驅以刑罰故畏之懷情相欺明不能察故侮之疏侮欺也下機之人性情愚鈍縱心逐境耽滯日深唯畏世上威刑不懼冥司考責所以欺侮聖言毁謗不信故德經云下士聞道大笑之也信不足注君信不足於下下則有巧詐之民也有不信注君信不足於下下則應之以不信而欺其君也御曰畏之侮之者皆由君信不足故令下有不信之人也疏良由下機障重信根不足故疑毁聖文有不信之罪猶其貴言注説太上之君舉事猶貴重於言恐離道失自然也疏猶其貴重世俗浮偽之言故不信至道真實之教是以迷惑日久罪障彌深也功成事遂注謂天下太平也百姓謂我自然注百姓不知君上之德淳厚反以為己自當然也御曰功成而不執事遂而無為百姓日用而不知謂我自然而成遂矣疏亭毒之功成育養之事遂而至德潛被成功弗居百姓日用而不知皆謂我自然得如此不知荷聖恩也王曰化不由言冥功潛被物各逍遙擊壤自得日用不知欣賴無主莫識所為故皆謂我自然大道廢有仁義注大道之時家有孝子户有忠信仁義不見大道廢不用惡逆并生乃有仁義可傳道也御曰澆淳散朴大道不行曰仁與義小成遂作而澆淳散朴不足雕弊起於有為疏即太古之教廢也言大道之世五德不彰仁義既興淳朴斯廢故莊子云散道德以為仁義聖人之過也又云相詬以濕相濡以沫不如相忘於江湖智慧出有大偽注智慧之君賤德而貴言賤質而貴文下則應之以為大偽姦詐也御曰用智慧將立法也法出而姦生則有大偽矣疏智慧聖智也上以聖智治物法令滋彰下則詐偽百端以避刑網還竊聖智以為偽具智之害物備在莊文王曰大道之時無知無欲物皆懷德外用不顯道功既息權詐兹興飭智驚愚耀才動俗朴散淳離姦情并作故曰大偽六親不和有孝慈注六紀絶則親戚不和乃有孝慈相收養也御曰皆由失道故有偏名疏六親謂父子兄弟夫妻也淳和之世偏愛不彰六紀失序孝慈方著是以周德既衰澆競斯起致彼曾閔之徒顯其高行國家昏亂有忠臣注政令不行上下相怨邪僻爭權乃有忠臣匡救其君此言天下太平不知仁義人盡無欲不知廉各自潔己不知貞各自守信不知忠也大道之世仁義沒孝慈滅猶日中盛明衆星失光也疏萬乘之主以四海為家故言國家但至治之時忠誠不見昏亂之世貞節斯彰是以龍逄名芳於夏桀比干譽美於殷紂也絶聖注絶聖制作反初守元五帝畫象倉頡作書不如三皇結繩無文棄智注棄智慧反無為民利百倍注農事修公無私御曰絶聖人言教之迹則化洽無為棄凡夫智詐之用人歸淳朴人歸淳朴巧偽不作矜徇不行人挹天和物無夭性是有百倍之利疏絶有名之聖棄分别之智人皆反本為利極多言百倍者舉其大數故莊子云魯酒薄而邯鄲圍聖人生而大盜起又田成子以聖智竊國是也絶仁棄義注絶仁之見恩惠棄義之尚華言民復孝慈注德化淳也御曰絶兼愛之仁棄財非之義則人復於大孝慈矣疏絶偏尚之仁棄執迹之義人皆率性無復矜矯孝出天理慈任自然反於淳古故言民復莊子云仁義者先王之蘧廬已陳之芻狗又云削曾史之行天下皆仁也絶巧棄利注絶巧詐偽亂真塞貪路閉權門盜賊無有注上化公正下無私邪御曰人矜偏能之功必有爭利之心故絶巧則人不爭棄利則人自足足則不為盜矣疏絶異端之巧棄貪求之利物各守分故無盜竊莊子云攦工倕之指天下皆巧矣此三者注謂上三事所當棄絶也以為文不足注以為文不足者文不足以教民也疏三者謂前三絶也此文是頓教大乘上士所學其理深遠不足以教下機也故令有所屬注當如下句御曰此三者但令絶棄未示修行故以為此文不足垂教更令有所屬著謂下文也疏屬謂付屬也言下機之人未堪大乘之教故有所屬著方進學心所屬之文即下之四行見素抱朴注見素者當見素守真不尚文飾也抱朴者當抱其質朴以示天下令可法則也少私注正而無私寡欲注當知足也疏見素去華也抱朴歸實也少私公正也寡欲息貪也絶學注絶學不真不合道文無憂注除浮華則無憂患節解曰謂去諸經書還行一也御曰絶有為之學則淳朴疏憂患也絶有相之學會無為之理患纍斯盡故無憂也唯之與阿相去幾何注同為應對而相去幾何疾時賤質而貴文疏唯敬諾也阿慢應對也禮記云先生召無諾幾何者非遠也言世人不達違順妄生喜怒聞唯則喜聞阿則嗔不知唯阿兩聲同出一口相去非遠故言幾何善之與惡相去何若注善者稱譽惡者諫諍相去何如疾時惡忠直用邪佞也疏順意為美逆心為惡違順既空美惡安奇且唯阿出自一口美惡源乎一心忘者知其不殊執者肝膽楚越然有為之學迷執者多是非美惡之中喜怒唯阿之內適為患纍之本絶之所以無憂此兩對略舉執學須絶之狀也人之所畏注人謂道人也所畏者畏不絶學之君也不可不畏注近令色殺賢人疏即行人所畏謂生死及諸塵也注必沒溺也前令絶惡示美惡皆空恐滯斯文遂染塵境故發此句以戒之也荒兮其未央哉注言世俗之人荒亂欲進學為邪文未央止也疏河上公本作荒諸家云莽莽是眇莽嘆其久逺央是盡義嗟其未息言衆生染滯之心其曰固久執著情篤未有休時衆人熙熙注熙熙淫放多情欲也如享太牢注如飢思太牢之具意無足時如春登臺注春陰陽交通萬物感動登臺觀之志意淫淫也疏言耽著者衆故云衆人即衆生生之别稱也熙熙悅樂也享燕享也太牢牛羊豕也言衆生欣愛聲色情染極深如飢人享太牢之饌悅美之甚又如春日登臺眺望林野暢適其心我獨怕兮未兆注我獨怕然安靜未有情欲形兆也疏我老君自稱也怕寂也兆狀也言聖人雖處塵俗而心智寂怕不為前境所牽故都無攀緣之萌狀也若嬰兒之未孩注如小兒未能言答偶時人也御曰言我獨怕然安靜於情欲略無形兆如彼嬰兒未能孩孺也魁無所歸注魁然如窮鄙無所歸就也御曰至人無心運動隨物無所取與若行者之無所歸疏嬰兒赤子也孩笑也魁寬大也歸往也言聖人動不乖寂處染不染如彼嬰兒未能孩笑之時心形俱淨智慧魁敬器量宏博譬彼虛舟而無任止也衆人皆有餘注衆人餘財以為奢餘智以為詐我獨若遺注我獨如遺棄似於不足也疏衆人滯有故耽染有餘聖智體空故遺棄不取也我愚人之心注不與俗人相隨守一不移如愚人之心也純純兮注無所分别也疏純純不雜也聖智虛白純粹精專如彼愚人心無分别也俗人昭昭注明且達也我獨若昏注如暗昧也御曰自韜匿也疏俗之人心靈暗昧昭然分别自炫其能聖智虛通明如日月韜光匿耀故若昏也俗人察察注察察急疾也御曰立法制也我獨悶悶注無所割截也疏察察機逺是分别之心悶悶寬緩是無分别之智但俗心滯有司察是非妄生迫遽聖智體有冥無體知空幻恆自間靜也忽若海注我獨忽忽如江海之流莫知其所窮極疏河上本作海晦者暗也止住也聖智實明而忽忽如暗欲顯光而不耀故發此言雖復同塵而恆自凝寂又不住此寂故無正住止也飄若無所止注我獨飄飄若飛揚無所止志意在神域也御曰我心寂然絶於俗學似無所止著也衆人皆有以注以有為也我獨頑似鄙注我獨無為似鄙若不逮也御曰頑者無分别鄙者陋不足而心實了悟外若不足故云似鄙疏衆人滯於欲境未嘗休息雖復取舍不同同有所以聖人妙體虛假曾無分别既不見是亦不知非譬彼頑愚若兹邪鄙我獨異於人注我獨與人異御曰人有情欲我無染心而貴食母注食用也母道也我獨貴用於道也疏人皆照察而分别我獨忽晦而忘懷分别故愛染於聲色忘懷故貴用於真道所以為異也道德真經注疏卷之二

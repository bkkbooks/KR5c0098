front:
  text: 道德眞經注䟽卷之七信七
  hash: sha256:09cabc56c50064f014adf49acb956dbce132e7d96d39aafd45d86a46635ec36b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0098_HFL_007-001a, image: hfl/0406/0406-068.png}
body:
  text: 吴郡徵士顧歡述古之善爲道者注謂古之善以道治身及治國者非以明民注不以道教民明智奸巧也將欲愚之注將以道德教民使質樸不詐僞也御曰人君善爲道者非以其道明示於人將導之以和使歸復於樸令如愚也䟽爲道猶修道也言古昔善修道之士實智内明無幽不燭外若愚時不耀於人閉智塞聰韜光晦迹也民之難治以其智多注以其智太多而爲巧僞御曰君將明道以臨下人必役智以應上智多則詐興是以難理䟽治理也智分别也言衆生所以難治者爲心多分别不能虚忘故難化也故以智治國國之賊注使智慧之人治國政之事必逺道德忘作威福爲國之賊也不以智治國國之福注不使智慧之人治國之政事則民守正直不爲邪飾上下相親君臣同力故爲國之福也御曰若不用巧智之臣但取純德之士使偃息蕃魏弄丸難解自然智詐日薄淳樸日興人和則年豐故是國之福也䟽若用明智察俗以理物者既乖淳和人同賊害言無爲至虚至靜忘心遣智尸居玄默以斯御世者其唯上德乎以此格量勝劣可見治國既爾身亦宜然知此兩者亦楷式注兩者謂智與不智也常能知智爲賊不智爲福是治身治國之法式御曰役智詐則害於人任純德則福於國人君能知此兩者委任純德之臣亦爲君楷模之法式也䟽兩者前文智與不智也能知智爲賊不智爲德則可爲修身之楷模治國之洪範也節解曰謂去智守愚則病除氣盛此治身之法式也常知楷式是謂玄德注玄天也能知治國治身之法式是謂與天同德也䟽常能知無分别爲治身之楷式者可謂深玄之大德也玄德深遠注玄德之人深不可測遠不可極也與物反注玄德之人與萬物反異萬物欲益於己玄德欲施與人節解曰謂一之深逺乃在太清降下絳宫入子形中物皆枯死子獨長生故與物反也䟽冥眞契道謂之玄德窮源極際謂之深逺深逺之智智乖於俗故與物反然後乃至大順注玄德之人與萬物反異故能至大順順天理也䟽順有兩種一順於理二順於俗順理則契於妙本順俗則同塵降迹問曰前言反物後言順俗則前反後順文豈類乎答曰前言反者此言明不反而反後言順者亦不順而順不順而順順不乖反不反而反反不乖順亦何所嫌也問曰經稱大順順亦有大小乎答曰夫以順對違雖順而小今不順不違而違而順順不異違違不乖順所以出處語默唯道是從和光同塵而恒順於理不問順與不順不順與順一時皆順是故無順無不順而能順能不順乃至非順非不順故名爲大順也江海所以能爲百谷王者以其善下之注江海以卑下故衆流共歸之若人民歸就王者也䟽王往也百谷百川也言江海所以百川之所歸往者以其善居窪下之地也人能退身謙下虚柔容物者亦爲蒼生之所歸往也故能爲百谷王注以其卑下故能爲百谷王也䟽此結成其義故經云海爲百川王是以聖人欲上民注欲在民之上也以其言下之注法江海處謙虚䟽欲令一切衆生居己之上所以言貌柔和恒自謙下欲先民注欲在民之前也以其身後之注先人而後己也䟽欲令衆生在己之先己所以退身居物之後故經云一切未得道我常不有望前則處下而反高此則守退而翻進是以聖人處上而民不重注聖人在民上爲主不以尊貴虐下故民戴仰不以爲重䟽聖人恬淡無爲少私寡欲處民之上爲君而使輕徭薄賦無重勞也又解云聖人恩覃於萬物故戴荷而不亂也處前而民不害注聖人在民前不以光明蔽後民親之若父母無有欲害之者䟽處物之前而爲君主遂使民歌擊壤宇内清夷利物弘多而無損害又解云聖德遐曠百姓樂推懷荷恩澤豈敢傷害是以天下樂推而不厭注聖人恩深愛厚視民如赤子故天下樂共推進以爲主無有厭之也以其不爭注天無厭聖人時是由聖人不與人爭先後也故天下莫能與之爭注言人皆爭於有爲無有與吾爭無爲者䟽所以百姓樂推在前而不厭倦者只爲善能謙和不與物爭故也既爲順平等是非永息誰復與不爭者爭乎故天下莫能與之爭也天下皆謂我道大似不肖注老子言天下皆謂我道大我則佯愚似於不肖也䟽河上本作肖諸家云笑笑者老君體達自然妙果圓極故天下蒼生莫不尊之爲大聖也何意得如此只爲接物謙和不矜夸嗤笑故致然也顧等曰不與物同故云不肖言老君道尊德貴誠可以爲大然則晦迹同塵隱顯不測不似智不似愚故言不肖夫唯大故似不肖注夫獨名德大者則爲身害故佯愚似若不肖無所分别無所割截不賤人而自貴也若肖乆矣注肖善也謂辯惠也若大辯惠之人身自高貴行察察之政所從來乆矣其細也夫注言辯惠者唯如小人非長者矣䟽獨猶聖德高大故不夸笑於物若其夸笑乆是群小也河上云肖者猶善也言衆生不能履於善道者皆爲我大故也獨猶驕慢我大所以不能履行善道者乆當卑小謙退也顧等曰大聖之人故無所似也若形有定質智有常分的有所似則道有封執此乃細碎之人豈虚妙之大聖乎我有三寳寳而持之注老子言我有三寳抱持而保倚之也䟽老君所以聖德高大獨不夸肖於物者爲歸依三寳寳重而持之故能然也一曰慈注愛百姓如赤子䟽慈念蒼生拔苦與樂此道寳也二曰儉注賦斂若取之於己御曰慈則廣救儉則足用䟽少欲知足守分不貪此經寳也三曰不敢爲天下先注執謙退不爲唱始䟽謙撝柔弱先物後己退身度人此師寳也節解曰謂人形中有精氣神等寳而藏之可持以生也夫慈故勇注以慈仁故能勇於忠孝䟽内藴大慈外弘接物所以勇入三界俯救蒼生儉故能廣注天子身能節儉故民日用廣大䟽諸法虚幻舍而不貪儉素清高故其德廣大不敢爲天下先注不敢爲天下首先故能成器長注成器長謂得道人也我能爲道人之長也御曰慈儉之德謙撝益光推光與人人必不厭故能成神器之長也䟽只爲勇救蒼生退身度物故居界外獨處玉京爲衆聖之長降世則位居九五爲神器之尊今舍其慈且勇注今世舍慈仁爲勇武也䟽舍去慈悲且好行剛勇舍其儉且廣注舍其儉約但爲奢泰䟽棄其儉素而廣貪於物舍其後且先注舍其後己但爲人先䟽忘退後之心趨進先之行死矣注所行如此動入死道䟽總結上三捨既乖三寳適淪溺三塗故言死矣夫慈以戰則勝以守則固注夫慈仁者百姓親附并心一意故以戰則勝敵以守衛則堅固䟽以大慈之心臨於戰陣士卒感恩所以勝捷内解即是六根兵馬對於六塵不爲塵没故獲勝也又用慈守衛百姓同心是以牢固内解以慈心自守虚靜則道心堅固不可拔也天將救之以慈衛之注天將救助善人必與慈仁之性使能自營助也御曰以慈戰守豈但人和天道孔明亦將救衛戰勝天救也守固天衛也是皆以慈故云天將救之以慈衛之䟽天尊大道救度行慈之人還用慈悲俯相衛護也故三寳之内以慈爲先四等之中用慈爲首是知慈之爲義大矣哉古之善爲士者不武注言貴道德不尚武力也御曰士事也善以道爲理國之事者尚於德故云不武䟽言古者善修道之士靜退無爲不舍慈而爲武勇也善戰者不怒注善以道戰者禁邪於胸中絶禍於未萌無所誅怒也御曰事不得已必須應敵以慈則善故不憑怒者也節解曰謂閉口和精萬神喜悦也䟽善達前境虚幻故能制敵於未萌妙體違順兩空是以無心喜怒也善勝敵者不爭注善以道勝敵者附近以仁求遠以德不與敵戰而敵自伏御曰師克在和和則不爭節解曰謂以口行一萬鬼自伏故曰不爭䟽不爲塵染名曰勝敵既無喜怒何所爭耶善用人者爲下注善用人自輔佐者常爲人執謙也䟽夫能行謙下者必爲物之所歸故能役用於人也是以不爭之德注謂上文爲之下也是乃不與人爭鬬之道德也䟽不與物爭故能成己之德此結善勝敵不爭也是謂用人之力注身能爲人之下者是謂用人臣之力也張曰悦以使人人忘其勞䟽謙下雌柔不用於物物必歸之而爲己用此結善用人爲下也是爲配天注能行此者德配天也古之極也注是乃古之極要道也御曰善勝是不爭之德爲下是用人之力如此者可以配天稱帝是古之至極要道也䟽配合也天自然極道果也言善修道之士妙體眞空達於違順不與物爭故能合至理之自然契古始之極道此總結也用兵有言注陳用兵之道老子疾時用兵故托己設其義也䟽用兵謂權智攝化衆生亦是聖人用六根涉於塵境有言者有用兵之法言在下文也吾不敢爲主注主先也我不敢先興兵也而爲客注客者和而不唱用兵當承天而後動節解曰上兵謂口也下兵謂陰也口言妄則自傷故言謙讓也輕用陰則喪精故不敢爲唱而爲和也䟽主者我身也客者前塵也言根塵兩空物我俱幻既無我身之能縁亦無前塵之可染也不敢進寸而退尺注侵人境界利人財寳爲進閉門守城池爲退御曰主有動作則生事而貪客無營爲則以慈自守則全勝生事則敗亡進雖少不能無事退雖多不失謙讓故不敢進寸而退尺䟽進取也退舍也少以况無多以况有也既而境智雙遣根塵兩忘體玄中一離彼二偏故無無爲之可取亦無有爲之可舍也是謂行無行注彼遂不止爲天下賊雖行誅之不行執也御曰爲客退尺不與物爭雖行應敵與無行同也䟽既遣蕩有爲又洞忘境觀故無以行爲行也攘無臂注雖欲攘臂大怒若無臂可攘節解曰攘臂所以表怒善戰不怒故若無臂可攘也執無兵注雖欲執持之若無兵刃可持用也何者傷彼之民罹罪於天遭不道之君不忍喪之也御曰執兵所以表殺今以慈爲主故雖執與無兵同也䟽離形去智故無兵可用也仍無敵注雖欲行仍引之心若無敵可仍也䟽物境空幻無敵可因禍莫大於輕敵注夫禍亂之害莫大於欺輕敵家侵取不休輕戰貪財也節解曰謂自恣交接者則有喪禍之災䟽輕凌侮也敵前境也輕染諸塵致三塗之報故成大禍輕敵則幾亡吾寳注幾近寳身也欺輕敵家近喪身也節解曰寳謂精氣也輕敵數戰則亡失精神也䟽幾盡也寳則前章三寳也舍慈而勇謂之侮敵招於巨釁故盡喪三寳也故抗兵相加注兩敵戰也則哀者勝矣注哀者慈仁士卒必遠於輕敵也御曰抗舉也兩國舉兵相加也䟽若當也哀慈也抗舉也言根塵相逼舉眼色等相當也仍以大慈之心虚鑒前境則能使兩忘物我清淨一切諸法皆成勝妙之境也吾言甚易知甚易行注老子言我所言省而易知約而易行䟽吾言即前章是也所言非此則易知也行無行相甚易行也天下莫能知莫能行注人惡柔弱好剛强也䟽莫無也老子言甚易知甚易行而天下衆生昏迷愚鈍無能知至言虚妙依教而行之也言有宗事有君注我所言有宗祖根本事有君臣上下世人不知者非我之無德心與我返也顧曰宗本也君主也言雖殊塗同本虚無事雖異趨同主靜樸蔡曰言以無言爲宗事以無事爲主御曰言者在理得理而忘言故言以無言爲宗事者在功功成而不宰故事以無事爲君䟽言經教也君天子也言教雖廣宗之者重玄世事雖煩統之者君主舉此旨要以表易知也夫唯無知是以不我知注夫唯世人無知是我道德之闇昩不見於外窮微極妙故無知也御曰夫唯世人無了悟之知是以不知我無言無事之教也䟽不我知猶不知我也唯彼衆生無知頑鈍故不能知我之至言也知我者希則我者貴注希少也唯達道者乃能知我故爲貴也䟽凡情浮淺蒙昩者多體知聖教甚自希少也則法則也依我經教則而行之證於聖果所爲貴是以聖人被褐懷玉注被褐者薄外懷玉者厚内匿寳藏德不以示於人也御曰被褐者晦其外懷玉者明其内故知我者希也節解曰謂聖人貴道德而賤其形衣皮帶毛含一抱元不貪官爵内養神明以精爲玉以氣爲金故能變化升入紫宫顧曰褐者粗賤之服玉是精貴之寳凡庸之人心實不知外假明哲羊質虎皮是乃德之病䟽知於聖言則於聖教行解具足故成聖人褐是野人之服玉是珍貴之寳外迹同塵被褐也内心虚靜懷玉也懷玉也迹處俗而恒眞被褐也心虚凝而接物知不知上注知道言不知是乃德之上䟽聖人妙契重玄迹不乖本洞忘虚逺知則無知至本虚凝故稱爲上故莊子云孰知子之不知耶吾惡乎知之也不知知病注不知道而言知是乃德之病節解曰謂不明於道但明於俗不知食氣而知食味故病也䟽自本降迹無知而知涉事救苦故稱爲病夫唯病病是以不病注夫唯能病苦衆人有此强知之病是乃不自病也䟽聖人無知識之疵而凡庸有分别之病爲病衆生之病所以同凡說法演教志存救溺既而不病而病病而不病故云不病也是以聖人不病以其病病是以不病注聖人無此强知之病者以其常苦衆人有此病以悲人也故不自病夫聖人懷通達之智托於不知者欲使天下質樸忠正各守純性小人不知道意而妄行强知之事以自顯著内傷精神減壽消年顧曰凡庸之人妄執强知之病以自分别往而不返良可嘆息其唯聖人眞知妙本洞遣言教獨能以其慈仁哀憫衆生强知之病蓋以其自無病也䟽聖人能虚寂兩忘境智雙遣玄鑒洞照御氣乘雲本迹虚夷有何病累道德眞經注䟽卷之七

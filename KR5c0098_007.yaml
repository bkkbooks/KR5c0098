front:
  text: 道德真經注疏卷之七信七
  hash: sha256:ce073ae507729de7fe118381db8a0cd7448cf30948e26a9646ea8f426b4fef33
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0098_HFL_007-001a, image: hfl/0406/0406-068.png}
body:
  text: 吳郡徵士顧歡述古之善為道者注謂古之善以道治身及治國者非以明民注不以道教民明智姦巧也將欲愚之注將以道德教民使質朴不詐偽也御曰人君善為道者非以其道明示於人將導之以和使歸復於朴令如愚也疏為道猶修道也言古昔善修道之士實智內明無幽不燭外若愚時不耀於人閉智塞聰韜光晦迹也民之難治以其智多注以其智太多而為巧偽御曰君將明道以臨下人必役智以應上智多則詐興是以難理疏治理也智分别也言衆生所以難治者為心多分别不能虛忘故難化也故以智治國國之賊注使智慧之人治國政之事必逺道德忘作威福為國之賊也不以智治國國之福注不使智慧之人治國之政事則民守正直不為邪飾上下相親君臣同力故為國之福也御曰若不用巧智之臣但取純德之士使偃息蕃魏弄丸難解自然智詐日薄淳朴日興人和則年豐故是國之福也疏若用明智察俗以理物者既乖淳和人同賊害言無為至虛至靜忘心遣智尸居玄默以斯御世者其唯上德乎以此格量勝劣可見治國既爾身亦宜然知此兩者亦楷式注兩者謂智與不智也常能知智為賊不智為福是治身治國之法式御曰役智詐則害於人任純德則福於國人君能知此兩者委任純德之臣亦為君楷模之法式也疏兩者前文智與不智也能知智為賊不智為德則可為修身之楷模治國之洪範也節解曰謂去智守愚則病除氣盛此治身之法式也常知楷式是謂玄德注玄天也能知治國治身之法式是謂與天同德也疏常能知無分别為治身之楷式者可謂深玄之大德也玄德深遠注玄德之人深不可測遠不可極也與物反注玄德之人與萬物反異萬物欲益於己玄德欲施與人節解曰謂一之深逺乃在太清降下絳宫入子形中物皆枯死子獨長生故與物反也疏冥真契道謂之玄德窮源極際謂之深逺深逺之智智乖於俗故與物反然後乃至大順注玄德之人與萬物反異故能至大順順天理也疏順有兩種一順於理二順於俗順理則契於妙本順俗則同塵降迹問曰前言反物後言順俗則前反後順文豈類乎答曰前言反者此言明不反而反後言順者亦不順而順不順而順順不乖反不反而反反不乖順亦何所嫌也問曰經稱大順順亦有大小乎答曰夫以順對違雖順而小今不順不違而違而順順不異違違不乖順所以出處語默唯道是從和光同塵而恆順於理不問順與不順不順與順一時皆順是故無順無不順而能順能不順乃至非順非不順故名為大順也江海所以能為百谷王者以其善下之注江海以卑下故衆流共歸之若人民歸就王者也疏王往也百谷百川也言江海所以百川之所歸往者以其善居窪下之地也人能退身謙下虛柔容物者亦為蒼生之所歸往也故能為百谷王注以其卑下故能為百谷王也疏此結成其義故經云海為百川王是以聖人欲上民注欲在民之上也以其言下之注法江海處謙虛疏欲令一切衆生居己之上所以言貌柔和恆自謙下欲先民注欲在民之前也以其身後之注先人而後己也疏欲令衆生在己之先己所以退身居物之後故經云一切未得道我常不有望前則處下而反高此則守退而翻進是以聖人處上而民不重注聖人在民上為主不以尊貴虐下故民戴仰不以為重疏聖人恬淡無為少私寡欲處民之上為君而使輕徭薄賦無重勞也又解云聖人恩覃於萬物故戴荷而不亂也處前而民不害注聖人在民前不以光明蔽後民親之若父母無有欲害之者疏處物之前而為君主遂使民歌擊壤宇內清夷利物弘多而無損害又解云聖德遐曠百姓樂推懷荷恩澤豈敢傷害是以天下樂推而不厭注聖人恩深愛厚視民如赤子故天下樂共推進以為主無有厭之也以其不爭注天無厭聖人時是由聖人不與人爭先後也故天下莫能與之爭注言人皆爭於有為無有與吾爭無為者疏所以百姓樂推在前而不厭倦者只為善能謙和不與物爭故也既為順平等是非永息誰復與不爭者爭乎故天下莫能與之爭也天下皆謂我道大似不肖注老子言天下皆謂我道大我則佯愚似於不肖也疏河上本作肖諸家云笑笑者老君體達自然妙果圓極故天下蒼生莫不尊之為大聖也何意得如此只為接物謙和不矜夸嗤笑故致然也顧等曰不與物同故云不肖言老君道尊德貴誠可以為大然則晦迹同塵隱顯不測不似智不似愚故言不肖夫唯大故似不肖注夫獨名德大者則為身害故佯愚似若不肖無所分别無所割截不賤人而自貴也若肖久矣注肖善也謂辨惠也若大辨惠之人身自高貴行察察之政所從來久矣其細也夫注言辨惠者唯如小人非長者矣疏獨猶聖德高大故不夸笑於物若其夸笑久是群小也河上云肖者猶善也言衆生不能履於善道者皆為我大故也獨猶驕慢我大所以不能履行善道者久當卑小謙退也顧等曰大聖之人故無所似也若形有定質智有常分的有所似則道有封執此乃細碎之人豈虛妙之大聖乎我有三寶寶而持之注老子言我有三寶抱持而保倚之也疏老君所以聖德高大獨不夸肖於物者為歸依三寶寶重而持之故能然也一曰慈注愛百姓如赤子疏慈念蒼生拔苦與樂此道寶也二曰儉注賦斂若取之於己御曰慈則廣救儉則足用疏少欲知足守分不貪此經寶也三曰不敢為天下先注執謙退不為唱始疏謙撝柔弱先物後己退身度人此師寶也節解曰謂人形中有精氣神等寶而藏之可持以生也夫慈故勇注以慈仁故能勇於忠孝疏內藴大慈外弘接物所以勇入三界俯救蒼生儉故能廣注天子身能節儉故民日用廣大疏諸法虛幻舍而不貪儉素清高故其德廣大不敢為天下先注不敢為天下首先故能成器長注成器長謂得道人也我能為道人之長也御曰慈儉之德謙撝益光推光與人人必不厭故能成神器之長也疏只為勇救蒼生退身度物故居界外獨處玉京為衆聖之長降世則位居九五為神器之尊今舍其慈且勇注今世舍慈仁為勇武也疏舍去慈悲且好行剛勇舍其儉且廣注舍其儉約但為奢泰疏棄其儉素而廣貪於物舍其後且先注舍其後己但為人先疏忘退後之心趨進先之行死矣注所行如此動入死道疏總結上三捨既乖三寶適淪溺三塗故言死矣夫慈以戰則勝以守則固注夫慈仁者百姓親附并心一意故以戰則勝敵以守衛則堅固疏以大慈之心臨於戰陳士卒感恩所以勝捷內解即是六根兵馬對於六塵不為塵沒故獲勝也又用慈守衛百姓同心是以牢固內解以慈心自守虛靜則道心堅固不可拔也天將救之以慈衛之注天將救助善人必與慈仁之性使能自營助也御曰以慈戰守豈但人和天道孔明亦將救衛戰勝天救也守固天衛也是皆以慈故云天將救之以慈衛之疏天尊大道救度行慈之人還用慈悲俯相衛護也故三寶之內以慈為先四等之中用慈為首是知慈之為義大矣哉古之善為士者不武注言貴道德不尚武力也御曰士事也善以道為理國之事者尚於德故云不武疏言古者善修道之士靜退無為不舍慈而為武勇也善戰者不怒注善以道戰者禁邪於胸中絶禍於未萌無所誅怒也御曰事不得已必須應敵以慈則善故不憑怒者也節解曰謂閉口和精萬神喜悅也疏善達前境虛幻故能制敵於未萌妙體違順兩空是以無心喜怒也善勝敵者不爭注善以道勝敵者附近以仁求遠以德不與敵戰而敵自伏御曰師克在和和則不爭節解曰謂以口行一萬鬼自伏故曰不爭疏不為塵染名曰勝敵既無喜怒何所爭耶善用人者為下注善用人自輔佐者常為人執謙也疏夫能行謙下者必為物之所歸故能役用於人也是以不爭之德注謂上文為之下也是乃不與人爭鬬之道德也疏不與物爭故能成己之德此結善勝敵不爭也是謂用人之力注身能為人之下者是謂用人臣之力也張曰悅以使人人忘其勞疏謙下雌柔不用於物物必歸之而為己用此結善用人為下也是為配天注能行此者德配天也古之極也注是乃古之極要道也御曰善勝是不爭之德為下是用人之力如此者可以配天稱帝是古之至極要道也疏配合也天自然極道果也言善修道之士妙體真空達於違順不與物爭故能合至理之自然契古始之極道此總結也用兵有言注陳用兵之道老子疾時用兵故托己設其義也疏用兵謂權智攝化衆生亦是聖人用六根涉於塵境有言者有用兵之法言在下文也吾不敢為主注主先也我不敢先興兵也而為客注客者和而不唱用兵當承天而後動節解曰上兵謂口也下兵謂陰也口言妄則自傷故言謙讓也輕用陰則喪精故不敢為唱而為和也疏主者我身也客者前塵也言根塵兩空物我俱幻既無我身之能緣亦無前塵之可染也不敢進寸而退尺注侵人境界利人財寶為進閉門守城池為退御曰主有動作則生事而貪客無營為則以慈自守則全勝生事則敗亡進雖少不能無事退雖多不失謙讓故不敢進寸而退尺疏進取也退舍也少以况無多以况有也既而境智雙遣根塵兩忘體玄中一離彼二偏故無無為之可取亦無有為之可舍也是謂行無行注彼遂不止為天下賊雖行誅之不行執也御曰為客退尺不與物爭雖行應敵與無行同也疏既遣蕩有為又洞忘境觀故無以行為行也攘無臂注雖欲攘臂大怒若無臂可攘節解曰攘臂所以表怒善戰不怒故若無臂可攘也執無兵注雖欲執持之若無兵刃可持用也何者傷彼之民罹罪於天遭不道之君不忍喪之也御曰執兵所以表殺今以慈為主故雖執與無兵同也疏離形去智故無兵可用也仍無敵注雖欲行仍引之心若無敵可仍也疏物境空幻無敵可因禍莫大於輕敵注夫禍亂之害莫大於欺輕敵家侵取不休輕戰貪財也節解曰謂自恣交接者則有喪禍之災疏輕凌侮也敵前境也輕染諸塵致三塗之報故成大禍輕敵則幾亡吾寶注幾近寶身也欺輕敵家近喪身也節解曰寶謂精氣也輕敵數戰則亡失精神也疏幾盡也寶則前章三寶也舍慈而勇謂之侮敵招於巨釁故盡喪三寶也故抗兵相加注兩敵戰也則哀者勝矣注哀者慈仁士卒必遠於輕敵也御曰抗舉也兩國舉兵相加也疏若當也哀慈也抗舉也言根塵相逼舉眼色等相當也仍以大慈之心虛鑒前境則能使兩忘物我清淨一切諸法皆成勝妙之境也吾言甚易知甚易行注老子言我所言省而易知約而易行疏吾言即前章是也所言非此則易知也行無行相甚易行也天下莫能知莫能行注人惡柔弱好剛強也疏莫無也老子言甚易知甚易行而天下衆生昏迷愚鈍無能知至言虛妙依教而行之也言有宗事有君注我所言有宗祖根本事有君臣上下世人不知者非我之無德心與我返也顧曰宗本也君主也言雖殊塗同本虛無事雖異趨同主靜朴蔡曰言以無言為宗事以無事為主御曰言者在理得理而忘言故言以無言為宗事者在功功成而不宰故事以無事為君疏言經教也君天子也言教雖廣宗之者重玄世事雖煩統之者君主舉此旨要以表易知也夫唯無知是以不我知注夫唯世人無知是我道德之暗昧不見於外窮微極妙故無知也御曰夫唯世人無了悟之知是以不知我無言無事之教也疏不我知猶不知我也唯彼衆生無知頑鈍故不能知我之至言也知我者希則我者貴注希少也唯達道者乃能知我故為貴也疏凡情浮淺蒙昧者多體知聖教甚自希少也則法則也依我經教則而行之證於聖果所為貴是以聖人被褐懷玉注被褐者薄外懷玉者厚內匿寶藏德不以示於人也御曰被褐者晦其外懷玉者明其內故知我者希也節解曰謂聖人貴道德而賤其形衣皮帶毛含一抱元不貪官爵內養神明以精為玉以氣為金故能變化升入紫宫顧曰褐者粗賤之服玉是精貴之寶凡庸之人心實不知外假明哲羊質虎皮是乃德之病疏知於聖言則於聖教行解具足故成聖人褐是野人之服玉是珍貴之寶外迹同塵被褐也內心虛靜懷玉也懷玉也迹處俗而恆真被褐也心虛凝而接物知不知上注知道言不知是乃德之上疏聖人妙契重玄迹不乖本洞忘虛逺知則無知至本虛凝故稱為上故莊子云孰知子之不知耶吾惡乎知之也不知知病注不知道而言知是乃德之病節解曰謂不明於道但明於俗不知食氣而知食味故病也疏自本降迹無知而知涉事救苦故稱為病夫唯病病是以不病注夫唯能病苦衆人有此強知之病是乃不自病也疏聖人無知識之疵而凡庸有分别之病為病衆生之病所以同凡説法演教志存救溺既而不病而病病而不病故云不病也是以聖人不病以其病病是以不病注聖人無此強知之病者以其常苦衆人有此病以悲人也故不自病夫聖人懷通達之智托於不知者欲使天下質朴忠正各守純性小人不知道意而妄行強知之事以自顯著內傷精神減壽消年顧曰凡庸之人妄執強知之病以自分别往而不返良可嘆息其唯聖人真知妙本洞遣言教獨能以其慈仁哀憫衆生強知之病蓋以其自無病也疏聖人能虛寂兩忘境智雙遣玄鑒洞照御氣乘雲本迹虛夷有何病纍道德真經注疏卷之七

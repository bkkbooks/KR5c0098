front:
  text: 道德真經注疏卷之五信五
  hash: sha256:fa59d7833fd6d1225464144c7c0f65465bd5bb32080273254862c18e71a7b9e2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0098_HFL_005-001a, image: hfl/0405/0405-062.png}
body:
  text: 吳郡徵士顧歡述大成若缺注謂道德大成之君也若缺者滅名藏譽如毁缺不備也其用不弊注其用心是則無弊盡時也御曰謙則受益故無困弊時也疏言行業大成就之人能忘其成故雖大成如似缺少不足也只為能忘其成故終日貨用而無弊損是以莊子云小成隱道也夫成者不缺缺者不成而今成而似缺者忘缺忘成故不見成而缺故如缺而實成不見缺而異成故大成而似缺也大盈若沖注謂道德大盈滿之君若沖者貴不敢驕富不敢奢其用不窮注其用心如是則無窮盡時也疏沖虛也靜盡也言道德大滿之人能滿其滿故能滿如似空虛無物也只為忘滿沖虛故能利用無竭也夫滿者不虛虛者不滿而今滿而虛者欲明忘滿忘虛故能即虛即滿滿而若虛大直若屈注大直謂修道法度正直如一也若屈者不與俗人爭如可屈折也疏大直質素之人不顯直相故能混迹同塵委曲隨物故若屈也是知直躬小直也大巧若拙注大巧謂多才術也若拙者亦不敢見其能也疏匠成萬物爐錘群生有大功巧而忘功用晦迹同凡故若拙也莊子云雕刻衆形而不為巧是知工倕小巧也大辨若訥注大辨者智無疑如訥者無口辭御曰不飾小說也疏妙能剖析真空詮量玄極者言所不能言也不同世間口才捷利故言蹇訥也莊子云不言之辨亦云大辨不言是知楊墨小辨也躁勝寒注勝極也春夏陽氣躁疾於上萬物盛極則寒寒則零落死亡也言人不當剛躁也靜勝熱注秋冬萬物靜於黃泉之下極則熱熱者生之原也疏躁陽也靜陰也勝極也言四時運轉陰極陽生陽極陰起陰起故一切凋落陽生故庶物咸盛喻靜是長生之本躁是死滅之原以勸行人去躁歸靜也又解從本降迹即躁勝寒息迹歸本即靜勝熱以明動靜適時也顧曰物極則反動極則靜靜極則動從此而觀盛極則衰衰極則盛人間諸法例皆如此既非常保何所貪求是以聖人不取不求無得無失而五種大行自清自靜不為寒熱所侵始為天下之正主云云清靜以為天下正注能清能靜則為天下長持正則無終已時也疏清虛寧靜可以自利利他以正治邪故為天下正此則結釋靜勝躁優劣之義也節解曰謂得入深山行清淨守自然則為真人也天下有道注謂人主有道也却走馬以糞注糞田也兵甲不用却走馬以治田農也治身者却陽精以糞其身也御曰有道之主無為化行既不貪求故無交戰屏却走馬之事人得糞於田園疏言有道之君蒞於天下干戈靜息偃武修文宇內清夷無為而治故能却馳走之馬以糞農田治身者却六根兵馬以道糞心故孟子云人皆以糞糞其田而莫之以學糞其心也天下無道注謂人主無道戎馬生於郊注戰伐不止戎馬生於郊境之上久不還也疏郭外曰郊無道之君臨於海內禽荒色荒四方不靜多貪境土好行征伐遂使軍戎兵馬出生郊外且輕身躁競之夫心不懷道縱於六根兵馬馳騁塵境之中故云生於郊也罪莫大於可欲注好色欲也疏罪者摧也言為苦之所摧逼也前境美麗稱可欲之心故言可欲也然境能逼心是起罪之緣以戒行人不可染境也故上經云不見可欲使心不亂禍莫大於知不足注富貴不能自禁止疏禍即罪之深重者也言心貪前境不知厭足害人損物為罪日深非唯灾及一身亦乃禍延三族咎莫甚於欲得注欲得人物利且貪也御曰殃咎之大莫大於欲欲得禍深故云咎也疏咎考責也欲得之心略無涯際其為咎責莫甚於斯格量深淺禍重咎輕欲備顯物情故具彰二釁故知足之足注守真根也常足矣注無欲也疏守分不貪於行便足恆無闕少故言常足欲明貪競之類遭禍遇殃知足之人恆居安泰先病後藥故繼此文不出户知天下注聖人不出户以知天下者以己身知人身以己家知人家所以見天下也疏户者謂知覺攀緣分别等門户也有道之人虛懷內靜不馳心於世境而天下之事悉知此以真照俗也不窺牖以見天道注天道與人道同天人相通精氣相貫人君清靜天氣自正人君多欲天氣煩濁吉凶利害皆由於己御曰垂拱無為不出教令於户外而天道可知也疏牖根竅也天道自然之理隳體坐忘不窺根竅而真心內朗睹見自然之道此以智照真也户通來去從真照俗窗牖內閉喻返照真源也其出彌遠其知彌少注謂去其家觀人家去其身觀人身所觀益逺所知益少疏顛倒之夫不能照理其心逐境彌遠而無厭其知淺近暗昧而少鑒是以聖人不行而知注聖人不上天不入淵能知天下者以心知之也疏不行者心不緣歷前境而知者能體知諸法實相譬懸鏡高堂物來斯照而無心也故莊子云聖人不由心而照之于天矣不見而名注上好道下好德上好武下好力聖人原小以知大察內以知外疏不見者了知諸法虛幻無可見之物也而名者能正名百物垂迹顯教不見而損情欲文飾日以消損也御曰不窺牖故云不見人和天順故能名其大平不為而成注上無所為則下無事家給人足萬物自化就也疏不為者凝神寂淡絶於有為也而成者能施化群品成就學人此明寂而動也為學日益注學者謂政教禮樂之學也日益者情欲文飾日以益多疏為修營也學俗學也言修俗學之人鋭情分别故纍欲日增也為道日損注道謂自然之道日損者使情欲文飾日以消損也御曰為學日益見聞為道者日損功行益見聞者為修學之漸損功行者為悟道之門是故因益以積功功忘而體道矣疏為道謂修道也言修道之士虛夷恬淡所以智德漸明纍惑日消也損之又損之注損之者損情欲也又損之者所以漸去也以至於無為注當恬淡如嬰兒無所造為也疏為學之人執於有欲為道之士又滯於無為雖復深淺不同而俱有患今欲治此兩執故有損益之文既而前損損有後損損無二偏雙遣以至於一中之無為也無為而無不為也注情欲斷絶德與道合則無所不施無所不為也御曰為學積功行為道忘損之雖損功行尚有欲損之心兼忘此心至於淡然無為方彼鏡象而無不應故無不為疏即寂而動即體而用故無不為也上經云道常無為無不為取天下常以無事注取治也治天下常當以無事不當煩勞也疏取攝化也言攝取宇內蒼生令其歸善者常以無為無事而化之也雖復應物施為而心未常有事此即動而寂也故莊子云孰弊弊焉以物為事乎及其有事不足以取天下注及其奸有事則政教煩民不安故不足以治天下也疏及其心未虛忘以事為事而有事者斯事異無事無事異事動異於寂寂乖於動如此之人不足以攝化天下也聖人無心注聖人不重改更貴因循若似無心也以百姓心為心注百姓心之所便因而從之疏體道洞忘虛懷絶慮與死灰均其寂泊故無心也百姓衆生也然聖人無心有感斯應應隨物感故以百姓心為心心既無心心應亦不應節解曰謂知道行氣以神為心則流布百節百節百神百名共於形中故曰以百姓心為心也善者吾善之注百姓為善聖人因而善之不善者吾亦善之注百姓雖有不善者聖人化之使為善也疏善者謂無欲修學之士也不善者謂有為滯境之人普以平等勝教化之令其得善此則以百姓心為心之善也德善矣注聖人德化百姓為善矣節解曰謂行一養神神和形柔邪去正存骨堅隨真故曰得善矣信者吾信之注百姓為信聖人因而信之不信者吾亦信之注百姓為不信聖人化之使信也德信矣注聖人德化百姓為信矣御曰欲善信者吾因而善信之不信者吾亦以善信教之令百姓感吾德而善信之也疏信謂聞經戒愛樂不信謂不樂道文聖人以空行慈悲平等救度不問信與不信皆令得益而普發信心故真迹紫微夫人曰信者得失之關鍵又經云信者學道之樞機也問曰聖人無心有感必應不感不應者則信者方教不信者不教而令信與不信一種教之亦應感與不感一種皆應答曰應有通有别如治在玄都玉京而恆救三界此則通應善信是也至如胡人有感紫氣西浮授尹真人道德之文此則别應若别應則待别感通應則尋常慈照故上經云常善救人而無棄人也節解曰謂人信一也一亦信人人不信一一由人生故道常得其信也聖人在天下怵怵注聖人在天下常怵怵恐懼富貴不敢驕奢疏怵怵勤懼之貌也言無心赴感聖人其在天下也恆布大慈護救蒼生恐其沒溺故怵怵而勤懼也為天下渾其心注聖人為天下百姓混濁其心若愚暗不通也疏渾沌無分别也言凡夫感情滯境妄生去取聖人欲渾沌其心令無分别勤懼之義即斯謂也百姓皆注其耳目注注用也百姓皆用其耳目為聖人視聽疏河上作注諸本作淫淫者染滯也顛倒之徒迷沒世境縱恣耳目滯著聲色既而漂浪長流愆非日積聖人愍其困苦故顯其病六根之中遍舉兩者欲明此二患最深故西升經云耳目聲色為子留愆然舉一根諸根可悉為文備故也聖人皆孩之注聖人愛念百姓如育赤子長養之而不責望其報疏衆生妄淫耳目淪沒愛河聖人勤懼慈救義同赤子哀其無識故如嬰兒之可愍出生入死注出生謂情欲出於五內魂定魄靜故生也入死謂情欲入於胸臆精神勞惑故死也御曰了悟則出生迷執則入死疏出生者超凌三界出離死生入死者沈淪三塗沒溺生死若解生死義者從無出有以釋生為生自有還無以釋滅為死生之徒十有三死之徒十有三注言生死之類各有十三謂九竅四關也其生也目不妄視耳不妄聽鼻不妄嗅口不妄言舌不妄味手不妄持足不妄行精不妄施其死也反是疏徒類也言九竅四關凡聖俱有聖人忘之故出三界凡夫執著故入六道入六道則死之徒出三界則生之徒人之生動之死地亦十有三注人欲求生動作反之十三死地也疏凡人之生動即適死地者蓋為執此十三滯於前境故也夫何故注問之何故動之死地也疏假設疑問以生後答以其生生之厚注所以動之死地者以其求生活之事太厚違道忤天妄行失紀也疏言人不能體道忘生而執生為有多積物産厚資此生而營生過當故動之死地此一句答前問意也蓋聞善攝生者注攝養也疏蓋不盡問之辭猶竊聞也攝衛也養也言善攝衛養生之人淡泊虛夷不染塵境攝衛之美自顯下文陸行不遇兕虎注自然逺避害不干也疏陸平地也兕毒獸一角形如野牛青色言善攝生之人不為毒獸所觸內解者言平居安靜不為煩惱所加也入軍不被甲兵注不好戰以殺也疏言攝生之人不入行陳亦不為干戈所害內解者縱入塵境亦不為色等所傷兕無所投其角虎無所措其爪兵無所容其刃注養生之人兕虎無由傷兵刃無由加也御曰善攝理生之人心照清淨無貪取之意故外物不可加害疏諸本言駐駐立也措安也兕遇物即觸喻癡人也虎性躁暴喻嗔也兵刃鋭利能傷於人喻貪也言善攝生者妙體真空故雖處世間而不為三毒所害也夫何故注問虎兕兵甲何故不害之也疏假設疑問有何事故得致如此以其無死地注以其不犯上十三之死地也言神明營護之此物自然不敢害也御曰以其順化無私不以死為死則物不得害其生故云無死地也疏夫見有身者故以身為死地也今善攝生之人忘於身相即身無身故無地之可死也既無死地三毒何所加乎節解曰謂聖人懷精神守一行氣握固胎息故使此物不害之道處其心真氣俱存故無刑殺之地也道生之注道生萬物德畜之注德一也一生布氣而畜養之也御曰物得以生養萬類也疏至道虛玄通生萬物上德慈救畜養群生也故云道生德畜也物形之注一為萬物設形象勢成之注亦云勢成之一為萬物作寒暑氣勢以成之疏陶瑩心靈令行業淳熟而成就也是以萬物莫不尊道而貴德注道德所為無不盡驚動而尊敬之也御曰萬物皆由道德以生畜故尊貴之疏道德生育具如前㫖蒼生荷賴日用不知是以勸示令崇尚也道尊德貴夫莫之爵而常自然注道一不命召萬物而常自然應之如影響也御曰言道德之尊貴非假爵命但生成之功被物而常自然貴也疏世上尊榮必須品秩所以非久而道德尊貴無關爵命故常自然故道生之畜之長之育之成之熟之養之覆之注言道之於萬物非但生之而已乃復長養成熟覆育全其性命人君治國治身亦當如此疏重迭前文以生後句而舉道不言德者明德不異道而文略故也西升經云道德渾沌玄妙同也長之者謂增其善芽育之者謂進其功行也成熟者謂以無上妙法瑩飾物心令其道果成就德業淳熟此猶迭前語來生後文也養覆者養謂酬其果報覆謂廕以大慈也已上四雙明利物之德以下三德明能遣其功也生而不有注道生萬物不有所取以為利用疏雖復能生萬物實無物之可生芻狗其情故即生而不有有即有而不有生亦生而不生此遣道生之也為而不恃注道所施為不恃望其報疏既生成萬物不有其生施為法教於何可恃此遣德畜之也長而不宰注道長養萬物不宰割以為利用也疏長養蒼生功侔造化而能所俱幻誰其宰乎此遣長之等四雙也是謂玄德注道之所行恩德玄暗不可得見也疏是則指於上句謂則言及下文玄者深逺之名德以證護為義指前體道之士利物忘功以法目人可謂玄德車曰道為陽極陽即天也天以運動所以生萬物德為陰極陰即地也地以包含所以畜萬物受氣曰生養形曰畜所云一切萬物之形勢成之者因其業勢而成就之業勢應合為人即為作人形而成就之蔡曰為諸衆生作四時之勢成就萬物此說在前天下有始注始有道也以為天下母注道為天下萬物母也御曰始者沖和之妙氣也言此妙氣生成萬物有茂養之德故可以為天下母也疏始道本母道迹也夫玄道妙本大智慧源超絶名言離諸色象天下萬物皆從此生今抗言者欲令行人識根知本故經云萬物始也以為母者言從本降迹導引蒼生長之育之如母愛子故上經云有名萬物母蔡曰始本也言一切衆生沈淪五欲不知根本隨流逐末漂浪生死故老君舉本示之明天下有清虛氣為道德為汝根本且始則無先母則有功取其生物故稱始也育之功遂稱母也既知其母又知其子注子一也既知得道以當復知一也御曰萬物既得沖氣茂養以知其身即是沖氣之子也疏夫本能生迹母能生物既知道是我母即知我是道子從道而生故也經曰虛無自然是真父母既知其子復守其母注以知其一當復守道反無為也蔡曰既知己是道子從而得生則須守清靜無為復歸其母便與道同也沒身不殆注不危殆也御曰既知身是沖氣之子當守此沖和妙氣不令離散則終沒其身無危殆也疏既知我是道子應須歸復守其母也但能歸根守母守道會真迹雖有沒有存而本無危無殆何者夫道能生物道即是本物從道生物即是末而末能攝本所以須歸其母母能生子所以須守其母守母則久視長生歸本則殁身不殆故勸之也西升經云常能養母乃能長久塞其兊注兊目也使目不妄視閉其門注門口也使口不妄言疏上雖勸其守母猶未示其修守之方故次下文具顯守復方術即閉塞等是也兊口也而六根之中偏舉兊者明口既是三業又沾六根為罪多也門五門閉五門不染塵境也前舉兊是根之别此言門是根之總也但閉塞之義有兩一者斷情忍色栖托山林或却掃閉門不見可欲二者體知六塵虛幻根亦不真內無能染之心外無可欲之境既而恣目之所見極耳之所聞而恆處道場不乖真境豈曰杜耳閉目而稱閉塞哉蓋不然乎斯乃閉塞之妙也終身不勤注人當塞目不妄視閉口不妄言則終身不勤苦矣疏勤勞苦也夫學道多端行門匪一或靜心而避塵境或即境而體真源深淺糾紛實唯多種故西升經云動則有劫載自唯甚苦勤也但能依前閉塞即境而真心性間寬而無勞倦可以盡年終而不苦勤也開其兊濟其事注開其五欲之門濟其六塵之事心神內疲耳目外困終身勞倦也終身不救注禍亂成也疏及愚者為之即開眼耳等根濟於聲色等事終身耽染沒命貪淫縱使大聖大慈良亦目擊不能救也見小曰明注萌芽未動禍亂未見為小昭然獨見為明也御曰人能於事微小則見而改行可謂明也疏見觀照也小微細之名也至妙之理也言行人但能照於妙境智慧日日增明故上經云觀其妙也守柔曰强注守柔弱者日以强大疏既能見小則智慧增明復能用道兼知柔弱故其德業日日强盛也夫學之初有定有惠有行有解見小即是惠定之門用柔即是行解之術故六度之中有行有解前五是行後一是解解則是惠是空行則兼空兼有而以空導有以有資空欲明資導之能故言用柔見小也用其光注用其目光於外視時世之利害復歸其明注復當反其光明於內無使精神泄於外也疏光照外也既即照而忘韜光晦迹歸明於昧故云復歸其明也下文云光而不耀也莊子云滑疑之耀聖人之所圖也無遺身殃注內視存神不為漏失是謂習常注人能行此是謂習修常道也御曰遺與也言還守內明則無與身為殃咎者如此是謂密用真常之道也疏既即照而忘行圓德滿諸纍以盡無復遺餘之殃咎也亦云遺與也無復與身之殃釁也行業圓備諸纍復盡傳經主教允屬其人故指此人可謂承襲常道紹隆真教也使我介然有知行於大道注介大也老子疾時王不行大道故設言使我介然有知於政事我則行於大道躬行無為之化節解曰吾夙夜介介心念守一於身也王及羅什二家云介小也我小有所知則便行於大道也唯施是畏注唯獨也獨畏有所施為恐失道意欲賞善恐僞善生欲信忠恐詐忠起御曰老君言若使我耿介矜其有知欲行大道既與道不合故唯所施為是皆可畏之也疏使我者假設之辭也知分别也介然微小也言正真之道甚自平夷假使我微介起心以知行道者深不可也何者夫至道虛通妙絶分别在假不假居真不真真假性齊死生一貫入九幽而不昧出三界而不明履危險而常安臨大難而無畏也今乃起心分别乖於至道諸所施為動之死地故可畏也大道甚夷注夷平易也而民好徑注徑邪不平也夫道甚平易而民好從徑邪也疏夷平正也徑邪道也言至理平等甚無分别顛倒之類背正向邪遂使大道陵遲小成孔熾節解曰謂人好邪僞行妄徑也朝甚除注高臺榭修宫室疏無道之君奸行邪徑不崇朴素唯尚華侈既而除其故宇更起新宫雕楹刻桷窮乎綺麗田甚蕪注農事廢不耕治失時也節解曰謂人不修其一朝夕自飾而生病故心荒穢也疏徭役既繁農夫喪業東皋不作南畝荒蕪倉甚虛注五穀傷害國無儲也節解曰謂不守固其一則五藏空乏故曰虛也疏稼穡有退國用無資杼軸既空倉廪斯罄服文彩注奸飾僞貴外華也帶利劍注上剛强武且奢御曰文德不修尚武備也節解曰謂奸華服於身一去邪來帶利劍仗刃備為鬼邪所病厭飲食注多嗜欲無足時疏黼黻文繡以麗其身干將莫耶以衛其命醪醴羶腥以爽其口不崇上德不恤下民嗟乎叨餮一至於此資貨有餘是謂盜夸注百姓不足而君有餘者是由劫盜以為服飾持行夸人不知身死家破親戚并隨之也節解曰謂好其甘肥以養其容一去其中百病并生乃以資貨備於死喪也非道也哉注人君所行如是死非道也復言也哉者痛傷之辭御曰矜其有知動以成弊行同盜竊仍自矜誇誇盜非道適令興嘆也節解曰謂人不行一但念好服美食可以為盜賊不能止病却死故非道也疏多資多斂如盜如賊既畜既積且矜且夸乖理悖德謂之非道行人道心解之者朝甚除無善功田甚蕪心荒廢倉甚虛無道德服文綵好飾詞帶利劍貪心鋭厭飲食耽滋味資貨有餘積不散也善建不拔注建立也善以道立身立國者不可得引而拔之也疏建立也拔傾也能建立道心之人志願堅固直至道場不可傾拔也王盧曰夫言車者以衆材合成乃名車也君以衆人共載乃成君也然無材車何以為有無人君何以為高故愛車者當須重材寶元者當須守人也節解曰謂道真無名抱一內守不外求故曰無譽也善抱者不脫注善以道抱精神者終不可拔引解脫也疏抱持也脫失也前句發心此句起行也言善持真行之人一之永得終無差失子孫祭祀不輟注御曰言善以道德建抱之君功施於後愛其甘棠况其子孫乎而王者祖有功宗有德故周之興也始於后稷成於文武周之祭也郊祀后稷宗祀文王故雖卜代三十卜年七百毁廟之主流溢於外而后稷文王郊宗之祀不輟止也修之於身其德乃真注修道於身愛氣養神益壽延年其德如是乃為真人疏以前之學行修營其身既而能所相應道德真實也修之於家其德乃餘注修道於家父慈子孝兄友弟順夫信妻貞其德如是乃有餘慶及於來世子孫修之於鄉其德乃長注修道於鄉尊敬長老愛養幼少教誨愚鄙其德如是乃無不覆及也修之於國其德乃豐注修道於國則君信臣忠仁義自生禮樂自興政平無私其德如是乃為豐厚也疏五等諸侯清虛修道遂致域中寧謐內外無虞豈非賢聖之君德行豐贍者也修之天下其德乃普注人主修道於天下不言而化不教而治下之應上信如影響其德如是乃為普博也疏九五之君用道而治端拱玄默天下大平是以萬國來朝四方歸附化無不被其德能普故以身觀身注以修道之身觀不修道之身誰亡誰存以家觀家注以修道之家觀不修道之家也以鄉觀鄉注以修道之鄉觀不修道之鄉也以國觀國注以修道之國觀不修道之國也以天下觀天下注以修道之主觀不修道之主也吾何以知天下之然哉以此注老君言吾何以知天下修道者昌背道者亡以此觀之而知也疏夫堯舜所以升平者有道故也桀紂所以淫亂者無道故也是知以修道之身觀不修道之身以有道天下觀無道天下乃至家國利害斷可知矣故老君假設云我何以知天下成敗之事乎只以此格量足為龜鏡矣含德之厚注謂含懷道德之厚者比於赤子注神明保祐含德之人比若父母之於赤子也疏含懷道德甚自淳厚欲表其狀故取譬嬰兒嬰兒之行貝列於下文毒蟲不螫注蜂蠆蛇虺不螫之也猛獸不據攫鳥不搏注赤子不害物物亦不害之故太平之世人無貴賤皆有仁心有刺之物還反其本有毒之蟲不傷於人御曰至人神矣物不能傷既無害物之心故無毒螫之地此至人之含德也疏毒蟲蛇虺類也攫鳥鷹鸇類也猛獸兕虎類也螫行毒也摶擊觸也言赤子不犯前境故不遭三物所加喻含德妙達故不為三毒所害骨弱筋柔而握固注赤子筋骨柔弱而持物堅固以其意專心不移也疏言赤子筋骨柔弱手握堅固喻含德心性柔弱順物謙和雖復混迹同塵而靈府潔白在染不染故言握固此一句明意業净也未知牝牡之合而䘒作精之至注赤子未知男女之合會而陰作怒者由精氣多之所致也疏字林云䘒小兒陰也言赤子初生未解雌雄交合之道而陰恆怒作乃精滿室之至也况含德體道淳和無為虛泊雖復揚波處俗聞見色聲而妙悟真空不見合和之相蓋以精粹之至此一句明身業净也終日號而不嗄和之至注赤子從朝至暮啼號聲不變易者和氣多之所致也御曰赤子骨弱筋柔而能握拳牢固未知陰陽配合而和氣之源動作者由精粹之至終日啼號而聲不嘶嗄由純和之至此赤子含氣也疏為無心作聲和氣不散也况含德妙達真宗故能說無所說雖復辨雕萬物而不乖於無言此一句明口業净也前言終日啼號而聲不嘶嗄者為無心作聲和氣不散也知和曰常注人能知和氣之柔弱有益於人者則為知道之常也御曰能如嬰兒固守和柔是謂知常之行者也疏知此不言之言是淳和之理者乃曰體於真常之道也知常曰明注人能知道之常行則日以明達於玄妙疏知於真常之道是曰智慧明照也益生曰祥注祥長也言益生欲自生日以長大疏祥多也凡惑之人不體生無生相多貪世利厚益其生所以煩惱障纍日日增廣心使氣曰强注心常專一為和柔故神氣實內而形柔若反使妄有所為則和氣去於中故形體日以剛强御曰心有是非氣無分别若役心使氣是曰强梁之人疏心神也氣身也物情顛倒觸類生迷豈知萬物皆空身亦虛幻既而以神使形驅馳勞役是以生死之業日日强盛物壯則老謂之非道注萬物壯極則枯老枯老則不得道矣疏夫盛者必衰物壯則老是知益生使氣足驗無常既曰無常故非真道非道早已注不得道者早已早已者死也御曰凡物壯極則衰老故戒云矜壯恃强是謂不合於道當須早已已止也疏已止也既非真道應須止而勿為也道德真經注疏卷之五
